# AuraEDU RBAC registry — SOURCE OF TRUTH for permission keys + role mappings
# (agent_plan Appendix C, spec §8). Format: <resource>.<action>.
# Codegen emits typed constants for Go (platform/auth) + TS.
#
# Authorization rule (enforced in every service's application layer, spec §8.3):
#   authenticated AND tenant_id matches request AND role has permission
#   AND feature enabled AND resource belongs to tenant.

version: 1

permissions:
  identity:   [features.manage, users.read, users.create, users.update, roles.assign]
  students:   [students.read, students.create, students.update, students.delete]
  staff:      [staff.read, staff.create, staff.update]
  academic:   [academic.read, academic.manage]
  attendance: [attendance.read, attendance.mark]
  assessments: [assessments.read, assessments.record_scores, assessments.manage]
  reports:    [reports.read, reports.publish]
  fees:       [fees.read, fees.manage]
  payments:   [payments.read, payments.initiate, payments.configure]
  notifications: [notifications.read, notifications.send, notifications.manage]
  website:    [website.read, website.manage]
  files:      [files.read, files.upload, files.update, files.delete]
  analytics:  [analytics.view]
  billing:    [billing.read, billing.manage]
  cbt:        [cbt.read, cbt.author, cbt.take, cbt.grade]
  audit:      [audit.read]
  ai:         [ai.view_recommendations, ai.approve_recommendations, ai.view_predictions, ai.approve_predictions, ai.view_guidance, ai.approve_guidance]
  crm:        [crm.lead.read, crm.lead.create, crm.lead.update, crm.lead.assign, crm.lead.export, crm.interaction.create]
  campaigns:  [campaign.read, campaign.create, campaign.update, campaign.approve, campaign.publish, campaign.budget.approve]
  content:    [content.generate, content.review, content.publish]
  growth_admissions: [admissions.catalogue.manage, admissions.application.create, admissions.application.read, admissions.application.update, admissions.application.submit, admissions.application.review, admissions.offer.issue, admissions.offer.accept]
  growth_ai:  [ai.agent.configure, ai.action.approve, knowledge.read, knowledge.manage, knowledge.approve, feedback.review]
  growth_analytics: [analytics.executive.read]
  growth_intelligence: [intelligence.read, intelligence.manage, intelligence.review]

# Role → scope (spec §8.1). Permission sets are assigned per role per tenant by Identity Service.
roles:
  platform_super_admin: { scope: all_tenants, note: "company admin — web only" }
  school_admin:         { scope: single_tenant, note: "web only" }
  principal:            { scope: single_tenant }
  academic_head:        { scope: single_tenant }
  accountant:           { scope: single_tenant }
  teacher:              { scope: assigned_classes_subjects, platforms: [web, mobile] }
  parent:               { scope: own_children, platforms: [web, mobile] }
  student:              { scope: own_records, platforms: [web, mobile] }
  applicant:            { scope: own_applications, platforms: [web] }
  support_agent:        { scope: limited_platform_support }
