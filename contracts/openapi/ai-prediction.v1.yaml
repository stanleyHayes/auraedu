openapi: 3.1.0
info:
  title: AuraEDU AI Prediction Service API
  version: 1.0.0
  description: >
    Student risk and performance predictions (spec \u00a715).
    Owned by lane L3 (EP-31). Feature flag: ai_predictions.
servers:
  - url: /api/v1/ai/predictions
tags:
  - name: predictions
  - name: feature-store

paths:
  /health:
    get:
      operationId: healthCheck
      tags: ['predictions']
      summary: Service health check
      security: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status: { type: string, enum: [ok] }

  /feature-store/metrics:
    post:
      operationId: ingestFeatureStoreMetric
      tags: ['feature-store']
      summary: Ingest a single approved learning metric
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/IngestMetricRequest' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/FeatureStoreMetric' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /predictions:
    get:
      operationId: listPredictions
      tags: ['predictions']
      summary: List predictions for a student
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - name: student_id
          in: query
          required: true
          schema: { type: string, format: uuid }
        - name: prediction_type
          in: query
          schema: { type: string }
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PredictionList' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }

    post:
      operationId: generatePredictions
      tags: ['predictions']
      summary: Generate predictions for a student
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/GeneratePredictionsRequest' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PredictionList' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /predictions/{prediction_id}:
    get:
      operationId: getPrediction
      tags: ['predictions']
      summary: Get a prediction by ID
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - name: prediction_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Prediction' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /predictions/{prediction_id}/explain:
    get:
      operationId: explainPrediction
      tags: ['predictions']
      summary: Get explainability details for a prediction
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - name: prediction_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ExplainResponse' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /predictions/{prediction_id}/approve:
    post:
      operationId: approvePrediction
      tags: ['predictions']
      summary: Approve a prediction
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - name: prediction_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ReviewPredictionRequest' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Prediction' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /predictions/{prediction_id}/reject:
    post:
      operationId: rejectPrediction
      tags: ['predictions']
      summary: Reject a prediction
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - name: prediction_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ReviewPredictionRequest' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Prediction' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '401': { $ref: '#/components/responses/Unauthorized' }

components:
  parameters:
    TenantHeader:
      name: X-Tenant-Code
      in: header
      required: false
      description: Tenant code (used when gateway cannot derive tenant from host).
      schema: { type: string, example: upshs }
    Limit:
      name: limit
      in: query
      schema: { type: integer, minimum: 1, maximum: 100, default: 25 }
    Cursor:
      name: cursor
      in: query
      schema: { type: string }

  schemas:
    Error:
      type: object
      required: [code, message]
      properties:
        code: { type: string, enum: [forbidden, feature_disabled, tenant_mismatch, validation_error, not_found, unauthorized] }
        message: { type: string }
        request_id: { type: string }

    FeatureStoreMetric:
      type: object
      required: [id, tenant_id, student_id, metric_key, value, source, recorded_at]
      properties:
        id: { type: string, format: uuid }
        tenant_id: { type: string, format: uuid }
        student_id: { type: string, format: uuid }
        metric_key: { type: string }
        value: { type: number }
        source: { type: string, enum: [assessment, attendance, analytics] }
        recorded_at: { type: string, format: date-time }
        created_at: { type: string, format: date-time }

    IngestMetricRequest:
      type: object
      required: [student_id, metric_key, value, source, recorded_at]
      properties:
        student_id: { type: string, format: uuid }
        metric_key: { type: string }
        value: { type: number }
        source: { type: string, enum: [assessment, attendance, analytics] }
        recorded_at: { type: string, format: date-time }

    GeneratePredictionsRequest:
      type: object
      required: [student_id]
      properties:
        student_id: { type: string, format: uuid }
        prediction_types: { type: array, items: { type: string } }

    Prediction:
      type: object
      required: [id, tenant_id, student_id, prediction_type, title, value, confidence, status, explanation, created_at]
      properties:
        id: { type: string, format: uuid }
        tenant_id: { type: string, format: uuid }
        student_id: { type: string, format: uuid }
        prediction_type: { type: string }
        title: { type: string }
        value: { type: number }
        confidence: { type: number, minimum: 0, maximum: 1 }
        status: { type: string, enum: [pending, approved, rejected] }
        explanation: { type: [string, 'null'] }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    ReviewPredictionRequest:
      type: object
      properties:
        reason: { type: [string, 'null'] }

    PredictionList:
      type: object
      properties:
        data: { type: array, items: { $ref: '#/components/schemas/Prediction' } }
        next_cursor: { type: [string, 'null'] }

    ExplainResponse:
      type: object
      required: [prediction_id, factors]
      properties:
        prediction_id: { type: string, format: uuid }
        factors: { type: array, items: { $ref: '#/components/schemas/ExplainFactor' } }
        model_notes: { type: [string, 'null'] }

    ExplainFactor:
      type: object
      required: [metric_key, value, contribution]
      properties:
        metric_key: { type: string }
        value: { type: number }
        contribution: { type: string, enum: [strong_positive, positive, neutral, negative, strong_negative] }

  responses:
    Unauthorized:
      description: Missing or invalid bearer token
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
          example: { code: unauthorized, message: "Authentication required" }
    Forbidden:
      description: Not permitted (auth, tenant scope, RBAC, or feature disabled)
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
          examples:
            forbidden: { value: { code: forbidden, message: "Missing required permission" } }
            feature_disabled: { value: { code: feature_disabled, message: "Feature not enabled for tenant" } }
            tenant_mismatch: { value: { code: tenant_mismatch, message: "Resource belongs to another tenant" } }
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
          example: { code: not_found, message: "Resource not found" }
    ValidationError:
      description: Request failed validation
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
          example: { code: validation_error, message: "request body is invalid" }

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

security:
  - bearerAuth: []
