openapi: 3.1.0
info:
  title: AuraEDU Tenant Service API
  version: 1.0.0
  description: >
    Schools (tenants), branding, settings, and the feature-flag store.
    Source of truth for feature flags (spec §3). Owned by lane L1 (EP-05).
servers:
  - url: /api/v1
tags:
  - name: tenants
  - name: features

paths:
  /tenants:
    get:
      operationId: listTenants
      tags: [tenants]
      summary: List tenants (platform super admin only)
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { type: array, items: { $ref: '#/components/schemas/Tenant' } }
                  next_cursor: { type: [string, 'null'] }
        '403': { $ref: '#/components/responses/Forbidden' }
    post:
      operationId: createTenant
      tags: [tenants]
      summary: Create a tenant (onboarding / sign-up funnel)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateTenant' }
      responses:
        '201':
          description: Created
          content: { application/json: { schema: { $ref: '#/components/schemas/Tenant' } } }
        '422': { $ref: '#/components/responses/ValidationError' }

  /tenants/{tenant_id}:
    parameters:
      - $ref: '#/components/parameters/TenantId'
    get:
      operationId: getTenant
      tags: [tenants]
      responses:
        '200':
          description: OK
          content: { application/json: { schema: { $ref: '#/components/schemas/Tenant' } } }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { description: Not found }

  /features:
    get:
      operationId: getFeatureSnapshot
      tags: [features]
      summary: Feature-flag snapshot for the resolved tenant (loaded by web/mobile at startup)
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  tenant_id: { type: string, format: uuid }
                  features:
                    type: array
                    items: { $ref: '#/components/schemas/FeatureFlag' }
        '403': { $ref: '#/components/responses/Forbidden' }

components:
  parameters:
    TenantId:
      name: tenant_id
      in: path
      required: true
      schema: { type: string, format: uuid }
    Limit:
      name: limit
      in: query
      schema: { type: integer, minimum: 1, maximum: 100, default: 25 }
    Cursor:
      name: cursor
      in: query
      schema: { type: string }

  schemas:
    Tenant:
      type: object
      required: [id, tenant_code, name, status]
      properties:
        id: { type: string, format: uuid }
        tenant_code: { type: string, example: upshs }
        name: { type: string }
        status: { type: string, enum: [active, suspended, onboarding] }
        domain: { type: [string, 'null'] }
        branding:
          type: object
          properties:
            logo_url: { type: [string, 'null'] }
            brand:
              type: object
              properties:
                primary: { type: string, example: '#7B1113' }
                secondary: { type: [string, 'null'] }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    CreateTenant:
      type: object
      required: [tenant_code, name]
      properties:
        tenant_code: { type: string, pattern: '^[a-z0-9-]{2,50}$' }
        name: { type: string }
        plan: { type: string, enum: [starter, growth, professional, ai_plus, enterprise] }
    FeatureFlag:
      type: object
      required: [feature_key, is_enabled]
      properties:
        feature_key: { type: string, example: ai_recommendations }
        is_enabled: { type: boolean }
        plan_required: { type: [string, 'null'] }
        config: { type: [object, 'null'], additionalProperties: true }

    Error:
      type: object
      required: [code, message]
      properties:
        code: { type: string }
        message: { type: string }
        request_id: { type: string }

  responses:
    Forbidden:
      description: Not permitted (auth, tenant scope, RBAC, or feature disabled)
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
          examples:
            feature_disabled: { value: { code: feature_disabled, message: "Feature not enabled for tenant" } }
            forbidden: { value: { code: forbidden, message: "Missing required permission" } }
            tenant_mismatch: { value: { code: tenant_mismatch, message: "Resource belongs to another tenant" } }
    ValidationError:
      description: Request failed validation
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
          example: { code: validation_error, message: "tenant_code is invalid" }

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

security:
  - bearerAuth: []
