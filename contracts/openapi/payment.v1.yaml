openapi: 3.1.0
info:
  title: AuraEDU Payment Service API
  version: 1.0.0
  description: >
    Payment gateway integrations, transactions, and webhooks (spec \u00a77). Owned by lane L2 (EP-17). Feature flag: online_payments.
servers:
  - url: /api/v1
tags:
  - name: payments
  - name: transactions
  - name: webhooks

paths:
    /payments/initiate:
      post:
            operationId: initiatePayment
            tags: ['payments']
            summary: Initiate a payment
            parameters:
              - $ref: '#/components/parameters/TenantHeader'
            requestBody:
              required: true
              content:
                application/json:
                  schema: { $ref: '#/components/schemas/InitiatePaymentRequest' }
            responses:
              '201':
                description: OK
                content:
                  application/json:
                    schema: { $ref: '#/components/schemas/Payment' }
              '403': { $ref: '#/components/responses/Forbidden' }
              '404': { $ref: '#/components/responses/NotFound' }
              '422': { $ref: '#/components/responses/ValidationError' }
              '401': { $ref: '#/components/responses/Unauthorized' }
    /payments/{payment_id}:
      get:
            operationId: getPayment
            tags: ['payments']
            summary: Get payment status
            parameters:
              - $ref: '#/components/parameters/TenantHeader'
              - $ref: '#/components/parameters/TenantId'
            responses:
              '200':
                description: OK
                content:
                  application/json:
                    schema: { $ref: '#/components/schemas/Payment' }
              '403': { $ref: '#/components/responses/Forbidden' }
              '404': { $ref: '#/components/responses/NotFound' }
              '422': { $ref: '#/components/responses/ValidationError' }
              '401': { $ref: '#/components/responses/Unauthorized' }
    /transactions:
      get:
            operationId: listTransactions
            tags: ['transactions']
            summary: List transactions
            parameters:
              - $ref: '#/components/parameters/TenantHeader'
              - $ref: '#/components/parameters/Limit'
              - $ref: '#/components/parameters/Cursor'
            responses:
              '200':
                description: OK
                content:
                  application/json:
                    schema: { $ref: '#/components/schemas/TransactionList' }
              '403': { $ref: '#/components/responses/Forbidden' }
              '404': { $ref: '#/components/responses/NotFound' }
              '422': { $ref: '#/components/responses/ValidationError' }
              '401': { $ref: '#/components/responses/Unauthorized' }
    /webhooks/{provider}:
      post:
            operationId: receiveWebhook
            tags: ['webhooks']
            summary: Receive provider webhook
            parameters:
              - $ref: '#/components/parameters/TenantHeader'
              - $ref: '#/components/parameters/TenantId'
            requestBody:
              required: true
              content:
                application/json:
                  schema: { $ref: '#/components/schemas/WebhookPayload' }
            responses:
              '201':
                description: OK
                content:
                  application/json:
                    schema: { $ref: '#/components/schemas/WebhookEvent' }
              '403': { $ref: '#/components/responses/Forbidden' }
              '404': { $ref: '#/components/responses/NotFound' }
              '422': { $ref: '#/components/responses/ValidationError' }
              '401': { $ref: '#/components/responses/Unauthorized' }
            security: []

components:
  parameters:
    TenantId:
      name: tenant_id
      in: path
      required: true
      schema: { type: string, format: uuid }
    TenantHeader:
      name: X-Tenant-Code
      in: header
      required: false
      description: Optional tenant code for resolution when the gateway cannot derive it from the host.
      schema: { type: string, example: upshs }
    Limit:
      name: limit
      in: query
      schema: { type: integer, minimum: 1, maximum: 100, default: 25 }
    Cursor:
      name: cursor
      in: query
      schema: { type: string }

  schemas:
    Error:
      type: object
      required: [code, message]
      properties:
        code: { type: string, enum: [forbidden, feature_disabled, tenant_mismatch, validation_error, not_found, unauthorized] }
        message: { type: string }
        request_id: { type: string }
    InitiatePaymentRequest:
        type: object
        required: [invoice_id, amount, gateway]
        properties:
          invoice_id: { type: string, format: uuid }
          amount: { type: number, minimum: 0 }
          gateway: { type: string, enum: [paystack, flutterwave] }
          callback_url: { type: [string, 'null'] }
    Payment:
        type: object
        required: [id, tenant_id, invoice_id, amount, status]
        properties:
          id: { type: string, format: uuid }
          tenant_id: { type: string, format: uuid }
          invoice_id: { type: string, format: uuid }
          amount: { type: number, minimum: 0 }
          gateway: { type: string }
          status: { type: string, enum: [pending, success, failed] }
          reference: { type: [string, 'null'] }
    Transaction:
        type: object
        required: [id, tenant_id, payment_id, amount]
        properties:
          id: { type: string, format: uuid }
          tenant_id: { type: string, format: uuid }
          payment_id: { type: string, format: uuid }
          amount: { type: number, minimum: 0 }
          gateway_reference: { type: [string, 'null'] }
          recorded_at: { type: string, format: date-time }
    WebhookPayload:
        type: object
        additionalProperties: true
        properties:
          event: { type: string }
          data: { type: object, additionalProperties: true }
    WebhookEvent:
        type: object
        required: [id, provider, event]
        properties:
          id: { type: string, format: uuid }
          provider: { type: string }
          event: { type: string }
          processed: { type: boolean }
    TransactionList:
        type: object
        properties:
          data: { type: array, items: { $ref: '#/components/schemas/Transaction' } }
          next_cursor: { type: [string, 'null'] }

  responses:
    Unauthorized:
      description: Missing or invalid bearer token
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
          example: { code: unauthorized, message: "Authentication required" }
    Forbidden:
      description: Not permitted (auth, tenant scope, RBAC, or feature disabled)
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
          examples:
            forbidden: { value: { code: forbidden, message: "Missing required permission" } }
            feature_disabled: { value: { code: feature_disabled, message: "Feature not enabled for tenant" } }
            tenant_mismatch: { value: { code: tenant_mismatch, message: "Resource belongs to another tenant" } }
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
          example: { code: not_found, message: "Resource not found" }
    ValidationError:
      description: Request failed validation
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
          example: { code: validation_error, message: "request body is invalid" }

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

security:
  - bearerAuth: []

