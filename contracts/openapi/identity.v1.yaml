openapi: 3.1.0
info:
  title: AuraEDU Identity Service API
  version: 1.1.0
  description: Authentication, tenant-scoped users, roles, sessions, password recovery and invitations.
  contact:
    name: AuraEDU Engineering
servers:
  - url: /api/v1
tags:
  - name: auth
  - name: users
  - name: roles

  - name: users, roles
paths:
  /auth/login:
    post:
      operationId: login
      description: Executes the login workflow within this AuraEDU API boundary.
      tags: [auth]
      summary: Exchange tenant user credentials for rotating tokens
      security: []
      parameters: [{ $ref: '#/components/parameters/TenantHeader' }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LoginRequest' }
      responses:
        '200': { description: Authenticated, content: { application/json: { schema: { $ref: '#/components/schemas/TokenPair' } } } }
        '202': { description: Privileged account requires TOTP setup or verification, content: { application/json: { schema: { $ref: '#/components/schemas/MFAChallenge' } } } }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '422': { $ref: '#/components/responses/ValidationError' }
  /auth/mfa/verify:
    post:
      operationId: verifyMFA
      description: Executes the verify mfa workflow within this AuraEDU API boundary.
      tags: [auth]
      summary: Complete a tenant-bound privileged TOTP challenge
      security: []
      parameters: [{ $ref: '#/components/parameters/TenantHeader' }]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/MFAVerifyRequest' } } }
      responses:
        '200': { description: Authenticated after MFA, content: { application/json: { schema: { $ref: '#/components/schemas/TokenPair' } } } }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '422': { $ref: '#/components/responses/ValidationError' }
  /auth/refresh:
    post:
      operationId: refreshToken
      description: Executes the refresh token workflow within this AuraEDU API boundary.
      tags: [auth]
      summary: Rotate an access and refresh token pair
      security: []
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/RefreshRequest' } } }
      responses:
        '200': { description: Rotated, content: { application/json: { schema: { $ref: '#/components/schemas/TokenPair' } } } }
        '401': { $ref: '#/components/responses/Unauthorized' }
  /auth/logout:
    post:
      operationId: logout
      description: Executes the logout workflow within this AuraEDU API boundary.
      tags: [auth]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/RefreshRequest' } } }
      responses:
        '200': { description: Logged out, content: { application/json: { schema: { $ref: '#/components/schemas/StatusResponse' } } } }
        '401': { $ref: '#/components/responses/Unauthorized' }
  /auth/sessions/{session_id}:
    delete:
      operationId: revokeSession
      description: Executes the revoke session workflow within this AuraEDU API boundary.
      tags: [auth]
      parameters: [{ $ref: '#/components/parameters/SessionId' }]
      responses:
        '204': { description: Revoked }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
  /auth/me:
    get:
      operationId: getCurrentIdentity
      description: Executes the get current identity workflow within this AuraEDU API boundary.
      tags: [auth]
      responses:
        '200': { description: Current claims, content: { application/json: { schema: { $ref: '#/components/schemas/CurrentIdentity' } } } }
        '401': { $ref: '#/components/responses/Unauthorized' }
  /auth/forgot-password:
    post:
      operationId: requestPasswordReset
      description: Executes the request password reset workflow within this AuraEDU API boundary.
      tags: [auth]
      summary: Request a non-enumerating password reset delivery
      security: []
      parameters: [{ $ref: '#/components/parameters/TenantHeader' }]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/ForgotPasswordRequest' } } }
      responses:
        '202': { description: Accepted regardless of account existence, content: { application/json: { schema: { $ref: '#/components/schemas/StatusResponse' } } } }
        '422': { $ref: '#/components/responses/ValidationError' }
  /auth/reset-password:
    post:
      operationId: resetPassword
      description: Executes the reset password workflow within this AuraEDU API boundary.
      tags: [auth]
      security: []
      parameters: [{ $ref: '#/components/parameters/TenantHeader' }]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/ResetPasswordRequest' } } }
      responses:
        '200': { description: Password reset, content: { application/json: { schema: { $ref: '#/components/schemas/StatusResponse' } } } }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '422': { $ref: '#/components/responses/ValidationError' }
  /users:
    get:
      operationId: listUsers
      description: Executes the list users workflow within this AuraEDU API boundary.
      tags: [users]
      parameters: [{ $ref: '#/components/parameters/TenantHeader' }]
      responses:
        '200': { description: Tenant users, content: { application/json: { schema: { $ref: '#/components/schemas/UserList' } } } }
        '403': { $ref: '#/components/responses/Forbidden' }
    post:
      operationId: createUser
      description: Executes the create user workflow within this AuraEDU API boundary.
      tags: [users]
      parameters: [{ $ref: '#/components/parameters/TenantHeader' }]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/CreateUserRequest' } } }
      responses:
        '201': { description: Created, content: { application/json: { schema: { $ref: '#/components/schemas/User' } } } }
        '409': { $ref: '#/components/responses/Conflict' }
        '422': { $ref: '#/components/responses/ValidationError' }
  /users/{user_id}:
    get:
      operationId: getUser
      description: Executes the get user workflow within this AuraEDU API boundary.
      tags: [users]
      parameters: [{ $ref: '#/components/parameters/UserId' }]
      responses:
        '200': { description: User, content: { application/json: { schema: { $ref: '#/components/schemas/User' } } } }
        '404': { $ref: '#/components/responses/NotFound' }
    put:
      operationId: updateUser
      description: Executes the update user workflow within this AuraEDU API boundary.
      tags: [users]
      parameters: [{ $ref: '#/components/parameters/UserId' }]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/UpdateUserRequest' } } }
      responses:
        '200': { description: Updated, content: { application/json: { schema: { $ref: '#/components/schemas/User' } } } }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
    delete:
      operationId: deleteUser
      description: Executes the delete user workflow within this AuraEDU API boundary.
      tags: [users]
      parameters: [{ $ref: '#/components/parameters/UserId' }]
      responses:
        '204': { description: Deleted }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
  /users/{user_id}/roles:
    post:
      operationId: assignRole
      description: Executes the assign role workflow within this AuraEDU API boundary.
      tags: [users, roles]
      parameters: [{ $ref: '#/components/parameters/UserId' }]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/RoleAssignmentRequest' } } }
      responses:
        '200': { description: Role assigned, content: { application/json: { schema: { $ref: '#/components/schemas/User' } } } }
        '403': { $ref: '#/components/responses/Forbidden' }
  /users/invites:
    post:
      operationId: inviteUser
      description: Executes the invite user workflow within this AuraEDU API boundary.
      tags: [users]
      summary: Create and privately deliver a user invitation
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/InviteUserRequest' } } }
      responses:
        '202': { description: Delivery accepted, content: { application/json: { schema: { $ref: '#/components/schemas/InviteReceipt' } } } }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422': { $ref: '#/components/responses/ValidationError' }
        '503': { $ref: '#/components/responses/Unavailable' }
  /users/invites/{token}/accept:
    post:
      operationId: acceptInvite
      description: Executes the accept invite workflow within this AuraEDU API boundary.
      tags: [users]
      security: []
      parameters: [{ $ref: '#/components/parameters/InviteToken' }]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/AcceptInviteRequest' } } }
      responses:
        '201': { description: Account activated, content: { application/json: { schema: { $ref: '#/components/schemas/User' } } } }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '422': { $ref: '#/components/responses/ValidationError' }
  /public/invites/{token}/accept:
    post:
      operationId: acceptPublicInvite
      tags: [users]
      summary: Accept a privately delivered invitation without an existing session
      description: Public transport boundary for the one-time, hashed, expiring invite token. The token is the credential; successful use activates the tenant administrator account.
      security: []
      parameters: [{ $ref: '#/components/parameters/InviteToken' }]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/AcceptInviteRequest' } } }
      responses:
        '201': { description: Account activated, content: { application/json: { schema: { $ref: '#/components/schemas/User' } } } }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '422': { $ref: '#/components/responses/ValidationError' }
  /permissions:
    get:
      operationId: listPermissions
      description: Executes the list permissions workflow within this AuraEDU API boundary.
      tags: [roles]
      responses:
        '200': { description: Permission keys, content: { application/json: { schema: { $ref: '#/components/schemas/PermissionList' } } } }
  /roles:
    get:
      operationId: listRoles
      description: Executes the list roles workflow within this AuraEDU API boundary.
      tags: [roles]
      responses:
        '200': { description: Supported roles, content: { application/json: { schema: { $ref: '#/components/schemas/RoleList' } } } }

components:
  parameters:
    TenantHeader:
      name: X-Tenant-Code
      in: header
      required: false
      schema: { type: string, pattern: '^[a-z0-9][a-z0-9-]{1,62}$', example: upshs }
    UserId:
      name: user_id
      in: path
      required: true
      schema: { type: string }
    SessionId:
      name: session_id
      in: path
      required: true
      schema: { type: string, description: Hashed refresh-token session identifier }
    InviteToken:
      name: token
      in: path
      required: true
      schema: { type: string, minLength: 32 }
  schemas:
    Error:
      type: object
      required: [code, message]
      properties:
        code: { type: string }
        message: { type: string }
    LoginRequest:
      type: object
      additionalProperties: false
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string, format: password, minLength: 8, maxLength: 256 }
    MFAChallenge:
      type: object
      additionalProperties: false
      required: [status, challenge_token, user]
      properties:
        status: { type: string, enum: [mfa_required, mfa_setup_required] }
        challenge_token: { type: string, minLength: 32 }
        secret: { type: string, pattern: '^[A-Z2-7]{32}$', description: Returned only during first enrollment }
        otpauth_uri: { type: string, format: uri, description: Returned only during first enrollment }
        user: { $ref: '#/components/schemas/User' }
    MFAVerifyRequest:
      type: object
      additionalProperties: false
      required: [challenge_token, code]
      properties:
        challenge_token: { type: string, minLength: 32 }
        code: { type: string, pattern: '^[0-9]{6}$' }
        setup_secret: { type: string, pattern: '^[A-Z2-7]{32}$', description: Required only for first enrollment }
    RefreshRequest:
      type: object
      additionalProperties: false
      required: [refresh_token]
      properties: { refresh_token: { type: string, minLength: 32 } }
    TokenPair:
      type: object
      required: [access_token, refresh_token, token_type, expires_at, user]
      properties:
        access_token: { type: string }
        refresh_token: { type: string }
        token_type: { type: string, const: Bearer }
        expires_at: { type: string, format: date-time }
        user: { $ref: '#/components/schemas/User' }
    CurrentIdentity:
      type: object
      required: [user_id, tenant_id, role, permissions, features_hash, platform_admin]
      properties:
        user_id: { type: string }
        tenant_id: { type: string }
        role: { type: string }
        permissions: { type: array, items: { type: string } }
        features_hash: { type: string }
        platform_admin: { type: boolean }
    User:
      type: object
      required: [id, email, name, tenant_id, role, permissions, status]
      properties:
        id: { type: string }
        email: { type: string, format: email }
        name: { type: string }
        tenant_id: { type: string, description: Canonical tenant code; empty only for platform administrators }
        role: { type: string }
        permissions: { type: array, items: { type: string } }
        status: { type: string, enum: [active, inactive, locked] }
    CreateUserRequest:
      type: object
      additionalProperties: false
      required: [email, name, role]
      properties:
        tenant_id: { type: string }
        email: { type: string, format: email }
        name: { type: string, minLength: 1 }
        role: { type: string }
        permissions: { type: array, items: { type: string } }
        password: { type: string, format: password, minLength: 12, maxLength: 256 }
    UpdateUserRequest:
      type: object
      additionalProperties: false
      properties:
        name: { type: string, minLength: 1 }
        role: { type: string }
        permissions: { type: array, items: { type: string } }
        status: { type: string, enum: [active, inactive, locked] }
    RoleAssignmentRequest:
      type: object
      additionalProperties: false
      required: [role]
      properties:
        role: { type: string }
        permissions: { type: array, items: { type: string } }
    ForgotPasswordRequest:
      type: object
      additionalProperties: false
      required: [email]
      properties: { email: { type: string, format: email } }
    ResetPasswordRequest:
      type: object
      additionalProperties: false
      required: [token, new_password]
      properties:
        token: { type: string, minLength: 32 }
        new_password: { type: string, format: password, minLength: 12, maxLength: 256 }
    InviteUserRequest:
      type: object
      additionalProperties: false
      required: [email, role]
      properties:
        tenant_id: { type: string }
        email: { type: string, format: email }
        role: { type: string }
        permissions: { type: array, items: { type: string } }
    AcceptInviteRequest:
      type: object
      additionalProperties: false
      required: [name, password]
      properties:
        name: { type: string, minLength: 1 }
        password: { type: string, format: password, minLength: 12, maxLength: 256 }
    InviteReceipt:
      type: object
      required: [status]
      properties: { status: { type: string, const: delivery_queued } }
    StatusResponse:
      type: object
      required: [status]
      properties:
        status: { type: string }
        message: { type: string }
    UserList:
      type: object
      required: [data, next_cursor]
      properties:
        data: { type: array, items: { $ref: '#/components/schemas/User' } }
        next_cursor: { type: [string, 'null'] }
    PermissionList:
      type: object
      required: [data]
      properties: { data: { type: array, items: { type: string } } }
    RoleList:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            type: object
            required: [role, scope]
            properties:
              role: { type: string }
              scope: { type: string }
  responses:
    Unauthorized:
      description: Missing, invalid or expired credential
      content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } }
    Forbidden:
      description: Tenant or permission gate denied access
      content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } }
    NotFound:
      description: Resource not found
      content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } }
    Conflict:
      description: Resource already exists
      content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } }
    ValidationError:
      description: Request failed validation
      content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } }
    Unavailable:
      description: Required private delivery service unavailable
      content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } }
  securitySchemes:
    bearerAuth: { type: http, scheme: bearer, bearerFormat: JWT }
security:
  - bearerAuth: []
