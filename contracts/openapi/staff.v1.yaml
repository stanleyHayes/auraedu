openapi: 3.1.0
info:
  title: AuraEDU Staff Service API
  version: 1.0.0
  description: >
    Teachers and non-teaching staff (spec \u00a77). Owned by lane L2 (EP-11). Feature flag: staff_management.
servers:
  - url: /api/v1
tags:
  - name: staff
  - name: assignments

paths:
    /staff:
      get:
            operationId: listStaff
            tags: ['staff']
            summary: List staff
            parameters:
              - $ref: '#/components/parameters/TenantHeader'
              - $ref: '#/components/parameters/Limit'
              - $ref: '#/components/parameters/Cursor'
            responses:
              '200':
                description: OK
                content:
                  application/json:
                    schema: { $ref: '#/components/schemas/StaffList' }
              '403': { $ref: '#/components/responses/Forbidden' }
              '404': { $ref: '#/components/responses/NotFound' }
              '422': { $ref: '#/components/responses/ValidationError' }
              '401': { $ref: '#/components/responses/Unauthorized' }
      post:
            operationId: createStaff
            tags: ['staff']
            summary: Create a staff record
            parameters:
              - $ref: '#/components/parameters/TenantHeader'
            requestBody:
              required: true
              content:
                application/json:
                  schema: { $ref: '#/components/schemas/CreateStaff' }
            responses:
              '201':
                description: OK
                content:
                  application/json:
                    schema: { $ref: '#/components/schemas/Staff' }
              '403': { $ref: '#/components/responses/Forbidden' }
              '404': { $ref: '#/components/responses/NotFound' }
              '422': { $ref: '#/components/responses/ValidationError' }
              '401': { $ref: '#/components/responses/Unauthorized' }
    /staff/{staff_id}:
      get:
            operationId: getStaff
            tags: ['staff']
            summary: Get a staff record
            parameters:
              - $ref: '#/components/parameters/TenantHeader'
              - $ref: '#/components/parameters/TenantId'
            responses:
              '200':
                description: OK
                content:
                  application/json:
                    schema: { $ref: '#/components/schemas/Staff' }
              '403': { $ref: '#/components/responses/Forbidden' }
              '404': { $ref: '#/components/responses/NotFound' }
              '422': { $ref: '#/components/responses/ValidationError' }
              '401': { $ref: '#/components/responses/Unauthorized' }
      patch:
            operationId: updateStaff
            tags: ['staff']
            summary: Update a staff record
            parameters:
              - $ref: '#/components/parameters/TenantHeader'
              - $ref: '#/components/parameters/TenantId'
            requestBody:
              required: true
              content:
                application/json:
                  schema: { $ref: '#/components/schemas/UpdateStaff' }
            responses:
              '200':
                description: OK
                content:
                  application/json:
                    schema: { $ref: '#/components/schemas/Staff' }
              '403': { $ref: '#/components/responses/Forbidden' }
              '404': { $ref: '#/components/responses/NotFound' }
              '422': { $ref: '#/components/responses/ValidationError' }
              '401': { $ref: '#/components/responses/Unauthorized' }
    /staff/{staff_id}/assignments:
      get:
            operationId: listStaffAssignments
            tags: ['assignments']
            summary: List staff assignments
            parameters:
              - $ref: '#/components/parameters/TenantHeader'
              - $ref: '#/components/parameters/TenantId'
            responses:
              '200':
                description: OK
                content:
                  application/json:
                    schema: { $ref: '#/components/schemas/StaffAssignmentList' }
              '403': { $ref: '#/components/responses/Forbidden' }
              '404': { $ref: '#/components/responses/NotFound' }
              '422': { $ref: '#/components/responses/ValidationError' }
              '401': { $ref: '#/components/responses/Unauthorized' }
      post:
            operationId: createStaffAssignment
            tags: ['assignments']
            summary: Assign staff to class/subject
            parameters:
              - $ref: '#/components/parameters/TenantHeader'
              - $ref: '#/components/parameters/TenantId'
            requestBody:
              required: true
              content:
                application/json:
                  schema: { $ref: '#/components/schemas/CreateStaffAssignment' }
            responses:
              '201':
                description: OK
                content:
                  application/json:
                    schema: { $ref: '#/components/schemas/StaffAssignment' }
              '403': { $ref: '#/components/responses/Forbidden' }
              '404': { $ref: '#/components/responses/NotFound' }
              '422': { $ref: '#/components/responses/ValidationError' }
              '401': { $ref: '#/components/responses/Unauthorized' }

components:
  parameters:
    TenantId:
      name: tenant_id
      in: path
      required: true
      schema: { type: string, format: uuid }
    TenantHeader:
      name: X-Tenant-Code
      in: header
      required: false
      description: Optional tenant code for resolution when the gateway cannot derive it from the host.
      schema: { type: string, example: upshs }
    Limit:
      name: limit
      in: query
      schema: { type: integer, minimum: 1, maximum: 100, default: 25 }
    Cursor:
      name: cursor
      in: query
      schema: { type: string }

  schemas:
    Error:
      type: object
      required: [code, message]
      properties:
        code: { type: string, enum: [forbidden, feature_disabled, tenant_mismatch, validation_error, not_found, unauthorized] }
        message: { type: string }
        request_id: { type: string }
    Staff:
        type: object
        required: [id, tenant_id, first_name, last_name, staff_type]
        properties:
          id: { type: string, format: uuid }
          tenant_id: { type: string, format: uuid }
          first_name: { type: string }
          last_name: { type: string }
          staff_type: { type: string, enum: [teacher, non_teaching] }
          email: { type: [string, 'null'], format: email }
          staff_code: { type: string }
          created_at: { type: string, format: date-time }
    CreateStaff:
        type: object
        required: [first_name, last_name, staff_type]
        properties:
          first_name: { type: string }
          last_name: { type: string }
          staff_type: { type: string, enum: [teacher, non_teaching] }
          email: { type: [string, 'null'], format: email }
    UpdateStaff:
        type: object
        properties:
          first_name: { type: string }
          last_name: { type: string }
          staff_type: { type: string, enum: [teacher, non_teaching] }
          email: { type: [string, 'null'], format: email }
    StaffAssignment:
        type: object
        required: [id, staff_id]
        properties:
          id: { type: string, format: uuid }
          staff_id: { type: string, format: uuid }
          class_id: { type: [string, 'null'], format: uuid }
          subject_id: { type: [string, 'null'], format: uuid }
          role: { type: [string, 'null'] }
          assigned_at: { type: string, format: date-time }
    CreateStaffAssignment:
        type: object
        required: [class_id]
        properties:
          class_id: { type: string, format: uuid }
          subject_id: { type: [string, 'null'], format: uuid }
          role: { type: [string, 'null'] }
    StaffList:
        type: object
        properties:
          data: { type: array, items: { $ref: '#/components/schemas/Staff' } }
          next_cursor: { type: [string, 'null'] }
    StaffAssignmentList:
        type: object
        properties:
          data: { type: array, items: { $ref: '#/components/schemas/StaffAssignment' } }
          next_cursor: { type: [string, 'null'] }

  responses:
    Unauthorized:
      description: Missing or invalid bearer token
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
          example: { code: unauthorized, message: "Authentication required" }
    Forbidden:
      description: Not permitted (auth, tenant scope, RBAC, or feature disabled)
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
          examples:
            forbidden: { value: { code: forbidden, message: "Missing required permission" } }
            feature_disabled: { value: { code: feature_disabled, message: "Feature not enabled for tenant" } }
            tenant_mismatch: { value: { code: tenant_mismatch, message: "Resource belongs to another tenant" } }
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
          example: { code: not_found, message: "Resource not found" }
    ValidationError:
      description: Request failed validation
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
          example: { code: validation_error, message: "request body is invalid" }

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

security:
  - bearerAuth: []

