openapi: 3.1.0
info:
  title: AuraEDU Student Internal API
  version: 1.0.0
  description: Authenticated private scope resolution for services that hold learner-owned records.
  contact:
    name: AuraEDU Engineering
tags:
  - name: learner-scope

servers: [{ url: / }]

paths:
  /internal/v1/learner-scope:
    get:
      operationId: resolveLearnerScope
      description: Executes the resolve learner scope workflow within this AuraEDU API boundary.
      tags: ['learner-scope']
      summary: Resolve the student records and classes an authenticated learner or teacher may access
      parameters:
        - name: X-Tenant-ID
          in: header
          required: true
          schema: { type: string }
        - name: user_id
          in: query
          required: true
          schema: { type: string }
        - name: role
          in: query
          required: true
          schema: { type: string, enum: [parent, student, teacher] }
      responses:
        '200':
          description: Resolved learner identifiers
          content:
            application/json:
              schema:
                type: object
                required: [student_ids, class_ids]
                properties:
                  student_ids:
                    type: array
                    items: { type: string, format: uuid }
                  class_ids:
                    type: array
                    items: { type: string, format: uuid }
        '401': { description: Invalid service credentials }
        '403': { description: Unsupported role or tenant }
        '404': { description: No linked learner identity }
components:
  securitySchemes:
    serviceBearer:
      type: http
      scheme: bearer
security:
  - serviceBearer: []
