openapi: 3.1.0
info:
  title: AuraEDU AI Recommendation Service API
  version: 1.0.0
  description: >
    Learning recommendations and intervention suggestions (spec \u00a715).
    Owned by lane L3 (EP-30). Feature flag: ai_recommendations.
servers:
  - url: /api/v1/ai/recommendations
tags:
  - name: recommendations
  - name: feature-store

paths:
  /health:
    get:
      operationId: healthCheck
      tags: ['recommendations']
      summary: Service health check
      security: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status: { type: string, enum: [ok] }

  /feature-store/metrics:
    post:
      operationId: ingestFeatureStoreMetric
      tags: ['feature-store']
      summary: Ingest a single approved learning metric (for tests/admins)
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/IngestMetricRequest' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/FeatureStoreMetric' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /recommendations:
    get:
      operationId: listRecommendations
      tags: ['recommendations']
      summary: List recommendations for a student
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - name: student_id
          in: query
          required: true
          schema: { type: string, format: uuid }
        - name: status
          in: query
          schema: { type: string, enum: [pending, approved, rejected, overridden] }
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RecommendationList' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }

    post:
      operationId: generateRecommendations
      tags: ['recommendations']
      summary: Generate recommendations for a student
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/GenerateRecommendationsRequest' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RecommendationList' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /recommendations/{recommendation_id}:
    get:
      operationId: getRecommendation
      tags: ['recommendations']
      summary: Get a recommendation by ID
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - name: recommendation_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Recommendation' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /recommendations/{recommendation_id}/approve:
    post:
      operationId: approveRecommendation
      tags: ['recommendations']
      summary: Approve a pending recommendation
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - name: recommendation_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ApproveRecommendationRequest' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Recommendation' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /recommendations/{recommendation_id}/reject:
    post:
      operationId: rejectRecommendation
      tags: ['recommendations']
      summary: Reject a pending recommendation
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - name: recommendation_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RejectRecommendationRequest' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Recommendation' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /recommendations/{recommendation_id}/override:
    post:
      operationId: overrideRecommendation
      tags: ['recommendations']
      summary: Override a recommendation with a teacher-crafted action
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - name: recommendation_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/OverrideRecommendationRequest' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Recommendation' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /recommendations/{recommendation_id}/explain:
    get:
      operationId: explainRecommendation
      tags: ['recommendations']
      summary: Get explainability details for a recommendation
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - name: recommendation_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ExplainResponse' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '401': { $ref: '#/components/responses/Unauthorized' }

components:
  parameters:
    TenantHeader:
      name: X-Tenant-Code
      in: header
      required: false
      description: Tenant code (used when gateway cannot derive tenant from host).
      schema: { type: string, example: upshs }
    Limit:
      name: limit
      in: query
      schema: { type: integer, minimum: 1, maximum: 100, default: 25 }
    Cursor:
      name: cursor
      in: query
      schema: { type: string }

  schemas:
    Error:
      type: object
      required: [code, message]
      properties:
        code: { type: string, enum: [forbidden, feature_disabled, tenant_mismatch, validation_error, not_found, unauthorized] }
        message: { type: string }
        request_id: { type: string }

    FeatureStoreMetric:
      type: object
      required: [id, tenant_id, student_id, metric_key, value, source, recorded_at]
      properties:
        id: { type: string, format: uuid }
        tenant_id: { type: string, format: uuid }
        student_id: { type: string, format: uuid }
        metric_key: { type: string }
        value: { type: number }
        source: { type: string, enum: [assessment, attendance, analytics] }
        recorded_at: { type: string, format: date-time }
        created_at: { type: string, format: date-time }

    IngestMetricRequest:
      type: object
      required: [student_id, metric_key, value, source, recorded_at]
      properties:
        student_id: { type: string, format: uuid }
        metric_key: { type: string }
        value: { type: number }
        source: { type: string, enum: [assessment, attendance, analytics] }
        recorded_at: { type: string, format: date-time }

    GenerateRecommendationsRequest:
      type: object
      required: [student_id]
      properties:
        student_id: { type: string, format: uuid }
        recommendation_types: { type: array, items: { type: string } }

    Recommendation:
      type: object
      required: [id, tenant_id, student_id, recommendation_type, title, status, confidence, explanation, created_at]
      properties:
        id: { type: string, format: uuid }
        tenant_id: { type: string, format: uuid }
        student_id: { type: string, format: uuid }
        recommendation_type: { type: string }
        title: { type: string }
        description: { type: [string, 'null'] }
        status: { type: string, enum: [pending, approved, rejected, overridden] }
        confidence: { type: number, minimum: 0, maximum: 1 }
        explanation: { type: [string, 'null'] }
        approved_by: { type: [string, 'null'], format: uuid }
        approved_at: { type: [string, 'null'], format: date-time }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    RecommendationList:
      type: object
      properties:
        data: { type: array, items: { $ref: '#/components/schemas/Recommendation' } }
        next_cursor: { type: [string, 'null'] }

    ApproveRecommendationRequest:
      type: object
      properties:
        note: { type: [string, 'null'] }

    RejectRecommendationRequest:
      type: object
      properties:
        reason: { type: [string, 'null'] }

    OverrideRecommendationRequest:
      type: object
      required: [title]
      properties:
        title: { type: string }
        description: { type: [string, 'null'] }
        note: { type: [string, 'null'] }

    ExplainResponse:
      type: object
      required: [recommendation_id, factors]
      properties:
        recommendation_id: { type: string, format: uuid }
        factors: { type: array, items: { $ref: '#/components/schemas/ExplainFactor' } }
        model_notes: { type: [string, 'null'] }

    ExplainFactor:
      type: object
      required: [metric_key, value, contribution]
      properties:
        metric_key: { type: string }
        value: { type: number }
        contribution: { type: string, enum: [strong_positive, positive, neutral, negative, strong_negative] }

  responses:
    Unauthorized:
      description: Missing or invalid bearer token
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
          example: { code: unauthorized, message: "Authentication required" }
    Forbidden:
      description: Not permitted (auth, tenant scope, RBAC, or feature disabled)
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
          examples:
            forbidden: { value: { code: forbidden, message: "Missing required permission" } }
            feature_disabled: { value: { code: feature_disabled, message: "Feature not enabled for tenant" } }
            tenant_mismatch: { value: { code: tenant_mismatch, message: "Resource belongs to another tenant" } }
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
          example: { code: not_found, message: "Resource not found" }
    ValidationError:
      description: Request failed validation
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
          example: { code: validation_error, message: "request body is invalid" }

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

security:
  - bearerAuth: []
