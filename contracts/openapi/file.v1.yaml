openapi: 3.1.0
info:
  title: AuraEDU File Service API
  version: 1.0.0
  description: >
    Uploads, documents, images, and certificates backed by Cloudinary (spec \u00a77). Owned by lane L2 (EP-20).
servers:
  - url: /api/v1
tags:
  - name: uploads
  - name: files

paths:
    /uploads/signed:
      post:
            operationId: requestSignedUpload
            tags: ['uploads']
            summary: Request a signed Cloudinary upload
            parameters:
              - $ref: '#/components/parameters/TenantHeader'
            requestBody:
              required: true
              content:
                application/json:
                  schema: { $ref: '#/components/schemas/SignedUploadRequest' }
            responses:
              '201':
                description: OK
                content:
                  application/json:
                    schema: { $ref: '#/components/schemas/SignedUploadResponse' }
              '403': { $ref: '#/components/responses/Forbidden' }
              '404': { $ref: '#/components/responses/NotFound' }
              '422': { $ref: '#/components/responses/ValidationError' }
              '401': { $ref: '#/components/responses/Unauthorized' }
    /files:
      get:
            operationId: listFiles
            tags: ['files']
            summary: List files
            parameters:
              - $ref: '#/components/parameters/TenantHeader'
              - $ref: '#/components/parameters/Limit'
              - $ref: '#/components/parameters/Cursor'
            responses:
              '200':
                description: OK
                content:
                  application/json:
                    schema: { $ref: '#/components/schemas/FileList' }
              '403': { $ref: '#/components/responses/Forbidden' }
              '404': { $ref: '#/components/responses/NotFound' }
              '422': { $ref: '#/components/responses/ValidationError' }
              '401': { $ref: '#/components/responses/Unauthorized' }
    /files/{file_id}:
      get:
            operationId: getFile
            tags: ['files']
            summary: Get a file
            parameters:
              - $ref: '#/components/parameters/TenantHeader'
              - $ref: '#/components/parameters/TenantId'
            responses:
              '200':
                description: OK
                content:
                  application/json:
                    schema: { $ref: '#/components/schemas/File' }
              '403': { $ref: '#/components/responses/Forbidden' }
              '404': { $ref: '#/components/responses/NotFound' }
              '422': { $ref: '#/components/responses/ValidationError' }
              '401': { $ref: '#/components/responses/Unauthorized' }
      delete:
            operationId: deleteFile
            tags: ['files']
            summary: Delete a file
            parameters:
              - $ref: '#/components/parameters/TenantHeader'
              - $ref: '#/components/parameters/TenantId'
            responses:
              '204':
                description: No content
              '403': { $ref: '#/components/responses/Forbidden' }
              '404': { $ref: '#/components/responses/NotFound' }
              '422': { $ref: '#/components/responses/ValidationError' }
              '401': { $ref: '#/components/responses/Unauthorized' }

components:
  parameters:
    TenantId:
      name: tenant_id
      in: path
      required: true
      schema: { type: string, format: uuid }
    TenantHeader:
      name: X-Tenant-Code
      in: header
      required: false
      description: Optional tenant code for resolution when the gateway cannot derive it from the host.
      schema: { type: string, example: upshs }
    Limit:
      name: limit
      in: query
      schema: { type: integer, minimum: 1, maximum: 100, default: 25 }
    Cursor:
      name: cursor
      in: query
      schema: { type: string }

  schemas:
    Error:
      type: object
      required: [code, message]
      properties:
        code: { type: string, enum: [forbidden, feature_disabled, tenant_mismatch, validation_error, not_found, unauthorized] }
        message: { type: string }
        request_id: { type: string }

  responses:
    Unauthorized:
      description: Missing or invalid bearer token
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
          example: { code: unauthorized, message: "Authentication required" }
    Forbidden:
      description: Not permitted (auth, tenant scope, RBAC, or feature disabled)
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
          examples:
            forbidden: { value: { code: forbidden, message: "Missing required permission" } }
            feature_disabled: { value: { code: feature_disabled, message: "Feature not enabled for tenant" } }
            tenant_mismatch: { value: { code: tenant_mismatch, message: "Resource belongs to another tenant" } }
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
          example: { code: not_found, message: "Resource not found" }
    ValidationError:
      description: Request failed validation
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
          example: { code: validation_error, message: "request body is invalid" }

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

security:
  - bearerAuth: []

    SignedUploadRequest:
        type: object
        required: [folder, file_name]
        properties:
          folder: { type: string, example: upshs/documents }
          file_name: { type: string }
          resource_type: { type: string, enum: [image, raw, video], default: image }
    SignedUploadResponse:
        type: object
        required: [signature, timestamp, api_key, folder]
        properties:
          signature: { type: string }
          timestamp: { type: integer }
          api_key: { type: string }
          folder: { type: string }
          cloud_name: { type: string }
          upload_url: { type: string }
    File:
        type: object
        required: [id, tenant_id, public_id, secure_url]
        properties:
          id: { type: string, format: uuid }
          tenant_id: { type: string, format: uuid }
          public_id: { type: string }
          secure_url: { type: string }
          resource_type: { type: string, enum: [image, raw, video] }
          folder: { type: string }
          uploaded_by: { type: [string, 'null'], format: uuid }
    FileList:
        type: object
        properties:
          data: { type: array, items: { $ref: '#/components/schemas/File' } }
          next_cursor: { type: [string, 'null'] }
