openapi: 3.1.0
info:
  title: AuraEDU Report Service API
  version: 1.0.0
  description: Tenant report templates, materialized report cards, secure PDF delivery, and derived transcripts.
  contact:
    name: AuraEDU Engineering
servers:
  - url: /api/v1
tags:
  - name: report-templates
  - name: report-cards
  - name: transcripts
paths:
  /report-templates:
    get:
      operationId: listReportTemplates
      description: Executes the list report templates workflow within this AuraEDU API boundary.
      tags: [report-templates]
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
        - { name: academic_year_id, in: query, schema: { type: string, format: uuid } }
        - { name: status, in: query, schema: { $ref: '#/components/schemas/TemplateStatus' } }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/ReportTemplateList' } } } }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
    post:
      operationId: createReportTemplate
      description: Executes the create report template workflow within this AuraEDU API boundary.
      tags: [report-templates]
      parameters: [{ $ref: '#/components/parameters/TenantHeader' }]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/CreateReportTemplate' } } }
      responses:
        '201': { description: Created, content: { application/json: { schema: { $ref: '#/components/schemas/ReportTemplate' } } } }
        '422': { $ref: '#/components/responses/ValidationError' }
  /report-templates/{template_id}:
    parameters:
      - $ref: '#/components/parameters/TenantHeader'
      - $ref: '#/components/parameters/TemplateId'
    get:
      operationId: getReportTemplate
      description: Executes the get report template workflow within this AuraEDU API boundary.
      tags: [report-templates]
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/ReportTemplate' } } } }
        '404': { $ref: '#/components/responses/NotFound' }
    patch:
      operationId: updateReportTemplate
      description: Executes the update report template workflow within this AuraEDU API boundary.
      tags: [report-templates]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/UpdateReportTemplate' } } }
      responses:
        '200': { description: Updated, content: { application/json: { schema: { $ref: '#/components/schemas/ReportTemplate' } } } }
        '422': { $ref: '#/components/responses/ValidationError' }
    delete:
      operationId: deleteReportTemplate
      description: Executes the delete report template workflow within this AuraEDU API boundary.
      tags: [report-templates]
      responses:
        '204': { description: Deleted }
        '404': { $ref: '#/components/responses/NotFound' }
  /report-cards:
    get:
      operationId: listReportCards
      description: Executes the list report cards workflow within this AuraEDU API boundary.
      tags: [report-cards]
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
        - { name: academic_year_id, in: query, schema: { type: string, format: uuid } }
        - { name: status, in: query, schema: { $ref: '#/components/schemas/ReportCardStatus' } }
        - { name: student_id, in: query, schema: { type: string, format: uuid } }
        - { name: template_id, in: query, schema: { type: string, format: uuid } }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/ReportCardList' } } } }
    post:
      operationId: createReportCard
      description: Executes the create report card workflow within this AuraEDU API boundary.
      tags: [report-cards]
      parameters: [{ $ref: '#/components/parameters/TenantHeader' }]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/CreateReportCard' } } }
      responses:
        '201': { description: Created, content: { application/json: { schema: { $ref: '#/components/schemas/ReportCard' } } } }
        '422': { $ref: '#/components/responses/ValidationError' }
  /report-cards/{report_card_id}:
    parameters:
      - $ref: '#/components/parameters/TenantHeader'
      - $ref: '#/components/parameters/ReportCardId'
    get:
      operationId: getReportCard
      description: Executes the get report card workflow within this AuraEDU API boundary.
      tags: [report-cards]
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/ReportCard' } } } }
        '404': { $ref: '#/components/responses/NotFound' }
    patch:
      operationId: updateReportCard
      description: Executes the update report card workflow within this AuraEDU API boundary.
      tags: [report-cards]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/UpdateReportCard' } } }
      responses:
        '200': { description: Updated, content: { application/json: { schema: { $ref: '#/components/schemas/ReportCard' } } } }
        '422': { $ref: '#/components/responses/ValidationError' }
    delete:
      operationId: deleteReportCard
      description: Executes the delete report card workflow within this AuraEDU API boundary.
      tags: [report-cards]
      responses:
        '204': { description: Deleted }
        '404': { $ref: '#/components/responses/NotFound' }
  /report-cards/{report_card_id}/generate:
    post:
      operationId: generateReportCard
      description: Executes the generate report card workflow within this AuraEDU API boundary.
      tags: [report-cards]
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - $ref: '#/components/parameters/ReportCardId'
      responses:
        '202': { description: Durable PDF generation job accepted; the returned card is in generating state, content: { application/json: { schema: { $ref: '#/components/schemas/ReportCard' } } } }
        '409': { description: The card is already generating or cannot be generated from its current state, content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }
        '404': { $ref: '#/components/responses/NotFound' }
  /report-cards/{report_card_id}/download:
    get:
      operationId: downloadReportCard
      description: Executes the download report card workflow within this AuraEDU API boundary.
      tags: [report-cards]
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - $ref: '#/components/parameters/ReportCardId'
      responses:
        '200':
          description: Published report-card PDF
          content: { application/pdf: { schema: { type: string, contentEncoding: binary } } }
        '404': { $ref: '#/components/responses/NotFound' }
  /transcripts/{student_id}:
    get:
      operationId: getTranscript
      description: Executes the get transcript workflow within this AuraEDU API boundary.
      tags: [transcripts]
      summary: Derive a learner transcript from published and archived report-card evidence
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - $ref: '#/components/parameters/StudentId'
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Transcript' } } } }
        '404': { $ref: '#/components/responses/NotFound' }
components:
  parameters:
    TenantHeader:
      name: X-Tenant-Code
      in: header
      required: false
      schema: { type: string, example: upshs }
    Limit:
      name: limit
      in: query
      schema: { type: integer, minimum: 1, maximum: 100, default: 25 }
    Cursor:
      name: cursor
      in: query
      schema: { type: string }
    TemplateId:
      name: template_id
      in: path
      required: true
      schema: { type: string, format: uuid }
    ReportCardId:
      name: report_card_id
      in: path
      required: true
      schema: { type: string, format: uuid }
    StudentId:
      name: student_id
      in: path
      required: true
      schema: { type: string, format: uuid }
  schemas:
    Error:
      type: object
      required: [code, message]
      properties:
        code: { type: string }
        message: { type: string }
        request_id: { type: string }
    TemplateStatus: { type: string, enum: [draft, active, archived] }
    ReportCardStatus: { type: string, enum: [draft, generating, published, archived] }
    ReportTemplate:
      type: object
      required: [id, tenant_id, name, academic_year_id, body_template, status, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        tenant_id: { type: string, minLength: 1 }
        name: { type: string }
        academic_year_id: { type: string, format: uuid }
        body_template: { type: string }
        status: { $ref: '#/components/schemas/TemplateStatus' }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    CreateReportTemplate:
      type: object
      required: [name, academic_year_id, body_template]
      properties:
        name: { type: string, minLength: 1 }
        academic_year_id: { type: string, format: uuid }
        body_template: { type: string, minLength: 1 }
    UpdateReportTemplate:
      type: object
      minProperties: 1
      properties:
        name: { type: string, minLength: 1 }
        academic_year_id: { type: string, format: uuid }
        body_template: { type: string, minLength: 1 }
        status: { $ref: '#/components/schemas/TemplateStatus' }
    ReportCard:
      type: object
      required: [id, tenant_id, student_id, status, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        tenant_id: { type: string, minLength: 1 }
        student_id: { type: string, format: uuid }
        academic_year_id: { type: string, format: uuid }
        term_id: { type: string, format: uuid }
        template_id: { type: string, format: uuid }
        status: { $ref: '#/components/schemas/ReportCardStatus' }
        generated_at: { type: [string, 'null'], format: date-time }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    CreateReportCard:
      type: object
      required: [student_id, academic_year_id, term_id, template_id]
      properties:
        student_id: { type: string, format: uuid }
        academic_year_id: { type: string, format: uuid }
        term_id: { type: string, format: uuid }
        template_id: { type: string, format: uuid }
    UpdateReportCard:
      type: object
      minProperties: 1
      properties:
        student_id: { type: string, format: uuid }
        academic_year_id: { type: string, format: uuid }
        template_id: { type: string, format: uuid }
        status: { $ref: '#/components/schemas/ReportCardStatus' }
    SubjectScore:
      type: object
      required: [label, score, count]
      properties:
        label: { type: string }
        score: { type: number }
        max_score: { type: number }
        count: { type: integer, minimum: 1 }
    AttendanceSummary:
      type: object
      required: [present, absent, late, excused]
      properties:
        present: { type: integer, minimum: 0 }
        absent: { type: integer, minimum: 0 }
        late: { type: integer, minimum: 0 }
        excused: { type: integer, minimum: 0 }
    TranscriptEntry:
      type: object
      required: [report_card_id, published_at, scores, attendance]
      properties:
        report_card_id: { type: string, format: uuid }
        academic_year_id: { type: string, format: uuid }
        term_id: { type: string, format: uuid }
        published_at: { type: string, format: date-time }
        scores: { type: array, items: { $ref: '#/components/schemas/SubjectScore' } }
        attendance: { $ref: '#/components/schemas/AttendanceSummary' }
    Transcript:
      type: object
      required: [tenant_id, student_id, entries, generated_at]
      properties:
        tenant_id: { type: string, minLength: 1 }
        student_id: { type: string, format: uuid }
        entries: { type: array, items: { $ref: '#/components/schemas/TranscriptEntry' } }
        generated_at: { type: string, format: date-time }
    ReportCardList:
      type: object
      required: [data]
      properties:
        data: { type: array, items: { $ref: '#/components/schemas/ReportCard' } }
        next_cursor: { type: [string, 'null'] }
    ReportTemplateList:
      type: object
      required: [data]
      properties:
        data: { type: array, items: { $ref: '#/components/schemas/ReportTemplate' } }
        next_cursor: { type: [string, 'null'] }
  responses:
    Unauthorized: { description: Missing or invalid bearer token }
    Forbidden: { description: "Not permitted, wrong tenant, or feature disabled" }
    NotFound: { description: Resource not found or outside learner scope }
    ValidationError: { description: Request failed validation }
  securitySchemes:
    bearerAuth: { type: http, scheme: bearer, bearerFormat: JWT }
security:
  - bearerAuth: []
