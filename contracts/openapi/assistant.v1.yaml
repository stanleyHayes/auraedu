openapi: 3.1.0
info:
  title: AuraEDU Website Admissions Assistant API
  version: 1.0.0
  description: Public, tenant-grounded admissions questions with citations, uncertainty and human escalation.
  contact:
    name: AuraEDU Engineering
servers:
  - url: /api/v1
tags:
  - name: assistant

paths:
  /public/assistant/messages:
    post:
      operationId: askWebsiteAssistant
      description: Executes the ask website assistant workflow within this AuraEDU API boundary.
      tags: ['assistant']
      security: []
      parameters:
        - name: X-Tenant-Code
          in: header
          required: true
          schema: { type: string, pattern: '^[a-z0-9][a-z0-9-]{1,62}$' }
        - name: Idempotency-Key
          in: header
          required: true
          schema: { type: string, minLength: 16, maxLength: 128 }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [question]
              properties:
                session_id: { type: [string, 'null'], format: uuid }
                question: { type: string, minLength: 2, maxLength: 500 }
                locale: { type: string, enum: [en, en-GH, fr, fr-GH], default: en }
              additionalProperties: false
      responses:
        '200':
          description: Grounded answer or explicit uncertainty response
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AssistantResponse' }
        '422': { $ref: '#/components/responses/ValidationError' }
        '429': { $ref: '#/components/responses/RateLimited' }
        '503': { $ref: '#/components/responses/Unavailable' }
components:
  schemas:
    AssistantResponse:
      type: object
      required: [session_id, message_id, answer, confidence, citations, needs_human, locale, created_at]
      properties:
        session_id: { type: string, format: uuid }
        message_id: { type: string, format: uuid }
        answer: { type: string }
        confidence: { type: number, minimum: 0, maximum: 1 }
        citations:
          type: array
          maxItems: 5
          items:
            type: object
            required: [source_id, title, version]
            properties:
              source_id: { type: string, format: uuid }
              title: { type: string }
              version: { type: integer, minimum: 1 }
        needs_human: { type: boolean }
        escalation_message: { type: [string, 'null'] }
        locale: { type: string, enum: [en, en-GH, fr, fr-GH] }
        created_at: { type: string, format: date-time }
    Error:
      type: object
      required: [code, message]
      properties:
        code: { type: string }
        message: { type: string }
  responses:
    ValidationError:
      description: Request failed validation
      content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } }
    RateLimited:
      description: Public assistant rate limit exceeded
      headers:
        Retry-After: { schema: { type: integer } }
      content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } }
    Unavailable:
      description: Approved knowledge retrieval is unavailable
      content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } }
