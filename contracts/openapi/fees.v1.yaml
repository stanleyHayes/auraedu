openapi: 3.1.0
info:
  title: AuraEDU Fees Service API
  version: 1.0.0
  description: >
    Fee structures, invoices, balances, and receipts (spec \u00a77). Owned by lane L2 (EP-16). Feature flag: fees.
servers:
  - url: /api/v1
tags:
  - name: fee-structures
  - name: invoices
  - name: balances
  - name: receipts

paths:
    /fee-structures:
      get:
            operationId: listFeeStructures
            tags: ['fee-structures']
            summary: List fee structures
            parameters:
              - $ref: '#/components/parameters/TenantHeader'
              - $ref: '#/components/parameters/Limit'
              - $ref: '#/components/parameters/Cursor'
            responses:
              '200':
                description: OK
                content:
                  application/json:
                    schema: { $ref: '#/components/schemas/FeeStructureList' }
              '403': { $ref: '#/components/responses/Forbidden' }
              '404': { $ref: '#/components/responses/NotFound' }
              '422': { $ref: '#/components/responses/ValidationError' }
              '401': { $ref: '#/components/responses/Unauthorized' }
      post:
            operationId: createFeeStructure
            tags: ['fee-structures']
            summary: Create a fee structure
            parameters:
              - $ref: '#/components/parameters/TenantHeader'
            requestBody:
              required: true
              content:
                application/json:
                  schema: { $ref: '#/components/schemas/CreateFeeStructure' }
            responses:
              '201':
                description: OK
                content:
                  application/json:
                    schema: { $ref: '#/components/schemas/FeeStructure' }
              '403': { $ref: '#/components/responses/Forbidden' }
              '404': { $ref: '#/components/responses/NotFound' }
              '422': { $ref: '#/components/responses/ValidationError' }
              '401': { $ref: '#/components/responses/Unauthorized' }
    /invoices:
      get:
            operationId: listInvoices
            tags: ['invoices']
            summary: List invoices
            parameters:
              - $ref: '#/components/parameters/TenantHeader'
              - $ref: '#/components/parameters/Limit'
              - $ref: '#/components/parameters/Cursor'
            responses:
              '200':
                description: OK
                content:
                  application/json:
                    schema: { $ref: '#/components/schemas/InvoiceList' }
              '403': { $ref: '#/components/responses/Forbidden' }
              '404': { $ref: '#/components/responses/NotFound' }
              '422': { $ref: '#/components/responses/ValidationError' }
              '401': { $ref: '#/components/responses/Unauthorized' }
      post:
            operationId: createInvoice
            tags: ['invoices']
            summary: Create an invoice
            parameters:
              - $ref: '#/components/parameters/TenantHeader'
            requestBody:
              required: true
              content:
                application/json:
                  schema: { $ref: '#/components/schemas/CreateInvoice' }
            responses:
              '201':
                description: OK
                content:
                  application/json:
                    schema: { $ref: '#/components/schemas/Invoice' }
              '403': { $ref: '#/components/responses/Forbidden' }
              '404': { $ref: '#/components/responses/NotFound' }
              '422': { $ref: '#/components/responses/ValidationError' }
              '401': { $ref: '#/components/responses/Unauthorized' }
    /invoices/{invoice_id}:
      get:
            operationId: getInvoice
            tags: ['invoices']
            summary: Get an invoice
            parameters:
              - $ref: '#/components/parameters/TenantHeader'
              - $ref: '#/components/parameters/TenantId'
            responses:
              '200':
                description: OK
                content:
                  application/json:
                    schema: { $ref: '#/components/schemas/Invoice' }
              '403': { $ref: '#/components/responses/Forbidden' }
              '404': { $ref: '#/components/responses/NotFound' }
              '422': { $ref: '#/components/responses/ValidationError' }
              '401': { $ref: '#/components/responses/Unauthorized' }
    /balances/{student_id}:
      get:
            operationId: getBalance
            tags: ['balances']
            summary: Get a student balance
            parameters:
              - $ref: '#/components/parameters/TenantHeader'
              - $ref: '#/components/parameters/TenantId'
            responses:
              '200':
                description: OK
                content:
                  application/json:
                    schema: { $ref: '#/components/schemas/Balance' }
              '403': { $ref: '#/components/responses/Forbidden' }
              '404': { $ref: '#/components/responses/NotFound' }
              '422': { $ref: '#/components/responses/ValidationError' }
              '401': { $ref: '#/components/responses/Unauthorized' }
    /receipts/{receipt_id}:
      get:
            operationId: getReceipt
            tags: ['receipts']
            summary: Get a receipt
            parameters:
              - $ref: '#/components/parameters/TenantHeader'
              - $ref: '#/components/parameters/TenantId'
            responses:
              '200':
                description: OK
                content:
                  application/json:
                    schema: { $ref: '#/components/schemas/Receipt' }
              '403': { $ref: '#/components/responses/Forbidden' }
              '404': { $ref: '#/components/responses/NotFound' }
              '422': { $ref: '#/components/responses/ValidationError' }
              '401': { $ref: '#/components/responses/Unauthorized' }

components:
  parameters:
    TenantId:
      name: tenant_id
      in: path
      required: true
      schema: { type: string, format: uuid }
    TenantHeader:
      name: X-Tenant-Code
      in: header
      required: false
      description: Optional tenant code for resolution when the gateway cannot derive it from the host.
      schema: { type: string, example: upshs }
    Limit:
      name: limit
      in: query
      schema: { type: integer, minimum: 1, maximum: 100, default: 25 }
    Cursor:
      name: cursor
      in: query
      schema: { type: string }

  schemas:
    Error:
      type: object
      required: [code, message]
      properties:
        code: { type: string, enum: [forbidden, feature_disabled, tenant_mismatch, validation_error, not_found, unauthorized] }
        message: { type: string }
        request_id: { type: string }

  responses:
    Unauthorized:
      description: Missing or invalid bearer token
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
          example: { code: unauthorized, message: "Authentication required" }
    Forbidden:
      description: Not permitted (auth, tenant scope, RBAC, or feature disabled)
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
          examples:
            forbidden: { value: { code: forbidden, message: "Missing required permission" } }
            feature_disabled: { value: { code: feature_disabled, message: "Feature not enabled for tenant" } }
            tenant_mismatch: { value: { code: tenant_mismatch, message: "Resource belongs to another tenant" } }
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
          example: { code: not_found, message: "Resource not found" }
    ValidationError:
      description: Request failed validation
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
          example: { code: validation_error, message: "request body is invalid" }

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

security:
  - bearerAuth: []

    FeeStructure:
        type: object
        required: [id, tenant_id, name]
        properties:
          id: { type: string, format: uuid }
          tenant_id: { type: string, format: uuid }
          name: { type: string }
          class_ids: { type: array, items: { type: string, format: uuid } }
          amount: { type: number, minimum: 0 }
          term_id: { type: [string, 'null'], format: uuid }
    CreateFeeStructure:
        type: object
        required: [name, amount]
        properties:
          name: { type: string }
          class_ids: { type: array, items: { type: string, format: uuid } }
          amount: { type: number, minimum: 0 }
          term_id: { type: [string, 'null'], format: uuid }
    Invoice:
        type: object
        required: [id, tenant_id, student_id, amount_due]
        properties:
          id: { type: string, format: uuid }
          tenant_id: { type: string, format: uuid }
          student_id: { type: string, format: uuid }
          amount_due: { type: number, minimum: 0 }
          amount_paid: { type: number, minimum: 0, default: 0 }
          due_date: { type: [string, 'null'], format: date }
          status: { type: string, enum: [pending, partial, paid, overdue] }
    CreateInvoice:
        type: object
        required: [student_id, amount_due]
        properties:
          student_id: { type: string, format: uuid }
          amount_due: { type: number, minimum: 0 }
          due_date: { type: [string, 'null'], format: date }
    Balance:
        type: object
        required: [student_id, total_due, total_paid]
        properties:
          student_id: { type: string, format: uuid }
          total_due: { type: number, minimum: 0 }
          total_paid: { type: number, minimum: 0 }
          outstanding: { type: number }
    Receipt:
        type: object
        required: [id, tenant_id, invoice_id, amount]
        properties:
          id: { type: string, format: uuid }
          tenant_id: { type: string, format: uuid }
          invoice_id: { type: string, format: uuid }
          amount: { type: number, minimum: 0 }
          payment_id: { type: [string, 'null'], format: uuid }
          issued_at: { type: string, format: date-time }
    FeeStructureList:
        type: object
        properties:
          data: { type: array, items: { $ref: '#/components/schemas/FeeStructure' } }
          next_cursor: { type: [string, 'null'] }
    InvoiceList:
        type: object
        properties:
          data: { type: array, items: { $ref: '#/components/schemas/Invoice' } }
          next_cursor: { type: [string, 'null'] }
