openapi: 3.1.0
info:
  title: AuraEDU Fees Service API
  version: 1.0.0
  description: Tenant-scoped fee structures, learner invoices, currency-safe balances and immutable payment receipts.
  contact:
    name: AuraEDU Engineering
servers:
  - url: /api/v1
tags:
  - name: fee-structures
  - name: invoices
  - name: balances
  - name: receipts

paths:
  /fee-structures:
    get:
      operationId: listFeeStructures
      description: Executes the list fee structures workflow within this AuraEDU API boundary.
      tags: [fee-structures]
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
        - { name: academic_year_id, in: query, schema: { type: string, format: uuid } }
        - { name: status, in: query, schema: { type: string, enum: [active, archived] } }
      responses:
        '200': { description: Fee structures, content: { application/json: { schema: { $ref: '#/components/schemas/FeeStructureList' } } } }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
    post:
      operationId: createFeeStructure
      description: Executes the create fee structure workflow within this AuraEDU API boundary.
      tags: [fee-structures]
      parameters: [{ $ref: '#/components/parameters/TenantHeader' }]
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/CreateFeeStructure' } } } }
      responses:
        '201': { description: Created fee structure, content: { application/json: { schema: { $ref: '#/components/schemas/FeeStructure' } } } }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422': { $ref: '#/components/responses/ValidationError' }
  /fee-structures/{fee_structure_id}:
    get:
      operationId: getFeeStructure
      description: Executes the get fee structure workflow within this AuraEDU API boundary.
      tags: [fee-structures]
      parameters: [{ $ref: '#/components/parameters/TenantHeader' }, { $ref: '#/components/parameters/FeeStructureId' }]
      responses:
        '200': { description: Fee structure, content: { application/json: { schema: { $ref: '#/components/schemas/FeeStructure' } } } }
        '404': { $ref: '#/components/responses/NotFound' }
    patch:
      operationId: updateFeeStructure
      description: Executes the update fee structure workflow within this AuraEDU API boundary.
      tags: [fee-structures]
      parameters: [{ $ref: '#/components/parameters/TenantHeader' }, { $ref: '#/components/parameters/FeeStructureId' }]
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/UpdateFeeStructure' } } } }
      responses:
        '200': { description: Updated fee structure, content: { application/json: { schema: { $ref: '#/components/schemas/FeeStructure' } } } }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/ValidationError' }
    delete:
      operationId: deleteFeeStructure
      description: Executes the delete fee structure workflow within this AuraEDU API boundary.
      tags: [fee-structures]
      parameters: [{ $ref: '#/components/parameters/TenantHeader' }, { $ref: '#/components/parameters/FeeStructureId' }]
      responses:
        '204': { description: Fee structure deleted }
        '404': { $ref: '#/components/responses/NotFound' }

  /invoices:
    get:
      operationId: listInvoices
      description: Executes the list invoices workflow within this AuraEDU API boundary.
      tags: [invoices]
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
        - { name: student_id, in: query, schema: { type: string, format: uuid } }
        - { name: fee_structure_id, in: query, schema: { type: string, format: uuid } }
        - { name: status, in: query, schema: { type: string, enum: [draft, pending, partial, paid, overdue, cancelled] } }
      responses:
        '200': { description: Invoices, content: { application/json: { schema: { $ref: '#/components/schemas/InvoiceList' } } } }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
    post:
      operationId: createInvoice
      description: Executes the create invoice workflow within this AuraEDU API boundary.
      tags: [invoices]
      parameters: [{ $ref: '#/components/parameters/TenantHeader' }]
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/CreateInvoice' } } } }
      responses:
        '201': { description: Created invoice, content: { application/json: { schema: { $ref: '#/components/schemas/Invoice' } } } }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422': { $ref: '#/components/responses/ValidationError' }
  /invoices/{invoice_id}:
    get:
      operationId: getInvoice
      description: Executes the get invoice workflow within this AuraEDU API boundary.
      tags: [invoices]
      parameters: [{ $ref: '#/components/parameters/TenantHeader' }, { $ref: '#/components/parameters/InvoiceId' }]
      responses:
        '200': { description: Invoice, content: { application/json: { schema: { $ref: '#/components/schemas/Invoice' } } } }
        '404': { $ref: '#/components/responses/NotFound' }
    patch:
      operationId: updateInvoice
      description: Executes the update invoice workflow within this AuraEDU API boundary.
      tags: [invoices]
      parameters: [{ $ref: '#/components/parameters/TenantHeader' }, { $ref: '#/components/parameters/InvoiceId' }]
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/UpdateInvoice' } } } }
      responses:
        '200': { description: Updated invoice, content: { application/json: { schema: { $ref: '#/components/schemas/Invoice' } } } }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/ValidationError' }
    delete:
      operationId: deleteInvoice
      description: Executes the delete invoice workflow within this AuraEDU API boundary.
      tags: [invoices]
      parameters: [{ $ref: '#/components/parameters/TenantHeader' }, { $ref: '#/components/parameters/InvoiceId' }]
      responses:
        '204': { description: Invoice deleted }
        '404': { $ref: '#/components/responses/NotFound' }

  /balances/{student_id}:
    get:
      operationId: getStudentBalance
      description: Executes the get student balance workflow within this AuraEDU API boundary.
      tags: [balances]
      summary: Derive the learner invoice ledger grouped by currency
      parameters: [{ $ref: '#/components/parameters/TenantHeader' }, { $ref: '#/components/parameters/StudentId' }]
      responses:
        '200': { description: Currency-safe balance, content: { application/json: { schema: { $ref: '#/components/schemas/Balance' } } } }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
  /receipts/{receipt_id}:
    get:
      operationId: getReceipt
      description: Executes the get receipt workflow within this AuraEDU API boundary.
      tags: [receipts]
      parameters: [{ $ref: '#/components/parameters/TenantHeader' }, { $ref: '#/components/parameters/ReceiptId' }]
      responses:
        '200': { description: Immutable payment receipt, content: { application/json: { schema: { $ref: '#/components/schemas/Receipt' } } } }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

components:
  parameters:
    FeeStructureId: { name: fee_structure_id, in: path, required: true, schema: { type: string, format: uuid } }
    InvoiceId: { name: invoice_id, in: path, required: true, schema: { type: string, format: uuid } }
    StudentId: { name: student_id, in: path, required: true, schema: { type: string, format: uuid } }
    ReceiptId: { name: receipt_id, in: path, required: true, schema: { type: string, format: uuid } }
    TenantHeader:
      name: X-Tenant-Code
      in: header
      required: false
      description: Optional tenant code when the gateway cannot derive it from the host.
      schema: { type: string, example: upshs }
    Limit: { name: limit, in: query, schema: { type: integer, minimum: 1, maximum: 100, default: 25 } }
    Cursor: { name: cursor, in: query, schema: { type: string } }

  schemas:
    Error:
      type: object
      required: [code, message]
      properties:
        code: { type: string, enum: [forbidden, feature_disabled, tenant_mismatch, validation_error, not_found, unauthorized] }
        message: { type: string }
        request_id: { type: string }
    FeeStructure:
      type: object
      required: [id, tenant_id, name, academic_year_id, amount_cents, currency, recurrence, target, status, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        tenant_id: { type: string }
        name: { type: string }
        academic_year_id: { type: string, format: uuid }
        amount_cents: { type: integer, minimum: 0 }
        currency: { type: string, minLength: 3, maxLength: 3 }
        recurrence: { type: string, enum: [one_time, termly, monthly, annually] }
        target: { type: string, enum: [all_students, specific_student] }
        due_day: { type: [integer, 'null'], minimum: 1, maximum: 31 }
        description: { type: [string, 'null'] }
        status: { type: string, enum: [active, archived] }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    CreateFeeStructure:
      type: object
      required: [name, academic_year_id, amount_cents, recurrence, target]
      properties:
        name: { type: string }
        academic_year_id: { type: string, format: uuid }
        amount_cents: { type: integer, minimum: 0 }
        currency: { type: string, minLength: 3, maxLength: 3, default: GHS }
        recurrence: { type: string, enum: [one_time, termly, monthly, annually] }
        target: { type: string, enum: [all_students, specific_student] }
        due_day: { type: [integer, 'null'], minimum: 1, maximum: 31 }
        description: { type: [string, 'null'] }
    UpdateFeeStructure:
      type: object
      minProperties: 1
      properties:
        name: { type: string }
        academic_year_id: { type: string, format: uuid }
        amount_cents: { type: integer, minimum: 0 }
        currency: { type: string, minLength: 3, maxLength: 3 }
        recurrence: { type: string, enum: [one_time, termly, monthly, annually] }
        target: { type: string, enum: [all_students, specific_student] }
        due_day: { type: [integer, 'null'], minimum: 1, maximum: 31 }
        description: { type: [string, 'null'] }
        status: { type: string, enum: [active, archived] }
    Invoice:
      type: object
      required: [id, tenant_id, student_id, fee_structure_id, amount_cents, balance_cents, status, issued_at, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        tenant_id: { type: string }
        student_id: { type: string, format: uuid }
        fee_structure_id: { type: string, format: uuid }
        amount_cents: { type: integer, minimum: 0 }
        balance_cents: { type: integer, minimum: 0 }
        status: { type: string, enum: [draft, pending, partial, paid, overdue, cancelled] }
        due_date: { type: string, description: YYYY-MM-DD or an empty string when no due date is configured. }
        issued_at: { type: string, format: date-time }
        notes: { type: [string, 'null'] }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    CreateInvoice:
      type: object
      required: [student_id, fee_structure_id]
      properties:
        student_id: { type: string, format: uuid }
        fee_structure_id: { type: string, format: uuid }
        amount_cents: { type: integer, minimum: 0, description: Zero or omitted derives the amount from the fee structure. }
        balance_cents: { type: integer, minimum: 0 }
        due_date: { type: string, format: date }
        notes: { type: [string, 'null'] }
    UpdateInvoice:
      type: object
      minProperties: 1
      properties:
        amount_cents: { type: integer, minimum: 0 }
        balance_cents: { type: integer, minimum: 0 }
        status: { type: string, enum: [draft, pending, partial, paid, overdue, cancelled] }
        due_date: { type: string, format: date }
        notes: { type: [string, 'null'] }
    CurrencyBalance:
      type: object
      required: [currency, total_invoiced_cents, total_paid_cents, outstanding_cents]
      properties:
        currency: { type: string, minLength: 3, maxLength: 3 }
        total_invoiced_cents: { type: integer, minimum: 0 }
        total_paid_cents: { type: integer, minimum: 0 }
        outstanding_cents: { type: integer, minimum: 0 }
    Balance:
      type: object
      required: [student_id, totals]
      properties:
        student_id: { type: string, format: uuid }
        totals: { type: array, items: { $ref: '#/components/schemas/CurrencyBalance' } }
    Receipt:
      type: object
      required: [id, tenant_id, invoice_id, student_id, payment_id, amount_cents, applied_cents, overpayment_cents, currency, issued_at]
      properties:
        id: { type: string, format: uuid }
        tenant_id: { type: string }
        invoice_id: { type: string, format: uuid }
        student_id: { type: string, format: uuid }
        payment_id: { type: string, format: uuid }
        amount_cents: { type: integer, minimum: 1 }
        applied_cents: { type: integer, minimum: 0 }
        overpayment_cents: { type: integer, minimum: 0 }
        currency: { type: string, minLength: 3, maxLength: 3 }
        provider_reference: { type: [string, 'null'] }
        issued_at: { type: string, format: date-time }
    FeeStructureList:
      type: object
      required: [data, next_cursor]
      properties:
        data: { type: array, items: { $ref: '#/components/schemas/FeeStructure' } }
        next_cursor: { type: [string, 'null'] }
    InvoiceList:
      type: object
      required: [data, next_cursor]
      properties:
        data: { type: array, items: { $ref: '#/components/schemas/Invoice' } }
        next_cursor: { type: [string, 'null'] }

  responses:
    Unauthorized:
      description: Missing or invalid bearer token
      content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } }
    Forbidden:
      description: Not permitted by authentication, tenant scope, RBAC or feature policy
      content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } }
    NotFound:
      description: Resource not found or hidden by learner ownership
      content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } }
    ValidationError:
      description: Request failed validation
      content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } }
  securitySchemes:
    bearerAuth: { type: http, scheme: bearer, bearerFormat: JWT }

security:
  - bearerAuth: []
