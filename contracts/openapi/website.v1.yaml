openapi: 3.1.0
info:
  title: AuraEDU Website Service API
  version: 1.0.0
  description: >
    Public site content, pages, and menus (spec \u00a77). Owned by lane L2 (EP-19). Feature flag: public_website.
  contact:
    name: AuraEDU Engineering
servers:
  - url: /api/v1/website
tags:
  - name: pages
  - name: sections
  - name: menus

paths:
    /pages:
      get:
            operationId: listPages
            description: Executes the list pages workflow within this AuraEDU API boundary.
            tags: ['pages']
            summary: List pages
            parameters:
              - $ref: '#/components/parameters/TenantHeader'
              - $ref: '#/components/parameters/Limit'
              - $ref: '#/components/parameters/Cursor'
            responses:
              '200':
                description: OK
                content:
                  application/json:
                    schema: { $ref: '#/components/schemas/PageList' }
              '403': { $ref: '#/components/responses/Forbidden' }
              '404': { $ref: '#/components/responses/NotFound' }
              '422': { $ref: '#/components/responses/ValidationError' }
              '401': { $ref: '#/components/responses/Unauthorized' }
      post:
            operationId: createPage
            description: Executes the create page workflow within this AuraEDU API boundary.
            tags: ['pages']
            summary: Create a page
            parameters:
              - $ref: '#/components/parameters/TenantHeader'
            requestBody:
              required: true
              content:
                application/json:
                  schema: { $ref: '#/components/schemas/CreatePage' }
            responses:
              '201':
                description: OK
                content:
                  application/json:
                    schema: { $ref: '#/components/schemas/Page' }
              '403': { $ref: '#/components/responses/Forbidden' }
              '404': { $ref: '#/components/responses/NotFound' }
              '422': { $ref: '#/components/responses/ValidationError' }
              '401': { $ref: '#/components/responses/Unauthorized' }
    /pages/{page_id}:
      get:
            operationId: getPage
            description: Executes the get page workflow within this AuraEDU API boundary.
            tags: ['pages']
            summary: Get a page by ID
            parameters:
              - $ref: '#/components/parameters/TenantHeader'
              - $ref: '#/components/parameters/PageId'
            responses:
              '200':
                description: OK
                content:
                  application/json:
                    schema: { $ref: '#/components/schemas/Page' }
              '403': { $ref: '#/components/responses/Forbidden' }
              '404': { $ref: '#/components/responses/NotFound' }
              '422': { $ref: '#/components/responses/ValidationError' }
              '401': { $ref: '#/components/responses/Unauthorized' }
      patch:
        operationId: updatePage
        description: Executes the update page workflow within this AuraEDU API boundary.
        tags: ['pages']
        summary: Update a page
        parameters:
          - $ref: '#/components/parameters/TenantHeader'
          - $ref: '#/components/parameters/PageId'
        requestBody:
          required: true
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UpdatePage' }
        responses:
          '200':
            description: Updated page
            content:
              application/json:
                schema: { $ref: '#/components/schemas/Page' }
          '401': { $ref: '#/components/responses/Unauthorized' }
          '403': { $ref: '#/components/responses/Forbidden' }
          '404': { $ref: '#/components/responses/NotFound' }
          '422': { $ref: '#/components/responses/ValidationError' }
      delete:
        operationId: deletePage
        description: Executes the delete page workflow within this AuraEDU API boundary.
        tags: ['pages']
        summary: Delete a page
        parameters:
          - $ref: '#/components/parameters/TenantHeader'
          - $ref: '#/components/parameters/PageId'
        responses:
          '204': { description: Page deleted }
          '401': { $ref: '#/components/responses/Unauthorized' }
          '403': { $ref: '#/components/responses/Forbidden' }
          '404': { $ref: '#/components/responses/NotFound' }
    /page-slugs/{slug}:
      get:
            operationId: getPageBySlug
            description: Executes the get page by slug workflow within this AuraEDU API boundary.
            tags: ['pages']
            summary: Get a page by slug
            parameters:
              - $ref: '#/components/parameters/TenantHeader'
              - $ref: '#/components/parameters/Slug'
            responses:
              '200':
                description: OK
                content:
                  application/json:
                    schema: { $ref: '#/components/schemas/Page' }
              '403': { $ref: '#/components/responses/Forbidden' }
              '404': { $ref: '#/components/responses/NotFound' }
              '422': { $ref: '#/components/responses/ValidationError' }
              '401': { $ref: '#/components/responses/Unauthorized' }
    /pages/{page_id}/sections:
      get:
        operationId: listSections
        description: Executes the list sections workflow within this AuraEDU API boundary.
        tags: ['sections']
        summary: List sections for a page
        parameters:
          - $ref: '#/components/parameters/TenantHeader'
          - $ref: '#/components/parameters/PageId'
          - $ref: '#/components/parameters/Limit'
          - $ref: '#/components/parameters/Cursor'
        responses:
          '200':
            description: Sections
            content:
              application/json:
                schema: { $ref: '#/components/schemas/SectionList' }
          '401': { $ref: '#/components/responses/Unauthorized' }
          '403': { $ref: '#/components/responses/Forbidden' }
          '404': { $ref: '#/components/responses/NotFound' }
      post:
        operationId: createSection
        description: Executes the create section workflow within this AuraEDU API boundary.
        tags: ['sections']
        summary: Create a page section
        parameters:
          - $ref: '#/components/parameters/TenantHeader'
          - $ref: '#/components/parameters/PageId'
        requestBody:
          required: true
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CreateSection' }
        responses:
          '201':
            description: Created section
            content:
              application/json:
                schema: { $ref: '#/components/schemas/Section' }
          '401': { $ref: '#/components/responses/Unauthorized' }
          '403': { $ref: '#/components/responses/Forbidden' }
          '404': { $ref: '#/components/responses/NotFound' }
          '422': { $ref: '#/components/responses/ValidationError' }
    /sections/{section_id}:
      get:
        operationId: getSection
        description: Executes the get section workflow within this AuraEDU API boundary.
        tags: ['sections']
        summary: Get a section
        parameters:
          - $ref: '#/components/parameters/TenantHeader'
          - $ref: '#/components/parameters/SectionId'
        responses:
          '200':
            description: Section
            content:
              application/json:
                schema: { $ref: '#/components/schemas/Section' }
          '401': { $ref: '#/components/responses/Unauthorized' }
          '403': { $ref: '#/components/responses/Forbidden' }
          '404': { $ref: '#/components/responses/NotFound' }
      patch:
        operationId: updateSection
        description: Executes the update section workflow within this AuraEDU API boundary.
        tags: ['sections']
        summary: Update a section
        parameters:
          - $ref: '#/components/parameters/TenantHeader'
          - $ref: '#/components/parameters/SectionId'
        requestBody:
          required: true
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UpdateSection' }
        responses:
          '200':
            description: Updated section
            content:
              application/json:
                schema: { $ref: '#/components/schemas/Section' }
          '401': { $ref: '#/components/responses/Unauthorized' }
          '403': { $ref: '#/components/responses/Forbidden' }
          '404': { $ref: '#/components/responses/NotFound' }
          '422': { $ref: '#/components/responses/ValidationError' }
      delete:
        operationId: deleteSection
        description: Executes the delete section workflow within this AuraEDU API boundary.
        tags: ['sections']
        summary: Delete a section
        parameters:
          - $ref: '#/components/parameters/TenantHeader'
          - $ref: '#/components/parameters/SectionId'
        responses:
          '204': { description: Section deleted }
          '401': { $ref: '#/components/responses/Unauthorized' }
          '403': { $ref: '#/components/responses/Forbidden' }
          '404': { $ref: '#/components/responses/NotFound' }

components:
  parameters:
    PageId:
      name: page_id
      in: path
      required: true
      schema: { type: string, format: uuid }
    SectionId:
      name: section_id
      in: path
      required: true
      schema: { type: string, format: uuid }
    Slug:
      name: slug
      in: path
      required: true
      schema: { type: string }
    TenantHeader:
      name: X-Tenant-Code
      in: header
      required: false
      description: Optional tenant code for resolution when the gateway cannot derive it from the host.
      schema: { type: string, example: upshs }
    Limit:
      name: limit
      in: query
      schema: { type: integer, minimum: 1, maximum: 100, default: 25 }
    Cursor:
      name: cursor
      in: query
      schema: { type: string }

  schemas:
    Error:
      type: object
      required: [code, message]
      properties:
        code: { type: string, enum: [forbidden, feature_disabled, tenant_mismatch, validation_error, not_found, unauthorized] }
        message: { type: string }
        request_id: { type: string }
    Page:
        type: object
        required: [id, tenant_id, slug, title, status, layout, created_at, updated_at]
        properties:
          id: { type: string, format: uuid }
          tenant_id: { type: string }
          slug: { type: string }
          title: { type: string }
          status: { type: string, enum: [draft, published, archived] }
          meta_description: { type: [string, 'null'] }
          layout: { type: string, enum: [default, landing, contact] }
          created_at: { type: string, format: date-time }
          updated_at: { type: string, format: date-time }
          published_at: { type: [string, 'null'], format: date-time }
    CreatePage:
        type: object
        required: [slug, title]
        properties:
          slug: { type: string }
          title: { type: string }
          status: { type: string, enum: [draft, published, archived], default: draft }
          meta_description: { type: [string, 'null'] }
          layout: { type: string, enum: [default, landing, contact], default: default }
    UpdatePage:
        type: object
        properties:
          slug: { type: string }
          title: { type: string }
          status: { type: string, enum: [draft, published, archived] }
          meta_description: { type: [string, 'null'] }
          layout: { type: string, enum: [default, landing, contact] }
    Section:
        type: object
        required: [id, tenant_id, page_id, type, sort_order, status, created_at, updated_at]
        properties:
          id: { type: string, format: uuid }
          tenant_id: { type: string }
          page_id: { type: string, format: uuid }
          type: { type: string, enum: [hero, text, features, gallery, cta, contact] }
          content: { type: object, additionalProperties: true }
          sort_order: { type: integer, minimum: 0 }
          status: { type: string, enum: [draft, published] }
          created_at: { type: string, format: date-time }
          updated_at: { type: string, format: date-time }
    CreateSection:
        type: object
        required: [type, content, sort_order]
        properties:
          type: { type: string, enum: [hero, text, features, gallery, cta, contact] }
          content: { type: object, additionalProperties: true }
          sort_order: { type: integer, minimum: 0 }
          status: { type: string, enum: [draft, published], default: draft }
    UpdateSection:
        type: object
        properties:
          type: { type: string, enum: [hero, text, features, gallery, cta, contact] }
          content: { type: object, additionalProperties: true }
          sort_order: { type: integer, minimum: 0 }
          status: { type: string, enum: [draft, published] }
    PageList:
        type: object
        properties:
          data: { type: array, items: { $ref: '#/components/schemas/Page' } }
          next_cursor: { type: [string, 'null'] }
    SectionList:
        type: object
        properties:
          data: { type: array, items: { $ref: '#/components/schemas/Section' } }
          next_cursor: { type: [string, 'null'] }

  responses:
    Unauthorized:
      description: Missing or invalid bearer token
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
          example: { code: unauthorized, message: "Authentication required" }
    Forbidden:
      description: Not permitted (auth, tenant scope, RBAC, or feature disabled)
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
          examples:
            forbidden: { value: { code: forbidden, message: "Missing required permission" } }
            feature_disabled: { value: { code: feature_disabled, message: "Feature not enabled for tenant" } }
            tenant_mismatch: { value: { code: tenant_mismatch, message: "Resource belongs to another tenant" } }
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
          example: { code: not_found, message: "Resource not found" }
    ValidationError:
      description: Request failed validation
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
          example: { code: validation_error, message: "request body is invalid" }

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

security:
  - bearerAuth: []
