openapi: 3.1.0
info:
  title: AuraEDU API Gateway API
  version: 1.0.0
  description: >
    Routing, health, and service registry surface exposed by the gateway itself (spec \u00a77). Owned by lane L1 (EP-03).
  contact:
    name: AuraEDU Engineering
servers:
  - url: /api/v1
tags:
  - name: health
  - name: routes

paths:
    /health:
      get:
            operationId: healthCheck
            description: Executes the health check workflow within this AuraEDU API boundary.
            tags: ['health']
            summary: Gateway health
            parameters:
              - $ref: '#/components/parameters/TenantHeader'
            responses:
              '200':
                description: OK
                content:
                  application/json:
                    schema: { $ref: '#/components/schemas/Health' }
              '403': { $ref: '#/components/responses/Forbidden' }
              '404': { $ref: '#/components/responses/NotFound' }
              '422': { $ref: '#/components/responses/ValidationError' }
              '401': { $ref: '#/components/responses/Unauthorized' }
    /ready:
      get:
            operationId: readyCheck
            description: Executes the ready check workflow within this AuraEDU API boundary.
            tags: ['health']
            summary: Gateway readiness
            parameters:
              - $ref: '#/components/parameters/TenantHeader'
            responses:
              '200':
                description: OK
                content:
                  application/json:
                    schema: { $ref: '#/components/schemas/Health' }
              '403': { $ref: '#/components/responses/Forbidden' }
              '404': { $ref: '#/components/responses/NotFound' }
              '422': { $ref: '#/components/responses/ValidationError' }
              '401': { $ref: '#/components/responses/Unauthorized' }
    /routes:
      get:
            operationId: listRoutes
            description: Executes the list routes workflow within this AuraEDU API boundary.
            tags: ['routes']
            summary: List configured upstream routes
            parameters:
              - $ref: '#/components/parameters/TenantHeader'
              - $ref: '#/components/parameters/Limit'
              - $ref: '#/components/parameters/Cursor'
            responses:
              '200':
                description: OK
                content:
                  application/json:
                    schema: { $ref: '#/components/schemas/RouteList' }
              '403': { $ref: '#/components/responses/Forbidden' }
              '404': { $ref: '#/components/responses/NotFound' }
              '422': { $ref: '#/components/responses/ValidationError' }
              '401': { $ref: '#/components/responses/Unauthorized' }

    /platform/health:
      get:
        operationId: getPlatformDependencyHealth
        tags: ['health']
        summary: Read current private-service readiness
        description: >
          Platform-super-admin-only, tenant-optional report produced by bounded concurrent
          gateway probes. Private hosts and raw transport errors are never returned.
        security: [{ bearerAuth: [] }]
        responses:
          '200':
            description: Current dependency report; degraded/down dependencies remain data in a successful operator response.
            headers:
              Cache-Control:
                schema: { type: string, const: no-store }
            content:
              application/json:
                schema: { $ref: '#/components/schemas/PlatformHealthReport' }
          '401': { $ref: '#/components/responses/Unauthorized' }
          '403': { $ref: '#/components/responses/Forbidden' }
      post:
            operationId: createRoute
            description: Executes the create route workflow within this AuraEDU API boundary.
            tags: ['routes']
            summary: Register an upstream route
            parameters:
              - $ref: '#/components/parameters/TenantHeader'
            requestBody:
              required: true
              content:
                application/json:
                  schema: { $ref: '#/components/schemas/CreateRoute' }
            responses:
              '201':
                description: OK
                content:
                  application/json:
                    schema: { $ref: '#/components/schemas/Route' }
              '403': { $ref: '#/components/responses/Forbidden' }
              '404': { $ref: '#/components/responses/NotFound' }
              '422': { $ref: '#/components/responses/ValidationError' }
              '401': { $ref: '#/components/responses/Unauthorized' }

components:
  parameters:
    TenantHeader:
      name: X-Tenant-Code
      in: header
      required: false
      description: Optional tenant code for resolution when the gateway cannot derive it from the host.
      schema: { type: string, example: upshs }
    Limit:
      name: limit
      in: query
      schema: { type: integer, minimum: 1, maximum: 100, default: 25 }
    Cursor:
      name: cursor
      in: query
      schema: { type: string }

  schemas:
    Error:
      type: object
      required: [code, message]
      properties:
        code: { type: string, enum: [forbidden, feature_disabled, tenant_mismatch, validation_error, not_found, unauthorized] }
        message: { type: string }
        request_id: { type: string }
    Health:
        type: object
        required: [status]
        properties:
          status: { type: string, enum: [ok, degraded, down] }
          checks: { type: object, additionalProperties: true }
    DependencyHealthCheck:
        type: object
        additionalProperties: false
        required: [service, endpoint, status, detail, latency_ms]
        properties:
          service: { type: string, minLength: 1 }
          endpoint: { type: string, enum: [/ready, /health, /healthz] }
          status: { type: string, enum: [healthy, degraded, unreachable] }
          detail: { type: string, minLength: 1, maxLength: 80 }
          latency_ms: { type: integer, minimum: 0 }
    PlatformHealthReport:
        type: object
        additionalProperties: false
        required: [status, generated_at, checks]
        properties:
          status: { type: string, enum: [healthy, degraded, down] }
          generated_at: { type: string, format: date-time }
          checks: { type: array, items: { $ref: '#/components/schemas/DependencyHealthCheck' } }
    Route:
        type: object
        required: [path_prefix, upstream]
        properties:
          path_prefix: { type: string }
          upstream: { type: string }
          strip_prefix: { type: boolean, default: true }
          require_auth: { type: boolean, default: true }
    CreateRoute:
        type: object
        required: [path_prefix, upstream]
        properties:
          path_prefix: { type: string }
          upstream: { type: string }
          strip_prefix: { type: boolean, default: true }
          require_auth: { type: boolean, default: true }
    RouteList:
        type: object
        properties:
          data: { type: array, items: { $ref: '#/components/schemas/Route' } }
          next_cursor: { type: [string, 'null'] }

  responses:
    Unauthorized:
      description: Missing or invalid bearer token
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
          example: { code: unauthorized, message: "Authentication required" }
    Forbidden:
      description: Not permitted (auth, tenant scope, RBAC, or feature disabled)
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
          examples:
            forbidden: { value: { code: forbidden, message: "Missing required permission" } }
            feature_disabled: { value: { code: feature_disabled, message: "Feature not enabled for tenant" } }
            tenant_mismatch: { value: { code: tenant_mismatch, message: "Resource belongs to another tenant" } }
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
          example: { code: not_found, message: "Resource not found" }
    ValidationError:
      description: Request failed validation
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
          example: { code: validation_error, message: "request body is invalid" }

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

security:
  - bearerAuth: []
