openapi: 3.1.0
info:
  title: AuraEDU Career Guidance Service API
  version: 1.0.0
  description: >
    Career path and course recommendations (spec \u00a715).
    Owned by lane L3 (EP-32). Feature flag: career_guidance.
  contact:
    name: AuraEDU Engineering
servers:
  - url: /api/v1/ai/career-guidance
tags:
  - name: career-guidance

paths:
  /health:
    get:
      operationId: healthCheck
      description: Executes the health check workflow within this AuraEDU API boundary.
      tags: ['career-guidance']
      summary: Service health check
      security: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status: { type: string, enum: [ok] }

  /feature-store/metrics:
    post:
      operationId: ingestFeatureStoreMetric
      description: Executes the ingest feature store metric workflow within this AuraEDU API boundary.
      tags: ['career-guidance']
      summary: Ingest a single approved learning metric
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/IngestMetricRequest' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/FeatureStoreMetric' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /guidance:
    get:
      operationId: listGuidance
      description: Executes the list guidance workflow within this AuraEDU API boundary.
      tags: ['career-guidance']
      summary: List career guidance for a student
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - name: student_id
          in: query
          required: false
          description: Required for parent/teacher/admin callers; inferred from the authenticated student identity.
          schema: { type: string, format: uuid }
        - name: guidance_type
          in: query
          schema: { type: string }
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/GuidanceList' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }

    post:
      operationId: generateGuidance
      description: Executes the generate guidance workflow within this AuraEDU API boundary.
      tags: ['career-guidance']
      summary: Generate career guidance for a student
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/GenerateGuidanceRequest' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/GuidanceList' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /guidance/{guidance_id}:
    get:
      operationId: getGuidance
      description: Executes the get guidance workflow within this AuraEDU API boundary.
      tags: ['career-guidance']
      summary: Get guidance by ID
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - name: guidance_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Guidance' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /guidance/{guidance_id}/explain:
    get:
      operationId: explainGuidance
      description: Executes the explain guidance workflow within this AuraEDU API boundary.
      tags: ['career-guidance']
      summary: Get explainability details for guidance
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - name: guidance_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ExplainResponse' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /guidance/{guidance_id}/approve:
    post:
      operationId: approveGuidance
      description: Executes the approve guidance workflow within this AuraEDU API boundary.
      tags: ['career-guidance']
      summary: Approve guidance
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - name: guidance_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ReviewGuidanceRequest' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Guidance' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /guidance/{guidance_id}/reject:
    post:
      operationId: rejectGuidance
      description: Executes the reject guidance workflow within this AuraEDU API boundary.
      tags: ['career-guidance']
      summary: Reject guidance
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - name: guidance_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ReviewGuidanceRequest' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Guidance' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '401': { $ref: '#/components/responses/Unauthorized' }

components:
  parameters:
    TenantHeader:
      name: X-Tenant-Code
      in: header
      required: false
      description: Tenant code (used when gateway cannot derive tenant from host).
      schema: { type: string, example: upshs }
    Limit:
      name: limit
      in: query
      schema: { type: integer, minimum: 1, maximum: 100, default: 25 }
    Cursor:
      name: cursor
      in: query
      schema: { type: string }

  schemas:
    Error:
      type: object
      required: [code, message]
      properties:
        code: { type: string, enum: [forbidden, feature_disabled, tenant_mismatch, validation_error, not_found, unauthorized] }
        message: { type: string }
        request_id: { type: string }

    FeatureStoreMetric:
      type: object
      required: [id, tenant_id, student_id, metric_key, value, source, recorded_at]
      properties:
        id: { type: string, format: uuid }
        tenant_id: { type: string, format: uuid }
        student_id: { type: string, format: uuid }
        metric_key: { type: string }
        value: { type: number }
        source: { type: string, enum: [assessment, attendance, analytics] }
        recorded_at: { type: string, format: date-time }
        created_at: { type: string, format: date-time }

    IngestMetricRequest:
      type: object
      required: [student_id, metric_key, value, source, recorded_at]
      properties:
        student_id: { type: string, format: uuid }
        metric_key: { type: string }
        value: { type: number }
        source: { type: string, enum: [assessment, attendance, analytics] }
        recorded_at: { type: string, format: date-time }

    GenerateGuidanceRequest:
      type: object
      properties:
        student_id: { type: string, format: uuid }
        guidance_types: { type: array, items: { type: string } }

    Guidance:
      type: object
      required: [id, tenant_id, student_id, guidance_type, title, value, confidence, status, explanation, created_at]
      properties:
        id: { type: string, format: uuid }
        tenant_id: { type: string, format: uuid }
        student_id: { type: string, format: uuid }
        guidance_type: { type: string }
        title: { type: string }
        value: { type: number }
        confidence: { type: number, minimum: 0, maximum: 1 }
        status: { type: string, enum: [pending, approved, rejected] }
        explanation: { type: [string, 'null'] }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    GuidanceList:
      type: object
      properties:
        data: { type: array, items: { $ref: '#/components/schemas/Guidance' } }
        next_cursor: { type: [string, 'null'] }

    ExplainResponse:
      type: object
      required: [guidance_id, factors]
      properties:
        guidance_id: { type: string, format: uuid }
        factors: { type: array, items: { $ref: '#/components/schemas/ExplainFactor' } }
        model_notes: { type: [string, 'null'] }

    ExplainFactor:
      type: object
      required: [metric_key, value, contribution]
      properties:
        metric_key: { type: string }
        value: { type: number }
        contribution: { type: string, enum: [strong_positive, positive, neutral, negative, strong_negative] }

    ReviewGuidanceRequest:
      type: object
      properties:
        reason: { type: [string, 'null'] }

  responses:
    Unauthorized:
      description: Missing or invalid bearer token
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
          example: { code: unauthorized, message: "Authentication required" }
    Forbidden:
      description: Not permitted (auth, tenant scope, RBAC, or feature disabled)
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
          examples:
            forbidden: { value: { code: forbidden, message: "Missing required permission" } }
            feature_disabled: { value: { code: feature_disabled, message: "Feature not enabled for tenant" } }
            tenant_mismatch: { value: { code: tenant_mismatch, message: "Resource belongs to another tenant" } }
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
          example: { code: not_found, message: "Resource not found" }
    ValidationError:
      description: Request failed validation
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
          example: { code: validation_error, message: "request body is invalid" }

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

security:
  - bearerAuth: []
