openapi: 3.1.0
info:
  title: AuraEDU Audit Service API
  version: 1.0.0
  description: >
    Immutable audit log sink for compliance (spec \u00a77). Owned by lane L2 (EP-23).
  contact:
    name: AuraEDU Engineering
servers:
  - url: /api/v1
tags:
  - name: audit-logs

paths:
    /audit-logs:
      get:
            operationId: listAuditLogs
            description: Executes the list audit logs workflow within this AuraEDU API boundary.
            tags: ['audit-logs']
            summary: List audit logs
            parameters:
              - $ref: '#/components/parameters/TenantHeader'
              - $ref: '#/components/parameters/Limit'
              - $ref: '#/components/parameters/Cursor'
            responses:
              '200':
                description: OK
                content:
                  application/json:
                    schema: { $ref: '#/components/schemas/AuditLogList' }
              '403': { $ref: '#/components/responses/Forbidden' }
              '404': { $ref: '#/components/responses/NotFound' }
              '422': { $ref: '#/components/responses/ValidationError' }
              '401': { $ref: '#/components/responses/Unauthorized' }
    /audit/logs:
      get:
        operationId: listAuditLogsGatewayAlias
        description: Executes the list audit logs gateway alias workflow within this AuraEDU API boundary.
        tags: ['audit-logs']
        summary: List audit logs through the gateway-prefixed alias
        deprecated: true
        parameters:
          - $ref: '#/components/parameters/TenantHeader'
          - $ref: '#/components/parameters/Limit'
          - $ref: '#/components/parameters/Cursor'
        responses:
          '200':
            description: OK
            content:
              application/json:
                schema: { $ref: '#/components/schemas/AuditLogList' }
          '401': { $ref: '#/components/responses/Unauthorized' }
          '403': { $ref: '#/components/responses/Forbidden' }

components:
  parameters:
    TenantHeader:
      name: X-Tenant-Code
      in: header
      required: false
      description: Optional tenant code for resolution when the gateway cannot derive it from the host.
      schema: { type: string, example: upshs }
    Limit:
      name: limit
      in: query
      schema: { type: integer, minimum: 1, maximum: 100, default: 25 }
    Cursor:
      name: cursor
      in: query
      schema: { type: string }

  schemas:
    Error:
      type: object
      required: [code, message]
      properties:
        code: { type: string, enum: [forbidden, feature_disabled, tenant_mismatch, validation_error, not_found, unauthorized] }
        message: { type: string }
        request_id: { type: string }
    AuditLog:
        type: object
        required: [id, tenant_id, event_type, actor_id, occurred_at]
        properties:
          id: { type: string, format: uuid }
          tenant_id: { type: string, minLength: 1, description: Canonical tenant identifier }
          event_type: { type: string }
          actor_id: { type: [string, 'null'], format: uuid }
          resource_type: { type: [string, 'null'] }
          resource_id: { type: [string, 'null'] }
          metadata: { type: [object, 'null'], additionalProperties: true }
          occurred_at: { type: string, format: date-time }
    AuditLogList:
        type: object
        properties:
          data: { type: array, items: { $ref: '#/components/schemas/AuditLog' } }
          next_cursor: { type: [string, 'null'] }

  responses:
    Unauthorized:
      description: Missing or invalid bearer token
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
          example: { code: unauthorized, message: "Authentication required" }
    Forbidden:
      description: Not permitted (auth, tenant scope, RBAC, or feature disabled)
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
          examples:
            forbidden: { value: { code: forbidden, message: "Missing required permission" } }
            feature_disabled: { value: { code: feature_disabled, message: "Feature not enabled for tenant" } }
            tenant_mismatch: { value: { code: tenant_mismatch, message: "Resource belongs to another tenant" } }
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
          example: { code: not_found, message: "Resource not found" }
    ValidationError:
      description: Request failed validation
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
          example: { code: validation_error, message: "request body is invalid" }

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

security:
  - bearerAuth: []
