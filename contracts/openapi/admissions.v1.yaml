openapi: 3.1.0
info:
  title: AuraEDU Admissions API
  version: 1.0.0
  description: Tenant-isolated programme catalogue, intake availability, applicant progress, document checklist, human review, offers and acceptance.
  contact:
    name: AuraEDU Engineering
servers: [{ url: /api/v1 }]
tags:
  - name: applications
  - name: intakes
  - name: programmes

paths:
  /public/programmes:
    get:
      operationId: listPublicProgrammes
      description: Executes the list public programmes workflow within this AuraEDU API boundary.
      tags: ['programmes']
      parameters:
        - { $ref: '#/components/parameters/TenantCode' }
        - { name: limit, in: query, schema: { type: integer, minimum: 1, maximum: 100, default: 50 } }
      responses:
        '200':
          description: Published programmes with currently open application intakes
          content: { application/json: { schema: { type: object, required: [data], properties: { data: { type: array, items: { $ref: '#/components/schemas/Programme' } } } } } }
  /programmes:
    get:
      operationId: listProgrammes
      description: Executes the list programmes workflow within this AuraEDU API boundary.
      tags: ['programmes']
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: '#/components/parameters/TenantCode' }
        - { name: limit, in: query, schema: { type: integer, minimum: 1, maximum: 100, default: 50 } }
      responses:
        '200':
          description: Tenant programme catalogue including draft and closed records
          content: { application/json: { schema: { type: object, required: [data], properties: { data: { type: array, items: { $ref: '#/components/schemas/Programme' } } } } } }
    post:
      operationId: createProgramme
      description: Executes the create programme workflow within this AuraEDU API boundary.
      tags: ['programmes']
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: '#/components/parameters/TenantCode' }]
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/CreateProgramme' } } } }
      responses: { '201': { description: Draft programme, content: { application/json: { schema: { $ref: '#/components/schemas/Programme' } } } } }
  /programmes/{programme_id}:
    patch:
      operationId: updateProgramme
      description: Executes the update programme workflow within this AuraEDU API boundary.
      tags: ['programmes']
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: '#/components/parameters/TenantCode' }, { $ref: '#/components/parameters/ProgrammeId' }]
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/UpdateProgramme' } } } }
      responses: { '200': { description: Updated programme, content: { application/json: { schema: { $ref: '#/components/schemas/Programme' } } } } }
  /programmes/{programme_id}/intakes:
    post:
      operationId: createIntake
      description: Executes the create intake workflow within this AuraEDU API boundary.
      tags: ['programmes']
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: '#/components/parameters/TenantCode' }, { $ref: '#/components/parameters/ProgrammeId' }]
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/CreateIntake' } } } }
      responses: { '201': { description: Draft intake, content: { application/json: { schema: { $ref: '#/components/schemas/Intake' } } } } }
  /intakes/{intake_id}:
    patch:
      operationId: updateIntake
      description: Executes the update intake workflow within this AuraEDU API boundary.
      tags: ['intakes']
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: '#/components/parameters/TenantCode' }, { $ref: '#/components/parameters/IntakeId' }]
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/UpdateIntake' } } } }
      responses: { '200': { description: Updated intake, content: { application/json: { schema: { $ref: '#/components/schemas/Intake' } } } } }
  /applications:
    post:
      operationId: startApplication
      description: Executes the start application workflow within this AuraEDU API boundary.
      tags: ['applications']
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: '#/components/parameters/TenantCode' }]
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/StartApplication' } } } }
      responses: { '201': { description: Application draft, content: { application/json: { schema: { $ref: '#/components/schemas/Application' } } } } }
    get:
      operationId: listApplications
      description: Executes the list applications workflow within this AuraEDU API boundary.
      tags: ['applications']
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: '#/components/parameters/TenantCode' }
        - { name: status, in: query, schema: { $ref: '#/components/schemas/ApplicationStatus' } }
        - { name: limit, in: query, schema: { type: integer, minimum: 1, maximum: 100, default: 25 } }
      responses:
        '200':
          description: Applicant-owned or staff-visible applications
          content: { application/json: { schema: { type: object, required: [data], properties: { data: { type: array, items: { $ref: '#/components/schemas/Application' } } } } } }
  /applications/{application_id}:
    get:
      operationId: getApplication
      description: Executes the get application workflow within this AuraEDU API boundary.
      tags: ['applications']
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: '#/components/parameters/TenantCode' }, { $ref: '#/components/parameters/ApplicationId' }]
      responses: { '200': { description: Application, content: { application/json: { schema: { $ref: '#/components/schemas/Application' } } } } }
    patch:
      operationId: updateApplicationDraft
      description: Executes the update application draft workflow within this AuraEDU API boundary.
      tags: ['applications']
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: '#/components/parameters/TenantCode' }, { $ref: '#/components/parameters/ApplicationId' }]
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/UpdateApplication' } } } }
      responses: { '200': { description: Updated draft, content: { application/json: { schema: { $ref: '#/components/schemas/Application' } } } } }
  /applications/{application_id}/documents:
    post:
      operationId: attachApplicationDocument
      description: Executes the attach application document workflow within this AuraEDU API boundary.
      tags: ['applications']
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: '#/components/parameters/TenantCode' }, { $ref: '#/components/parameters/ApplicationId' }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [file_id, document_type, file_name]
              properties:
                file_id: { type: string, format: uuid }
                document_type: { type: string, enum: [transcript,certificate,identity,passport_photo,recommendation,other] }
                file_name: { type: string, minLength: 1, maxLength: 255 }
              additionalProperties: false
      responses: { '201': { description: Document reference attached, content: { application/json: { schema: { $ref: '#/components/schemas/Application' } } } } }
  /applications/{application_id}/submit:
    post:
      operationId: submitApplication
      description: Executes the submit application workflow within this AuraEDU API boundary.
      tags: ['applications']
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: '#/components/parameters/TenantCode' }, { $ref: '#/components/parameters/ApplicationId' }]
      responses: { '200': { description: Submitted application, content: { application/json: { schema: { $ref: '#/components/schemas/Application' } } } } }
  /applications/{application_id}/review:
    post:
      operationId: reviewApplication
      description: Executes the review application workflow within this AuraEDU API boundary.
      tags: ['applications']
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: '#/components/parameters/TenantCode' }, { $ref: '#/components/parameters/ApplicationId' }]
      requestBody:
        required: true
        content: { application/json: { schema: { type: object, required: [decision, note], properties: { decision: { type: string, enum: [admitted,rejected] }, note: { type: string, minLength: 3, maxLength: 2000 } }, additionalProperties: false } } }
      responses: { '200': { description: Human review recorded, content: { application/json: { schema: { $ref: '#/components/schemas/Application' } } } } }
  /applications/{application_id}/offer:
    post:
      operationId: issueOffer
      description: Executes the issue offer workflow within this AuraEDU API boundary.
      tags: ['applications']
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: '#/components/parameters/TenantCode' }, { $ref: '#/components/parameters/ApplicationId' }]
      requestBody:
        required: true
        content: { application/json: { schema: { type: object, required: [conditions, expires_at], properties: { conditions: { type: string, minLength: 3, maxLength: 5000 }, expires_at: { type: string, format: date-time } }, additionalProperties: false } } }
      responses: { '200': { description: Offer issued, content: { application/json: { schema: { $ref: '#/components/schemas/Application' } } } } }
  /applications/{application_id}/offer/accept:
    post:
      operationId: acceptOffer
      description: Executes the accept offer workflow within this AuraEDU API boundary.
      tags: ['applications']
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: '#/components/parameters/TenantCode' }, { $ref: '#/components/parameters/ApplicationId' }]
      responses: { '200': { description: Offer accepted, content: { application/json: { schema: { $ref: '#/components/schemas/Application' } } } } }
components:
  securitySchemes: { bearerAuth: { type: http, scheme: bearer, bearerFormat: JWT } }
  parameters:
    TenantCode: { name: X-Tenant-Code, in: header, required: true, schema: { type: string, pattern: '^[a-z0-9][a-z0-9-]{1,62}$' } }
    ApplicationId: { name: application_id, in: path, required: true, schema: { type: string, format: uuid } }
    ProgrammeId: { name: programme_id, in: path, required: true, schema: { type: string, format: uuid } }
    IntakeId: { name: intake_id, in: path, required: true, schema: { type: string, format: uuid } }
  schemas:
    ProgrammeStatus: { type: string, enum: [draft,published,archived] }
    IntakeStatus: { type: string, enum: [draft,open,closed,archived] }
    CreateProgramme:
      type: object
      required: [code,name,slug,summary,description]
      properties:
        code: { type: string, minLength: 2, maxLength: 32, pattern: '^[A-Z0-9][A-Z0-9_-]+$' }
        name: { type: string, minLength: 2, maxLength: 160 }
        slug: { type: string, minLength: 2, maxLength: 100, pattern: '^[a-z0-9]+(?:-[a-z0-9]+)*$' }
        summary: { type: string, minLength: 2, maxLength: 500 }
        description: { type: string, minLength: 2, maxLength: 10000 }
      additionalProperties: false
    UpdateProgramme:
      type: object
      minProperties: 1
      properties:
        code: { type: string, minLength: 2, maxLength: 32, pattern: '^[A-Z0-9][A-Z0-9_-]+$' }
        name: { type: string, minLength: 2, maxLength: 160 }
        slug: { type: string, minLength: 2, maxLength: 100, pattern: '^[a-z0-9]+(?:-[a-z0-9]+)*$' }
        summary: { type: string, minLength: 2, maxLength: 500 }
        description: { type: string, minLength: 2, maxLength: 10000 }
        status: { $ref: '#/components/schemas/ProgrammeStatus' }
      additionalProperties: false
    CreateIntake:
      type: object
      required: [name,starts_at,application_opens_at,application_closes_at]
      properties:
        name: { type: string, minLength: 2, maxLength: 120 }
        starts_at: { type: string, format: date-time }
        application_opens_at: { type: string, format: date-time }
        application_closes_at: { type: string, format: date-time }
        capacity: { type: [integer,'null'], minimum: 1, maximum: 1000000 }
      additionalProperties: false
    UpdateIntake:
      type: object
      minProperties: 1
      properties:
        name: { type: string, minLength: 2, maxLength: 120 }
        starts_at: { type: string, format: date-time }
        application_opens_at: { type: string, format: date-time }
        application_closes_at: { type: string, format: date-time }
        capacity: { type: [integer,'null'], minimum: 1, maximum: 1000000 }
        status: { $ref: '#/components/schemas/IntakeStatus' }
      additionalProperties: false
    Intake:
      type: object
      required: [id,tenant_id,programme_id,name,starts_at,application_opens_at,application_closes_at,status,version,created_at,updated_at]
      properties:
        id: { type: string, format: uuid }
        tenant_id: { type: string }
        programme_id: { type: string, format: uuid }
        name: { type: string }
        starts_at: { type: string, format: date-time }
        application_opens_at: { type: string, format: date-time }
        application_closes_at: { type: string, format: date-time }
        capacity: { type: [integer,'null'] }
        status: { $ref: '#/components/schemas/IntakeStatus' }
        version: { type: integer, minimum: 1 }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    Programme:
      type: object
      required: [id,tenant_id,code,name,slug,summary,description,status,intakes,version,created_at,updated_at]
      properties:
        id: { type: string, format: uuid }
        tenant_id: { type: string }
        code: { type: string }
        name: { type: string }
        slug: { type: string }
        summary: { type: string }
        description: { type: string }
        status: { $ref: '#/components/schemas/ProgrammeStatus' }
        intakes: { type: array, items: { $ref: '#/components/schemas/Intake' } }
        version: { type: integer, minimum: 1 }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    ApplicationStatus: { type: string, enum: [draft,submitted,admitted,rejected,withdrawn] }
    OfferStatus: { type: string, enum: [none,issued,accepted,declined,expired] }
    StartApplication:
      type: object
      required: [programme_id,intake_id]
      properties:
        lead_id: { type: [string,'null'], format: uuid }
        programme_id: { type: string, format: uuid }
        intake_id: { type: string, format: uuid }
      additionalProperties: false
    UpdateApplication:
      type: object
      minProperties: 1
      properties:
        legal_name: { type: string, minLength: 2, maxLength: 200 }
        email: { type: string, format: email }
        phone: { type: string, minLength: 7, maxLength: 30 }
        answers: { type: object, additionalProperties: true }
      additionalProperties: false
    Document:
      type: object
      required: [id,file_id,document_type,file_name,created_at]
      properties:
        id: { type: string, format: uuid }
        file_id: { type: string, format: uuid }
        document_type: { type: string }
        file_name: { type: string }
        created_at: { type: string, format: date-time }
    Application:
      type: object
      required: [id,tenant_id,applicant_user_id,programme_id,intake_id,programme_name,intake_name,status,answers,documents,completion_percentage,missing_requirements,offer_status,created_at,updated_at]
      properties:
        id: { type: string, format: uuid }
        tenant_id: { type: string }
        applicant_user_id: { type: string }
        lead_id: { type: [string,'null'], format: uuid }
        programme_id: { type: string, format: uuid }
        intake_id: { type: string, format: uuid }
        programme_name: { type: string }
        intake_name: { type: string }
        legal_name: { type: string }
        email: { type: string }
        phone: { type: string }
        answers: { type: object, additionalProperties: true }
        documents: { type: array, items: { $ref: '#/components/schemas/Document' } }
        status: { $ref: '#/components/schemas/ApplicationStatus' }
        completion_percentage: { type: integer, minimum: 0, maximum: 100 }
        missing_requirements: { type: array, items: { type: string } }
        submitted_at: { type: [string,'null'], format: date-time }
        reviewed_by: { type: [string,'null'] }
        reviewed_at: { type: [string,'null'], format: date-time }
        review_note: { type: [string,'null'] }
        offer_status: { $ref: '#/components/schemas/OfferStatus' }
        offer_conditions: { type: [string,'null'] }
        offer_expires_at: { type: [string,'null'], format: date-time }
        offer_issued_by: { type: [string,'null'] }
        offer_accepted_at: { type: [string,'null'], format: date-time }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
