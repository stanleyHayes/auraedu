openapi: 3.1.0
info:
  title: AuraEDU Growth Content API
  version: 1.0.0
  description: Tenant-isolated, brand-governed content drafting and independent approval. Generated work is never auto-published.
  contact:
    name: AuraEDU Engineering
servers: [{ url: /api/v1 }]
tags:
  - name: content

paths:
  /content/brand-profile:
    get:
      operationId: getContentBrandProfile
      description: Returns the tenant policy applied to content generation and review.
      tags: [content]
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: '#/components/parameters/TenantCode' }]
      responses:
        '200': { description: Brand profile, content: { application/json: { schema: { $ref: '#/components/schemas/BrandProfile' } } } }
        '404': { $ref: '#/components/responses/NotFound' }
    put:
      operationId: upsertContentBrandProfile
      description: Replaces the tenant content policy using optimistic version control.
      tags: [content]
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: '#/components/parameters/TenantCode' }]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/UpsertBrandProfile' } } }
      responses:
        '200': { description: Updated brand profile, content: { application/json: { schema: { $ref: '#/components/schemas/BrandProfile' } } } }
        '403': { $ref: '#/components/responses/Forbidden' }
        '409': { $ref: '#/components/responses/Conflict' }
        '422': { $ref: '#/components/responses/ValidationError' }
  /content/generate:
    post:
      operationId: generateContentDraft
      description: Generates a governed draft from an explicit brief and supplied facts. It never publishes or approves the result.
      tags: [content]
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: '#/components/parameters/TenantCode' }
        - { $ref: '#/components/parameters/IdempotencyKey' }
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/GenerateContent' } } }
      responses:
        '201': { description: Generated draft, content: { application/json: { schema: { $ref: '#/components/schemas/ContentDraft' } } } }
        '403': { $ref: '#/components/responses/Forbidden' }
        '409': { $ref: '#/components/responses/Conflict' }
        '422': { $ref: '#/components/responses/ValidationError' }
        '503': { $ref: '#/components/responses/Unavailable' }
  /content:
    get:
      operationId: listContentDrafts
      description: Lists tenant drafts without crossing campaign, type, or approval boundaries.
      tags: [content]
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: '#/components/parameters/TenantCode' }
        - { name: status, in: query, schema: { $ref: '#/components/schemas/ContentStatus' } }
        - { name: content_type, in: query, schema: { $ref: '#/components/schemas/ContentType' } }
        - { name: campaign_id, in: query, schema: { type: string, format: uuid } }
        - { name: limit, in: query, schema: { type: integer, minimum: 1, maximum: 100, default: 25 } }
      responses:
        '200':
          description: Content page
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties: { data: { type: array, items: { $ref: '#/components/schemas/ContentDraft' } } }
        '403': { $ref: '#/components/responses/Forbidden' }
  /content/{content_id}:
    parameters: [{ $ref: '#/components/parameters/TenantCode' }, { $ref: '#/components/parameters/ContentId' }]
    get:
      operationId: getContentDraft
      description: Returns a tenant draft and its immutable version history.
      tags: [content]
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Draft detail
          content:
            application/json:
              schema:
                type: object
                required: [content, versions]
                properties:
                  content: { $ref: '#/components/schemas/ContentDraft' }
                  versions: { type: array, items: { $ref: '#/components/schemas/ContentVersion' } }
        '404': { $ref: '#/components/responses/NotFound' }
    patch:
      operationId: reviseContentDraft
      description: Creates a new draft version. Approved content is never edited in place.
      tags: [content]
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/ReviseContent' } } }
      responses:
        '200': { description: Revised draft, content: { application/json: { schema: { $ref: '#/components/schemas/ContentDraft' } } } }
        '403': { $ref: '#/components/responses/Forbidden' }
        '409': { $ref: '#/components/responses/Conflict' }
  /content/{content_id}/submit-for-review:
    post:
      operationId: submitContentForReview
      description: Freezes the current version for independent human review.
      tags: [content]
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: '#/components/parameters/TenantCode' }, { $ref: '#/components/parameters/ContentId' }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [expected_version]
              properties: { expected_version: { type: integer, minimum: 1 } }
      responses:
        '200': { description: Pending review, content: { application/json: { schema: { $ref: '#/components/schemas/ContentDraft' } } } }
        '409': { $ref: '#/components/responses/Conflict' }
  /content/{content_id}/approve:
    post:
      operationId: approveContentDraft
      description: Approves exactly the submitted version. The author cannot approve their own work.
      tags: [content]
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: '#/components/parameters/TenantCode' }, { $ref: '#/components/parameters/ContentId' }]
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/ReviewContent' } } } }
      responses:
        '200': { description: Approved content, content: { application/json: { schema: { $ref: '#/components/schemas/ContentDraft' } } } }
        '403': { $ref: '#/components/responses/Forbidden' }
        '409': { $ref: '#/components/responses/Conflict' }
  /content/{content_id}/reject:
    post:
      operationId: rejectContentDraft
      description: Rejects the submitted version with actionable review evidence.
      tags: [content]
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: '#/components/parameters/TenantCode' }, { $ref: '#/components/parameters/ContentId' }]
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/ReviewContent' } } } }
      responses:
        '200': { description: Rejected content, content: { application/json: { schema: { $ref: '#/components/schemas/ContentDraft' } } } }
        '403': { $ref: '#/components/responses/Forbidden' }
        '409': { $ref: '#/components/responses/Conflict' }

components:
  securitySchemes: { bearerAuth: { type: http, scheme: bearer, bearerFormat: JWT } }
  parameters:
    TenantCode:
      name: X-Tenant-Code
      in: header
      required: true
      schema: { type: string, pattern: '^[a-z0-9][a-z0-9-]{1,62}$' }
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      schema: { type: string, minLength: 16, maxLength: 128 }
    ContentId:
      name: content_id
      in: path
      required: true
      schema: { type: string, format: uuid }
  schemas:
    ContentType:
      type: string
      enum: [social_post, caption, ad_copy, video_script, landing_page, email, sms, whatsapp_sequence, programme_description, brochure, prospectus, event_invitation, scholarship_announcement, radio_script, faq, applicant_guide]
    ContentStatus:
      type: string
      enum: [draft, pending_review, approved, rejected, expired]
    ComplianceStatus:
      type: string
      enum: [pass, needs_review, fail]
    Fact:
      type: object
      additionalProperties: false
      required: [label, value]
      properties:
        label: { type: string, minLength: 1, maxLength: 120 }
        value: { type: string, minLength: 1, maxLength: 1000 }
        source_id: { type: [string, 'null'], format: uuid }
    BrandProfile:
      type: object
      required: [tenant_id, tone_of_voice, approved_terms, prohibited_claims, required_disclaimers, locale, version, updated_by, updated_at]
      properties:
        tenant_id: { type: string }
        tone_of_voice: { type: string }
        approved_terms: { type: array, items: { type: string } }
        prohibited_claims: { type: array, items: { type: string } }
        required_disclaimers: { type: array, items: { type: string } }
        locale: { type: string }
        version: { type: integer, minimum: 1 }
        updated_by: { type: string }
        updated_at: { type: string, format: date-time }
    UpsertBrandProfile:
      type: object
      additionalProperties: false
      required: [tone_of_voice, locale, expected_version]
      properties:
        tone_of_voice: { type: string, minLength: 3, maxLength: 1000 }
        approved_terms: { type: array, maxItems: 100, items: { type: string, minLength: 1, maxLength: 120 } }
        prohibited_claims: { type: array, maxItems: 100, items: { type: string, minLength: 1, maxLength: 240 } }
        required_disclaimers: { type: array, maxItems: 25, items: { type: string, minLength: 1, maxLength: 500 } }
        locale: { type: string, pattern: '^[a-z]{2}(-[A-Z]{2})?$' }
        expected_version: { type: integer, minimum: 0 }
    GenerateContent:
      type: object
      additionalProperties: false
      required: [content_type, title, brief, audience, locale, key_messages, facts]
      properties:
        content_type: { $ref: '#/components/schemas/ContentType' }
        title: { type: string, minLength: 3, maxLength: 160 }
        brief: { type: string, minLength: 20, maxLength: 5000 }
        audience: { type: string, minLength: 3, maxLength: 1000 }
        locale: { type: string, pattern: '^[a-z]{2}(-[A-Z]{2})?$' }
        campaign_id: { type: [string, 'null'], format: uuid }
        key_messages: { type: array, minItems: 1, maxItems: 20, items: { type: string, minLength: 1, maxLength: 500 } }
        facts: { type: array, minItems: 1, maxItems: 30, items: { $ref: '#/components/schemas/Fact' } }
        expires_at: { type: [string, 'null'], format: date-time }
    ReviseContent:
      type: object
      additionalProperties: false
      required: [content, change_note, expected_version]
      properties:
        content: { type: string, minLength: 1, maxLength: 50000 }
        change_note: { type: string, minLength: 3, maxLength: 500 }
        expected_version: { type: integer, minimum: 1 }
        expires_at: { type: [string, 'null'], format: date-time }
    ReviewContent:
      type: object
      additionalProperties: false
      required: [review_note, expected_version]
      properties:
        review_note: { type: string, minLength: 3, maxLength: 1000 }
        expected_version: { type: integer, minimum: 1 }
    ComplianceFinding:
      type: object
      required: [rule, severity, message]
      properties:
        rule: { type: string }
        severity: { type: string, enum: [warning, error] }
        message: { type: string }
    ContentDraft:
      type: object
      required: [id, tenant_id, content_type, title, brief, audience, locale, key_messages, facts, content, status, version, compliance_status, compliance_findings, generator, brand_profile_version, created_by, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        tenant_id: { type: string }
        campaign_id: { type: [string, 'null'], format: uuid }
        content_type: { $ref: '#/components/schemas/ContentType' }
        title: { type: string }
        brief: { type: string }
        audience: { type: string }
        locale: { type: string }
        key_messages: { type: array, items: { type: string } }
        facts: { type: array, items: { $ref: '#/components/schemas/Fact' } }
        content: { type: string }
        status: { $ref: '#/components/schemas/ContentStatus' }
        version: { type: integer, minimum: 1 }
        compliance_status: { $ref: '#/components/schemas/ComplianceStatus' }
        compliance_findings: { type: array, items: { $ref: '#/components/schemas/ComplianceFinding' } }
        generator: { type: string }
        brand_profile_version: { type: integer, minimum: 1 }
        created_by: { type: string }
        submitted_by: { type: [string, 'null'] }
        submitted_at: { type: [string, 'null'], format: date-time }
        reviewed_by: { type: [string, 'null'] }
        reviewed_at: { type: [string, 'null'], format: date-time }
        review_note: { type: [string, 'null'] }
        expires_at: { type: [string, 'null'], format: date-time }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    ContentVersion:
      type: object
      required: [content_id, version, content, status, compliance_status, compliance_findings, generator, brand_profile_version, created_by, change_note, created_at]
      properties:
        content_id: { type: string, format: uuid }
        version: { type: integer, minimum: 1 }
        content: { type: string }
        status: { $ref: '#/components/schemas/ContentStatus' }
        compliance_status: { $ref: '#/components/schemas/ComplianceStatus' }
        compliance_findings: { type: array, items: { $ref: '#/components/schemas/ComplianceFinding' } }
        generator: { type: string }
        brand_profile_version: { type: integer, minimum: 1 }
        created_by: { type: string }
        change_note: { type: string }
        created_at: { type: string, format: date-time }
    Error:
      type: object
      required: [code, message]
      properties: { code: { type: string }, message: { type: string } }
  responses:
    Forbidden: { description: 'Permission, tenant, or feature denied', content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }
    NotFound: { description: Content resource not found, content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }
    Conflict: { description: Version or lifecycle conflict, content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }
    ValidationError: { description: Request failed validation, content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }
    Unavailable: { description: Content generator unavailable, content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }
