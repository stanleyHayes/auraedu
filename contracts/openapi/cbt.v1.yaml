openapi: 3.1.0
info:
  title: AuraEDU CBT Service API
  version: 1.0.0
  description: >
    Computer-based / online exams: question banks, sessions, submissions, and auto-grading (spec \u00a77). Owned by lane L2 (EP-24). Feature flag: cbt_exams.
  contact:
    name: AuraEDU Engineering
servers:
  - url: /api/v1/cbt
tags:
  - name: exams
  - name: question-banks
  - name: submissions

paths:
    /exams:
      get:
            operationId: listExams
            description: Executes the list exams workflow within this AuraEDU API boundary.
            tags: ['exams']
            summary: List exams
            parameters:
              - $ref: '#/components/parameters/TenantHeader'
              - $ref: '#/components/parameters/Limit'
              - $ref: '#/components/parameters/Cursor'
            responses:
              '200':
                description: OK
                content:
                  application/json:
                    schema: { $ref: '#/components/schemas/ExamList' }
              '403': { $ref: '#/components/responses/Forbidden' }
              '404': { $ref: '#/components/responses/NotFound' }
              '422': { $ref: '#/components/responses/ValidationError' }
              '401': { $ref: '#/components/responses/Unauthorized' }
      post:
            operationId: createExam
            description: Executes the create exam workflow within this AuraEDU API boundary.
            tags: ['exams']
            summary: Create an exam
            parameters:
              - $ref: '#/components/parameters/TenantHeader'
            requestBody:
              required: true
              content:
                application/json:
                  schema: { $ref: '#/components/schemas/CreateExam' }
            responses:
              '201':
                description: OK
                content:
                  application/json:
                    schema: { $ref: '#/components/schemas/Exam' }
              '403': { $ref: '#/components/responses/Forbidden' }
              '404': { $ref: '#/components/responses/NotFound' }
              '422': { $ref: '#/components/responses/ValidationError' }
              '401': { $ref: '#/components/responses/Unauthorized' }
    /exams/{exam_id}:
      get:
            operationId: getExam
            description: Executes the get exam workflow within this AuraEDU API boundary.
            tags: ['exams']
            summary: Get an exam
            parameters:
              - $ref: '#/components/parameters/TenantHeader'
              - $ref: '#/components/parameters/ExamId'
            responses:
              '200':
                description: OK
                content:
                  application/json:
                    schema: { $ref: '#/components/schemas/Exam' }
              '403': { $ref: '#/components/responses/Forbidden' }
              '404': { $ref: '#/components/responses/NotFound' }
              '422': { $ref: '#/components/responses/ValidationError' }
              '401': { $ref: '#/components/responses/Unauthorized' }
      patch:
        operationId: updateExam
        description: Executes the update exam workflow within this AuraEDU API boundary.
        tags: ['exams']
        summary: Update an exam
        parameters:
          - $ref: '#/components/parameters/TenantHeader'
          - $ref: '#/components/parameters/ExamId'
        requestBody:
          required: true
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UpdateExam' }
        responses:
          '200':
            description: Updated exam
            content:
              application/json:
                schema: { $ref: '#/components/schemas/Exam' }
          '401': { $ref: '#/components/responses/Unauthorized' }
          '403': { $ref: '#/components/responses/Forbidden' }
          '404': { $ref: '#/components/responses/NotFound' }
          '422': { $ref: '#/components/responses/ValidationError' }
      delete:
        operationId: deleteExam
        description: Executes the delete exam workflow within this AuraEDU API boundary.
        tags: ['exams']
        summary: Delete an exam
        parameters:
          - $ref: '#/components/parameters/TenantHeader'
          - $ref: '#/components/parameters/ExamId'
        responses:
          '204': { description: Exam deleted }
          '401': { $ref: '#/components/responses/Unauthorized' }
          '403': { $ref: '#/components/responses/Forbidden' }
          '404': { $ref: '#/components/responses/NotFound' }
    /exams/{exam_id}/start:
      post:
            operationId: startExamSession
            description: Executes the start exam session workflow within this AuraEDU API boundary.
            tags: ['exams']
            summary: Start an exam session
            parameters:
              - $ref: '#/components/parameters/TenantHeader'
              - $ref: '#/components/parameters/ExamId'
            responses:
              '201':
                description: OK
                content:
                  application/json:
                    schema: { $ref: '#/components/schemas/ExamSession' }
              '403': { $ref: '#/components/responses/Forbidden' }
              '404': { $ref: '#/components/responses/NotFound' }
              '422': { $ref: '#/components/responses/ValidationError' }
              '401': { $ref: '#/components/responses/Unauthorized' }
    /submissions:
      get:
            operationId: listSubmissions
            description: Executes the list submissions workflow within this AuraEDU API boundary.
            tags: ['submissions']
            summary: List submissions visible to the actor
            parameters:
              - $ref: '#/components/parameters/TenantHeader'
              - $ref: '#/components/parameters/Limit'
              - $ref: '#/components/parameters/Cursor'
            responses:
              '200':
                description: OK
                content:
                  application/json:
                    schema: { $ref: '#/components/schemas/SubmissionList' }
              '403': { $ref: '#/components/responses/Forbidden' }
              '404': { $ref: '#/components/responses/NotFound' }
              '422': { $ref: '#/components/responses/ValidationError' }
              '401': { $ref: '#/components/responses/Unauthorized' }
    /submissions/{submission_id}:
      get:
        operationId: getSubmission
        description: Executes the get submission workflow within this AuraEDU API boundary.
        tags: ['submissions']
        summary: Get a submission visible to the actor
        parameters:
          - $ref: '#/components/parameters/TenantHeader'
          - $ref: '#/components/parameters/SubmissionId'
        responses:
          '200':
            description: Submission
            content:
              application/json:
                schema: { $ref: '#/components/schemas/Submission' }
          '401': { $ref: '#/components/responses/Unauthorized' }
          '403': { $ref: '#/components/responses/Forbidden' }
          '404': { $ref: '#/components/responses/NotFound' }
    /submissions/{submission_id}/questions:
      get:
            operationId: getSubmissionQuestions
            description: Executes the get submission questions workflow within this AuraEDU API boundary.
            tags: ['submissions']
            summary: Get answer-safe questions for the authenticated student's active attempt
            parameters:
              - $ref: '#/components/parameters/TenantHeader'
              - $ref: '#/components/parameters/SubmissionId'
            responses:
              '200':
                description: OK
                content:
                  application/json:
                    schema:
                      type: object
                      properties:
                        data: { type: array, items: { $ref: '#/components/schemas/ExamQuestion' } }
              '401': { $ref: '#/components/responses/Unauthorized' }
              '403': { $ref: '#/components/responses/Forbidden' }
              '404': { $ref: '#/components/responses/NotFound' }
    /submissions/{submission_id}/submit:
      post:
            operationId: submitAnswers
            description: Executes the submit answers workflow within this AuraEDU API boundary.
            tags: ['submissions']
            summary: Submit and auto-grade the authenticated student's attempt
            parameters:
              - $ref: '#/components/parameters/TenantHeader'
              - $ref: '#/components/parameters/SubmissionId'
            requestBody:
              required: true
              content:
                application/json:
                  schema: { $ref: '#/components/schemas/SubmitAnswers' }
            responses:
              '200':
                description: Graded submission
                content:
                  application/json:
                    schema: { $ref: '#/components/schemas/Submission' }
              '401': { $ref: '#/components/responses/Unauthorized' }
              '403': { $ref: '#/components/responses/Forbidden' }
              '422': { $ref: '#/components/responses/ValidationError' }
    /submissions/{submission_id}/grade:
      post:
        operationId: gradeSubmission
        description: Executes the grade submission workflow within this AuraEDU API boundary.
        tags: ['submissions']
        summary: Grade a submitted attempt
        parameters:
          - $ref: '#/components/parameters/TenantHeader'
          - $ref: '#/components/parameters/SubmissionId'
        responses:
          '200':
            description: Graded submission
            content:
              application/json:
                schema: { $ref: '#/components/schemas/Submission' }
          '401': { $ref: '#/components/responses/Unauthorized' }
          '403': { $ref: '#/components/responses/Forbidden' }
          '404': { $ref: '#/components/responses/NotFound' }
          '422': { $ref: '#/components/responses/ValidationError' }
    /questions:
      get:
            operationId: listQuestions
            description: Executes the list questions workflow within this AuraEDU API boundary.
            tags: ['question-banks']
            summary: List question banks
            parameters:
              - $ref: '#/components/parameters/TenantHeader'
              - $ref: '#/components/parameters/Limit'
              - $ref: '#/components/parameters/Cursor'
            responses:
              '200':
                description: OK
                content:
                  application/json:
                    schema: { $ref: '#/components/schemas/QuestionList' }
              '403': { $ref: '#/components/responses/Forbidden' }
              '404': { $ref: '#/components/responses/NotFound' }
              '422': { $ref: '#/components/responses/ValidationError' }
              '401': { $ref: '#/components/responses/Unauthorized' }
      post:
            operationId: createQuestion
            description: Executes the create question workflow within this AuraEDU API boundary.
            tags: ['question-banks']
            summary: Create a question bank
            parameters:
              - $ref: '#/components/parameters/TenantHeader'
            requestBody:
              required: true
              content:
                application/json:
                  schema: { $ref: '#/components/schemas/CreateQuestion' }
            responses:
              '201':
                description: OK
                content:
                  application/json:
                    schema: { $ref: '#/components/schemas/Question' }
              '403': { $ref: '#/components/responses/Forbidden' }
              '404': { $ref: '#/components/responses/NotFound' }
              '422': { $ref: '#/components/responses/ValidationError' }
              '401': { $ref: '#/components/responses/Unauthorized' }

    /questions/{question_id}:
      get:
        operationId: getQuestion
        description: Executes the get question workflow within this AuraEDU API boundary.
        tags: ['question-banks']
        summary: Get a question
        parameters:
          - $ref: '#/components/parameters/TenantHeader'
          - $ref: '#/components/parameters/QuestionId'
        responses:
          '200':
            description: Question
            content:
              application/json:
                schema: { $ref: '#/components/schemas/Question' }
          '401': { $ref: '#/components/responses/Unauthorized' }
          '403': { $ref: '#/components/responses/Forbidden' }
          '404': { $ref: '#/components/responses/NotFound' }
      patch:
        operationId: updateQuestion
        description: Executes the update question workflow within this AuraEDU API boundary.
        tags: ['question-banks']
        summary: Update a question
        parameters:
          - $ref: '#/components/parameters/TenantHeader'
          - $ref: '#/components/parameters/QuestionId'
        requestBody:
          required: true
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UpdateQuestion' }
        responses:
          '200':
            description: Updated question
            content:
              application/json:
                schema: { $ref: '#/components/schemas/Question' }
          '401': { $ref: '#/components/responses/Unauthorized' }
          '403': { $ref: '#/components/responses/Forbidden' }
          '404': { $ref: '#/components/responses/NotFound' }
          '422': { $ref: '#/components/responses/ValidationError' }
      delete:
        operationId: deleteQuestion
        description: Executes the delete question workflow within this AuraEDU API boundary.
        tags: ['question-banks']
        summary: Delete a question
        parameters:
          - $ref: '#/components/parameters/TenantHeader'
          - $ref: '#/components/parameters/QuestionId'
        responses:
          '204': { description: Question deleted }
          '401': { $ref: '#/components/responses/Unauthorized' }
          '403': { $ref: '#/components/responses/Forbidden' }
          '404': { $ref: '#/components/responses/NotFound' }
components:
  parameters:
    ExamId:
      name: exam_id
      in: path
      required: true
      schema: { type: string, format: uuid }
    QuestionId:
      name: question_id
      in: path
      required: true
      schema: { type: string, format: uuid }
    TenantHeader:
      name: X-Tenant-Code
      in: header
      required: false
      description: Optional tenant code for resolution when the gateway cannot derive it from the host.
      schema: { type: string, example: upshs }
    SubmissionId:
      name: submission_id
      in: path
      required: true
      schema: { type: string, format: uuid }
    Limit:
      name: limit
      in: query
      schema: { type: integer, minimum: 1, maximum: 100, default: 25 }
    Cursor:
      name: cursor
      in: query
      schema: { type: string }

  schemas:
    Error:
      type: object
      required: [code, message]
      properties:
        code: { type: string, enum: [forbidden, feature_disabled, tenant_mismatch, validation_error, not_found, unauthorized] }
        message: { type: string }
        request_id: { type: string }
    Exam:
        type: object
        required: [id, tenant_id, title, subject_id]
        properties:
          id: { type: string, format: uuid }
          tenant_id: { type: string, format: uuid }
          title: { type: string }
          subject_id: { type: string, format: uuid }
          academic_year_id: { type: string, format: uuid }
          duration_minutes: { type: integer, minimum: 1 }
          question_ids: { type: array, items: { type: string, format: uuid } }
          start_at: { type: [string, 'null'], format: date-time }
          end_at: { type: [string, 'null'], format: date-time }
          status: { type: string, enum: [draft, published, active, closed, archived] }
    CreateExam:
        type: object
        required: [title, academic_year_id, subject_id, question_ids, duration_minutes]
        properties:
          title: { type: string }
          academic_year_id: { type: string, format: uuid }
          subject_id: { type: string, format: uuid }
          duration_minutes: { type: integer, minimum: 1 }
          question_ids: { type: array, items: { type: string, format: uuid } }
          start_at: { type: [string, 'null'], format: date-time }
          end_at: { type: [string, 'null'], format: date-time }
    UpdateExam:
        type: object
        properties:
          title: { type: string }
          duration_minutes: { type: integer, minimum: 1 }
          question_ids: { type: array, items: { type: string, format: uuid } }
          start_at: { type: [string, 'null'], format: date-time }
          end_at: { type: [string, 'null'], format: date-time }
          status: { type: string, enum: [draft, published, active, closed, archived] }
    ExamSession:
        type: object
        required: [id, exam_session_id, student_id, status]
        properties:
          id: { type: string, format: uuid }
          exam_session_id: { type: string, format: uuid }
          student_id: { type: string, format: uuid }
          status: { type: string, enum: [in_progress, submitted, graded] }
    Submission:
        type: object
        required: [id, exam_session_id, student_id, answers, status]
        properties:
          id: { type: string, format: uuid }
          exam_session_id: { type: string, format: uuid }
          student_id: { type: string, format: uuid }
          answers: { type: object, additionalProperties: { type: string } }
          status: { type: string, enum: [in_progress, submitted, graded] }
          score: { type: [number, 'null'], minimum: 0 }
          max_score: { type: [number, 'null'], minimum: 0 }
          submitted_at: { type: string, format: date-time }
    SubmitAnswers:
        type: object
        required: [answers]
        properties:
          answers: { type: object, additionalProperties: { type: string } }
    ExamQuestion:
        type: object
        required: [id, question_text, question_type, marks]
        properties:
          id: { type: string, format: uuid }
          question_text: { type: string }
          question_type: { type: string, enum: [multiple_choice, true_false, short_answer] }
          options: { type: array, items: { type: string } }
          marks: { type: integer, minimum: 1 }
    Question:
        type: object
        required: [id, tenant_id, academic_year_id, subject_id, question_text, question_type, correct_answer, marks, status]
        properties:
          id: { type: string, format: uuid }
          tenant_id: { type: string, format: uuid }
          academic_year_id: { type: string, format: uuid }
          subject_id: { type: string, format: uuid }
          question_text: { type: string }
          question_type: { type: string, enum: [multiple_choice, true_false, short_answer] }
          options: { type: array, items: { type: string } }
          correct_answer: { type: string }
          marks: { type: integer, minimum: 1 }
          status: { type: string, enum: [draft, published, archived] }
    CreateQuestion:
        type: object
        required: [academic_year_id, subject_id, question_text, question_type, correct_answer, marks]
        properties:
          academic_year_id: { type: string, format: uuid }
          subject_id: { type: string, format: uuid }
          question_text: { type: string }
          question_type: { type: string, enum: [multiple_choice, true_false, short_answer] }
          options: { type: array, items: { type: string } }
          correct_answer: { type: string }
          marks: { type: integer, minimum: 1 }
    UpdateQuestion:
        type: object
        properties:
          question_text: { type: string }
          question_type: { type: string, enum: [multiple_choice, true_false, short_answer] }
          options: { type: array, items: { type: string } }
          correct_answer: { type: string }
          marks: { type: integer, minimum: 1 }
          status: { type: string, enum: [draft, published, archived] }
    ExamList:
        type: object
        properties:
          data: { type: array, items: { $ref: '#/components/schemas/Exam' } }
          next_cursor: { type: [string, 'null'] }
    QuestionList:
        type: object
        properties:
          data: { type: array, items: { $ref: '#/components/schemas/Question' } }
          next_cursor: { type: [string, 'null'] }
    SubmissionList:
        type: object
        properties:
          data: { type: array, items: { $ref: '#/components/schemas/Submission' } }
          next_cursor: { type: [string, 'null'] }

  responses:
    Unauthorized:
      description: Missing or invalid bearer token
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
          example: { code: unauthorized, message: "Authentication required" }
    Forbidden:
      description: Not permitted (auth, tenant scope, RBAC, or feature disabled)
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
          examples:
            forbidden: { value: { code: forbidden, message: "Missing required permission" } }
            feature_disabled: { value: { code: feature_disabled, message: "Feature not enabled for tenant" } }
            tenant_mismatch: { value: { code: tenant_mismatch, message: "Resource belongs to another tenant" } }
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
          example: { code: not_found, message: "Resource not found" }
    ValidationError:
      description: Request failed validation
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
          example: { code: validation_error, message: "request body is invalid" }

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

security:
  - bearerAuth: []
