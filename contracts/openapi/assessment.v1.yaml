openapi: 3.1.0
info:
  title: AuraEDU Assessment Service API
  version: 1.0.0
  description: >
    Assignments, tests, exams, and scores (spec \u00a77). Owned by lane L2 (EP-14). Feature flags: assessments, assignments.
  contact:
    name: AuraEDU Engineering
servers:
  - url: /api/v1
tags:
  - name: assessments
  - name: scores
  - name: assignments
  - name: gradebook

paths:
    /assessments:
      get:
            operationId: listAssessments
            description: Executes the list assessments workflow within this AuraEDU API boundary.
            tags: ['assessments']
            summary: List assessments
            parameters:
              - $ref: '#/components/parameters/TenantHeader'
              - $ref: '#/components/parameters/Limit'
              - $ref: '#/components/parameters/Cursor'
            responses:
              '200':
                description: OK
                content:
                  application/json:
                    schema: { $ref: '#/components/schemas/AssessmentList' }
              '403': { $ref: '#/components/responses/Forbidden' }
              '404': { $ref: '#/components/responses/NotFound' }
              '422': { $ref: '#/components/responses/ValidationError' }
              '401': { $ref: '#/components/responses/Unauthorized' }
      post:
            operationId: createAssessment
            description: Executes the create assessment workflow within this AuraEDU API boundary.
            tags: ['assessments']
            summary: Create an assessment
            parameters:
              - $ref: '#/components/parameters/TenantHeader'
            requestBody:
              required: true
              content:
                application/json:
                  schema: { $ref: '#/components/schemas/CreateAssessment' }
            responses:
              '201':
                description: OK
                content:
                  application/json:
                    schema: { $ref: '#/components/schemas/Assessment' }
              '403': { $ref: '#/components/responses/Forbidden' }
              '404': { $ref: '#/components/responses/NotFound' }
              '422': { $ref: '#/components/responses/ValidationError' }
              '401': { $ref: '#/components/responses/Unauthorized' }
    /assessments/{assessment_id}:
      get:
            operationId: getAssessment
            description: Executes the get assessment workflow within this AuraEDU API boundary.
            tags: ['assessments']
            summary: Get an assessment
            parameters:
              - $ref: '#/components/parameters/TenantHeader'
              - $ref: '#/components/parameters/AssessmentId'
            responses:
              '200':
                description: OK
                content:
                  application/json:
                    schema: { $ref: '#/components/schemas/Assessment' }
              '403': { $ref: '#/components/responses/Forbidden' }
              '404': { $ref: '#/components/responses/NotFound' }
              '422': { $ref: '#/components/responses/ValidationError' }
              '401': { $ref: '#/components/responses/Unauthorized' }
      patch:
        operationId: updateAssessment
        description: Executes the update assessment workflow within this AuraEDU API boundary.
        tags: ['assessments']
        summary: Update an assessment
        parameters:
          - $ref: '#/components/parameters/TenantHeader'
          - $ref: '#/components/parameters/AssessmentId'
        requestBody:
          required: true
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UpdateAssessment' }
        responses:
          '200':
            description: Updated assessment
            content:
              application/json:
                schema: { $ref: '#/components/schemas/Assessment' }
          '401': { $ref: '#/components/responses/Unauthorized' }
          '403': { $ref: '#/components/responses/Forbidden' }
          '404': { $ref: '#/components/responses/NotFound' }
          '422': { $ref: '#/components/responses/ValidationError' }
      delete:
        operationId: deleteAssessment
        description: Executes the delete assessment workflow within this AuraEDU API boundary.
        tags: ['assessments']
        summary: Delete an assessment
        parameters:
          - $ref: '#/components/parameters/TenantHeader'
          - $ref: '#/components/parameters/AssessmentId'
        responses:
          '204': { description: Assessment deleted }
          '401': { $ref: '#/components/responses/Unauthorized' }
          '403': { $ref: '#/components/responses/Forbidden' }
          '404': { $ref: '#/components/responses/NotFound' }
    /assessments/{assessment_id}/scores:
      get:
        operationId: listScores
        description: Executes the list scores workflow within this AuraEDU API boundary.
        tags: ['scores']
        summary: List scores for an assessment
        parameters:
          - $ref: '#/components/parameters/TenantHeader'
          - $ref: '#/components/parameters/AssessmentId'
          - $ref: '#/components/parameters/Limit'
          - $ref: '#/components/parameters/Cursor'
          - name: student_id
            in: query
            schema: { type: string, format: uuid }
        responses:
          '200':
            description: Scores
            content:
              application/json:
                schema: { $ref: '#/components/schemas/ScoreList' }
          '401': { $ref: '#/components/responses/Unauthorized' }
          '403': { $ref: '#/components/responses/Forbidden' }
      post:
            operationId: recordScore
            description: Executes the record score workflow within this AuraEDU API boundary.
            tags: ['scores']
            summary: Record a score
            parameters:
              - $ref: '#/components/parameters/TenantHeader'
              - $ref: '#/components/parameters/AssessmentId'
            requestBody:
              required: true
              content:
                application/json:
                  schema: { $ref: '#/components/schemas/CreateScore' }
            responses:
              '201':
                description: OK
                content:
                  application/json:
                    schema: { $ref: '#/components/schemas/Score' }
              '403': { $ref: '#/components/responses/Forbidden' }
              '404': { $ref: '#/components/responses/NotFound' }
              '422': { $ref: '#/components/responses/ValidationError' }
              '401': { $ref: '#/components/responses/Unauthorized' }
    /assessments/{assessment_id}/scores/{score_id}:
      get:
        operationId: getScore
        description: Executes the get score workflow within this AuraEDU API boundary.
        tags: ['scores']
        summary: Get a score
        parameters:
          - $ref: '#/components/parameters/TenantHeader'
          - $ref: '#/components/parameters/AssessmentId'
          - $ref: '#/components/parameters/ScoreId'
        responses:
          '200':
            description: Score
            content:
              application/json:
                schema: { $ref: '#/components/schemas/Score' }
          '401': { $ref: '#/components/responses/Unauthorized' }
          '403': { $ref: '#/components/responses/Forbidden' }
          '404': { $ref: '#/components/responses/NotFound' }
      patch:
        operationId: updateScore
        description: Executes the update score workflow within this AuraEDU API boundary.
        tags: ['scores']
        summary: Update a score
        parameters:
          - $ref: '#/components/parameters/TenantHeader'
          - $ref: '#/components/parameters/AssessmentId'
          - $ref: '#/components/parameters/ScoreId'
        requestBody:
          required: true
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UpdateScore' }
        responses:
          '200':
            description: Updated score
            content:
              application/json:
                schema: { $ref: '#/components/schemas/Score' }
          '401': { $ref: '#/components/responses/Unauthorized' }
          '403': { $ref: '#/components/responses/Forbidden' }
          '404': { $ref: '#/components/responses/NotFound' }
          '422': { $ref: '#/components/responses/ValidationError' }
      delete:
        operationId: deleteScore
        description: Executes the delete score workflow within this AuraEDU API boundary.
        tags: ['scores']
        summary: Delete a score
        parameters:
          - $ref: '#/components/parameters/TenantHeader'
          - $ref: '#/components/parameters/AssessmentId'
          - $ref: '#/components/parameters/ScoreId'
        responses:
          '204': { description: Score deleted }
          '401': { $ref: '#/components/responses/Unauthorized' }
          '403': { $ref: '#/components/responses/Forbidden' }
          '404': { $ref: '#/components/responses/NotFound' }

    /assignments:
      get:
            operationId: listAssignments
            description: Executes the list assignments workflow within this AuraEDU API boundary.
            tags: ['assignments']
            summary: List assignments
            parameters:
              - $ref: '#/components/parameters/TenantHeader'
              - $ref: '#/components/parameters/Limit'
              - $ref: '#/components/parameters/Cursor'
              - name: subject_id
                in: query
                schema: { type: string, format: uuid }
              - name: class_id
                in: query
                description: Filter to assignments tagged with this class.
                schema: { type: string, format: uuid }
              - name: student_id
                in: query
                description: Filter to assignments that have a recorded score for this student.
                schema: { type: string, format: uuid }
              - name: status
                in: query
                schema: { type: string, enum: [draft, published, archived] }
            responses:
              '200':
                description: OK
                content:
                  application/json:
                    schema: { $ref: '#/components/schemas/AssignmentList' }
              '403': { $ref: '#/components/responses/Forbidden' }
              '404': { $ref: '#/components/responses/NotFound' }
              '422': { $ref: '#/components/responses/ValidationError' }
              '401': { $ref: '#/components/responses/Unauthorized' }
      post:
            operationId: createAssignment
            description: Executes the create assignment workflow within this AuraEDU API boundary.
            tags: ['assignments']
            summary: Create an assignment
            parameters:
              - $ref: '#/components/parameters/TenantHeader'
            requestBody:
              required: true
              content:
                application/json:
                  schema: { $ref: '#/components/schemas/CreateAssignment' }
            responses:
              '201':
                description: OK
                content:
                  application/json:
                    schema: { $ref: '#/components/schemas/Assignment' }
              '403': { $ref: '#/components/responses/Forbidden' }
              '404': { $ref: '#/components/responses/NotFound' }
              '422': { $ref: '#/components/responses/ValidationError' }
              '401': { $ref: '#/components/responses/Unauthorized' }
    /assignments/{assignment_id}:
      get:
            operationId: getAssignment
            description: Executes the get assignment workflow within this AuraEDU API boundary.
            tags: ['assignments']
            summary: Get an assignment
            parameters:
              - $ref: '#/components/parameters/TenantHeader'
              - $ref: '#/components/parameters/AssignmentId'
            responses:
              '200':
                description: OK
                content:
                  application/json:
                    schema: { $ref: '#/components/schemas/Assignment' }
              '403': { $ref: '#/components/responses/Forbidden' }
              '404': { $ref: '#/components/responses/NotFound' }
              '422': { $ref: '#/components/responses/ValidationError' }
              '401': { $ref: '#/components/responses/Unauthorized' }
      patch:
            operationId: updateAssignment
            description: Executes the update assignment workflow within this AuraEDU API boundary.
            tags: ['assignments']
            summary: Update an assignment
            parameters:
              - $ref: '#/components/parameters/TenantHeader'
              - $ref: '#/components/parameters/AssignmentId'
            requestBody:
              required: true
              content:
                application/json:
                  schema: { $ref: '#/components/schemas/UpdateAssignment' }
            responses:
              '200':
                description: OK
                content:
                  application/json:
                    schema: { $ref: '#/components/schemas/Assignment' }
              '403': { $ref: '#/components/responses/Forbidden' }
              '404': { $ref: '#/components/responses/NotFound' }
              '422': { $ref: '#/components/responses/ValidationError' }
              '401': { $ref: '#/components/responses/Unauthorized' }
      delete:
            operationId: deleteAssignment
            description: Executes the delete assignment workflow within this AuraEDU API boundary.
            tags: ['assignments']
            summary: Delete an assignment
            parameters:
              - $ref: '#/components/parameters/TenantHeader'
              - $ref: '#/components/parameters/AssignmentId'
            responses:
              '204': { description: Deleted }
              '403': { $ref: '#/components/responses/Forbidden' }
              '404': { $ref: '#/components/responses/NotFound' }
              '422': { $ref: '#/components/responses/ValidationError' }
              '401': { $ref: '#/components/responses/Unauthorized' }
    /assignments/{assignment_id}/publish:
      post:
            operationId: publishAssignment
            description: Executes the publish assignment workflow within this AuraEDU API boundary.
            tags: ['assignments']
            summary: Publish an assignment (emits assignment.published.v1)
            parameters:
              - $ref: '#/components/parameters/TenantHeader'
              - $ref: '#/components/parameters/AssignmentId'
            responses:
              '200':
                description: OK
                content:
                  application/json:
                    schema: { $ref: '#/components/schemas/Assignment' }
              '403': { $ref: '#/components/responses/Forbidden' }
              '404': { $ref: '#/components/responses/NotFound' }
              '422': { $ref: '#/components/responses/ValidationError' }
              '401': { $ref: '#/components/responses/Unauthorized' }
    /gradebook:
      get:
            operationId: getGradebook
            description: Executes the get gradebook workflow within this AuraEDU API boundary.
            tags: ['gradebook']
            summary: Per-student or per-class gradebook summary (per-subject averages + overall)
            parameters:
              - $ref: '#/components/parameters/TenantHeader'
              - name: student_id
                in: query
                description: Student to summarise. Required when class_id is absent.
                schema: { type: string, format: uuid }
              - name: class_id
                in: query
                description: Restrict to assessments tagged with this class. Required when student_id is absent.
                schema: { type: string, format: uuid }
              - name: academic_year_id
                in: query
                description: Restrict to assessments in this academic period (term/year).
                schema: { type: string, format: uuid }
              - name: subject_id
                in: query
                description: Restrict to a single subject.
                schema: { type: string, format: uuid }
            responses:
              '200':
                description: OK
                content:
                  application/json:
                    schema: { $ref: '#/components/schemas/GradebookSummary' }
              '403': { $ref: '#/components/responses/Forbidden' }
              '404': { $ref: '#/components/responses/NotFound' }
              '422': { $ref: '#/components/responses/ValidationError' }
              '401': { $ref: '#/components/responses/Unauthorized' }

components:
  parameters:
    AssessmentId:
      name: assessment_id
      in: path
      required: true
      schema: { type: string, format: uuid }
    ScoreId:
      name: score_id
      in: path
      required: true
      schema: { type: string, format: uuid }
    AssignmentId:
      name: assignment_id
      in: path
      required: true
      schema: { type: string, format: uuid }
    TenantHeader:
      name: X-Tenant-Code
      in: header
      required: false
      description: Optional tenant code for resolution when the gateway cannot derive it from the host.
      schema: { type: string, example: upshs }
    Limit:
      name: limit
      in: query
      schema: { type: integer, minimum: 1, maximum: 100, default: 25 }
    Cursor:
      name: cursor
      in: query
      schema: { type: string }

  schemas:
    Error:
      type: object
      required: [code, message]
      properties:
        code: { type: string, enum: [forbidden, feature_disabled, tenant_mismatch, validation_error, not_found, unauthorized] }
        message: { type: string }
        request_id: { type: string }
    Assessment:
        type: object
        required: [id, tenant_id, name, type, subject_id]
        properties:
          id: { type: string, format: uuid }
          tenant_id: { type: string, format: uuid }
          name: { type: string }
          type: { type: string, enum: [test, exam, quiz, assignment] }
          subject_id: { type: string, format: uuid }
          class_id: { type: [string, 'null'], format: uuid }
          term_id: { type: [string, 'null'], format: uuid }
          max_score: { type: number, minimum: 0 }
          scheduled_at: { type: [string, 'null'], format: date-time }
    CreateAssessment:
        type: object
        required: [name, type, subject_id]
        properties:
          name: { type: string }
          type: { type: string, enum: [test, exam, quiz, assignment] }
          subject_id: { type: string, format: uuid }
          class_id: { type: [string, 'null'], format: uuid }
          term_id: { type: [string, 'null'], format: uuid }
          max_score: { type: number, minimum: 0 }
          scheduled_at: { type: [string, 'null'], format: date-time }
    UpdateAssessment:
        type: object
        properties:
          title: { type: string }
          description: { type: string }
          type: { type: string, enum: [test, exam, quiz, assignment] }
          max_score: { type: integer, minimum: 1 }
          due_date: { type: [string, 'null'], format: date-time }
          status: { type: string, enum: [draft, published, archived] }
    Score:
        type: object
        required: [id, assessment_id, student_id, score]
        properties:
          id: { type: string, format: uuid }
          assessment_id: { type: string, format: uuid }
          student_id: { type: string, format: uuid }
          score: { type: number, minimum: 0 }
          max_score: { type: [number, 'null'], minimum: 0 }
          recorded_by: { type: [string, 'null'], format: uuid }
    CreateScore:
        type: object
        required: [student_id, score]
        properties:
          student_id: { type: string, format: uuid }
          score: { type: number, minimum: 0 }
          max_score: { type: [number, 'null'], minimum: 0 }
    UpdateScore:
        type: object
        properties:
          score: { type: integer, minimum: 0 }
          notes: { type: string }
    ScoreList:
        type: object
        properties:
          data: { type: array, items: { $ref: '#/components/schemas/Score' } }
          next_cursor: { type: [string, 'null'] }
    Assignment:
        type: object
        required: [id, tenant_id, title, subject_id]
        properties:
          id: { type: string, format: uuid }
          tenant_id: { type: string, format: uuid }
          title: { type: string }
          instructions: { type: [string, 'null'] }
          subject_id: { type: string, format: uuid }
          academic_year_id: { type: string, format: uuid }
          class_ids: { type: array, items: { type: string, format: uuid } }
          due_date: { type: [string, 'null'], format: date-time }
          max_score: { type: number, minimum: 0 }
          status: { type: string, enum: [draft, published, archived] }
          published_at: { type: [string, 'null'], format: date-time }
    CreateAssignment:
        type: object
        required: [title, subject_id, academic_year_id, max_score]
        properties:
          title: { type: string }
          instructions: { type: [string, 'null'] }
          subject_id: { type: string, format: uuid }
          academic_year_id: { type: string, format: uuid }
          class_ids: { type: array, items: { type: string, format: uuid } }
          due_date: { type: [string, 'null'], format: date-time }
          max_score: { type: number, exclusiveMinimum: 0 }
    UpdateAssignment:
        type: object
        properties:
          title: { type: string }
          instructions: { type: [string, 'null'] }
          class_ids: { type: array, items: { type: string, format: uuid } }
          due_date: { type: [string, 'null'], format: date-time }
          max_score: { type: number, exclusiveMinimum: 0 }
    GradeAggregate:
        type: object
        required: [assessment_count, total_score, total_max_score, average, weighted_average]
        properties:
          assessment_count: { type: integer, minimum: 0 }
          total_score: { type: number, minimum: 0 }
          total_max_score: { type: number, minimum: 0 }
          average:
            type: [number, 'null']
            description: Arithmetic mean of per-assessment percentages (score / max_score * 100); null when no scores.
          weighted_average:
            type: [number, 'null']
            description: Max-score-weighted percentage (total_score / total_max_score * 100); null when no scores.
    SubjectGrade:
        allOf:
          - $ref: '#/components/schemas/GradeAggregate'
          - type: object
            required: [subject_id]
            properties:
              subject_id: { type: string, format: uuid }
    GradebookSummary:
        type: object
        required: [subjects, overall]
        properties:
          student_id: { type: [string, 'null'], format: uuid }
          class_id: { type: [string, 'null'], format: uuid }
          academic_year_id: { type: [string, 'null'], format: uuid }
          subjects: { type: array, items: { $ref: '#/components/schemas/SubjectGrade' } }
          overall: { $ref: '#/components/schemas/GradeAggregate' }
    AssessmentList:
        type: object
        properties:
          data: { type: array, items: { $ref: '#/components/schemas/Assessment' } }
          next_cursor: { type: [string, 'null'] }
    AssignmentList:
        type: object
        properties:
          data: { type: array, items: { $ref: '#/components/schemas/Assignment' } }
          next_cursor: { type: [string, 'null'] }

  responses:
    Unauthorized:
      description: Missing or invalid bearer token
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
          example: { code: unauthorized, message: "Authentication required" }
    Forbidden:
      description: Not permitted (auth, tenant scope, RBAC, or feature disabled)
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
          examples:
            forbidden: { value: { code: forbidden, message: "Missing required permission" } }
            feature_disabled: { value: { code: feature_disabled, message: "Feature not enabled for tenant" } }
            tenant_mismatch: { value: { code: tenant_mismatch, message: "Resource belongs to another tenant" } }
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
          example: { code: not_found, message: "Resource not found" }
    ValidationError:
      description: Request failed validation
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
          example: { code: validation_error, message: "request body is invalid" }

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

security:
  - bearerAuth: []
