openapi: 3.1.0
info:
  title: AuraEDU Attendance Service API
  version: 1.0.0
  description: >
    Daily and subject attendance (spec \u00a77). Owned by lane L2 (EP-13). Feature flag: attendance.
  contact:
    name: AuraEDU Engineering
servers:
  - url: /api/v1
tags:
  - name: attendance

paths:
    /attendance:
      get:
            operationId: listAttendance
            description: Executes the list attendance workflow within this AuraEDU API boundary.
            tags: ['attendance']
            summary: List attendance records
            parameters:
              - $ref: '#/components/parameters/TenantHeader'
              - $ref: '#/components/parameters/Limit'
              - $ref: '#/components/parameters/Cursor'
              - name: student_id
                in: query
                schema: { type: string, format: uuid }
              - name: academic_year_id
                in: query
                schema: { type: string, format: uuid }
              - name: date
                in: query
                schema: { type: string, format: date }
              - name: status
                in: query
                schema: { type: string, enum: [present, absent, late, excused] }
            responses:
              '200':
                description: OK
                content:
                  application/json:
                    schema: { $ref: '#/components/schemas/AttendanceRecordList' }
              '403': { $ref: '#/components/responses/Forbidden' }
              '404': { $ref: '#/components/responses/NotFound' }
              '422': { $ref: '#/components/responses/ValidationError' }
              '401': { $ref: '#/components/responses/Unauthorized' }
      post:
        operationId: createAttendance
        description: Executes the create attendance workflow within this AuraEDU API boundary.
        tags: ['attendance']
        summary: Create an attendance record
        parameters:
          - $ref: '#/components/parameters/TenantHeader'
        requestBody:
          required: true
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CreateAttendance' }
        responses:
          '201':
            description: Attendance record
            content:
              application/json:
                schema: { $ref: '#/components/schemas/AttendanceRecord' }
          '401': { $ref: '#/components/responses/Unauthorized' }
          '403': { $ref: '#/components/responses/Forbidden' }
          '422': { $ref: '#/components/responses/ValidationError' }
    /attendance/bulk:
      post:
            operationId: markAttendanceBulk
            description: Executes the mark attendance bulk workflow within this AuraEDU API boundary.
            tags: ['attendance']
            summary: Mark attendance in bulk
            parameters:
              - $ref: '#/components/parameters/TenantHeader'
            requestBody:
              required: true
              content:
                application/json:
                  schema: { $ref: '#/components/schemas/BulkAttendanceRequest' }
            responses:
              '201':
                description: OK
                content:
                  application/json:
                    schema: { $ref: '#/components/schemas/AttendanceRecordList' }
              '403': { $ref: '#/components/responses/Forbidden' }
              '404': { $ref: '#/components/responses/NotFound' }
              '422': { $ref: '#/components/responses/ValidationError' }
              '401': { $ref: '#/components/responses/Unauthorized' }
    /attendance/{attendance_id}:
      get:
            operationId: getAttendance
            description: Executes the get attendance workflow within this AuraEDU API boundary.
            tags: ['attendance']
            summary: Get an attendance record
            parameters:
              - $ref: '#/components/parameters/TenantHeader'
              - $ref: '#/components/parameters/AttendanceId'
            responses:
              '200':
                description: OK
                content:
                  application/json:
                    schema: { $ref: '#/components/schemas/AttendanceRecord' }
              '403': { $ref: '#/components/responses/Forbidden' }
              '404': { $ref: '#/components/responses/NotFound' }
              '422': { $ref: '#/components/responses/ValidationError' }
              '401': { $ref: '#/components/responses/Unauthorized' }
      patch:
        operationId: updateAttendance
        description: Executes the update attendance workflow within this AuraEDU API boundary.
        tags: ['attendance']
        summary: Update an attendance record
        parameters:
          - $ref: '#/components/parameters/TenantHeader'
          - $ref: '#/components/parameters/AttendanceId'
        requestBody:
          required: true
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UpdateAttendance' }
        responses:
          '200':
            description: Updated attendance record
            content:
              application/json:
                schema: { $ref: '#/components/schemas/AttendanceRecord' }
          '401': { $ref: '#/components/responses/Unauthorized' }
          '403': { $ref: '#/components/responses/Forbidden' }
          '404': { $ref: '#/components/responses/NotFound' }
          '422': { $ref: '#/components/responses/ValidationError' }
      delete:
        operationId: deleteAttendance
        description: Executes the delete attendance workflow within this AuraEDU API boundary.
        tags: ['attendance']
        summary: Delete an attendance record
        parameters:
          - $ref: '#/components/parameters/TenantHeader'
          - $ref: '#/components/parameters/AttendanceId'
        responses:
          '204': { description: Attendance record deleted }
          '401': { $ref: '#/components/responses/Unauthorized' }
          '403': { $ref: '#/components/responses/Forbidden' }
          '404': { $ref: '#/components/responses/NotFound' }

components:
  parameters:
    AttendanceId:
      name: attendance_id
      in: path
      required: true
      schema: { type: string, format: uuid }
    TenantHeader:
      name: X-Tenant-Code
      in: header
      required: false
      description: Optional tenant code for resolution when the gateway cannot derive it from the host.
      schema: { type: string, example: upshs }
    Limit:
      name: limit
      in: query
      schema: { type: integer, minimum: 1, maximum: 100, default: 25 }
    Cursor:
      name: cursor
      in: query
      schema: { type: string }

  schemas:
    Error:
      type: object
      required: [code, message]
      properties:
        code: { type: string, enum: [forbidden, feature_disabled, tenant_mismatch, validation_error, not_found, unauthorized] }
        message: { type: string }
        request_id: { type: string }
    AttendanceRecord:
        type: object
        required: [id, tenant_id, student_id, date, status]
        properties:
          id: { type: string, format: uuid }
          tenant_id: { type: string }
          student_id: { type: string, format: uuid }
          academic_year_id: { type: string, format: uuid }
          class_id: { type: [string, 'null'], format: uuid }
          subject_id: { type: [string, 'null'], format: uuid }
          date: { type: string, format: date }
          status: { type: string, enum: [present, absent, late, excused] }
          reason: { type: [string, 'null'] }
          marked_by: { type: string }
          created_at: { type: string, format: date-time }
          updated_at: { type: string, format: date-time }
    CreateAttendance:
        type: object
        required: [student_id, academic_year_id, date, status, marked_by]
        properties:
          student_id: { type: string, format: uuid }
          academic_year_id: { type: string, format: uuid }
          date: { type: string, format: date }
          status: { type: string, enum: [present, absent, late, excused] }
          reason: { type: [string, 'null'] }
          marked_by: { type: string }
    UpdateAttendance:
        type: object
        properties:
          status: { type: string, enum: [present, absent, late, excused] }
          reason: { type: [string, 'null'] }
          marked_by: { type: string }
    BulkAttendanceRequest:
        type: object
        required: [date, academic_year_id, records]
        properties:
          date: { type: string, format: date }
          academic_year_id: { type: string, format: uuid }
          class_id: { type: [string, 'null'], format: uuid }
          subject_id: { type: [string, 'null'], format: uuid }
          records: { type: array, minItems: 1, items: { type: object, required: [student_id, status], properties: { student_id: { type: string, format: uuid }, status: { type: string, enum: [present, absent, late, excused] }, remark: { type: [string, 'null'] } } } }
    AttendanceRecordList:
        type: object
        properties:
          data: { type: array, items: { $ref: '#/components/schemas/AttendanceRecord' } }
          next_cursor: { type: [string, 'null'] }

  responses:
    Unauthorized:
      description: Missing or invalid bearer token
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
          example: { code: unauthorized, message: "Authentication required" }
    Forbidden:
      description: Not permitted (auth, tenant scope, RBAC, or feature disabled)
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
          examples:
            forbidden: { value: { code: forbidden, message: "Missing required permission" } }
            feature_disabled: { value: { code: feature_disabled, message: "Feature not enabled for tenant" } }
            tenant_mismatch: { value: { code: tenant_mismatch, message: "Resource belongs to another tenant" } }
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
          example: { code: not_found, message: "Resource not found" }
    ValidationError:
      description: Request failed validation
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
          example: { code: validation_error, message: "request body is invalid" }

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

security:
  - bearerAuth: []
