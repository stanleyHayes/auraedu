openapi: 3.1.0
info:
  title: AuraEDU Analytics Service API
  version: 1.1.0
  description: Tenant-safe KPI projections and explainable Growth executive analytics.
  contact:
    name: AuraEDU Engineering
servers: [{ url: /api/v1 }]
tags:
  - name: analytics

paths:
  /analytics/metrics:
    get:
      operationId: listMetrics
      description: Executes the list metrics workflow within this AuraEDU API boundary.
      tags: ['analytics']
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: '#/components/parameters/TenantCode' }
        - { name: limit, in: query, schema: { type: integer, minimum: 1, maximum: 100, default: 25 } }
        - { name: cursor, in: query, schema: { type: string } }
        - { name: metric_name, in: query, schema: { type: string } }
        - { name: bucket_date_from, in: query, schema: { type: string, format: date } }
        - { name: bucket_date_to, in: query, schema: { type: string, format: date } }
        - { name: dimension_key, in: query, schema: { type: string } }
        - { name: dimension_value, in: query, schema: { type: string } }
      responses:
        '200':
          description: Tenant-scoped metric page
          content: { application/json: { schema: { $ref: '#/components/schemas/MetricList' } } }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
  /analytics/executive/growth:
    get:
      operationId: getGrowthExecutiveAnalytics
      description: Executes the get growth executive analytics workflow within this AuraEDU API boundary.
      tags: ['analytics']
      summary: Explainable enquiry-to-offer funnel, attribution, and basic operating forecast
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: '#/components/parameters/TenantCode' }
        - { name: from, in: query, schema: { type: string, format: date }, description: Defaults to 89 days before today. }
        - { name: to, in: query, schema: { type: string, format: date }, description: Defaults to today. }
      responses:
        '200':
          description: Tenant Growth executive report
          content: { application/json: { schema: { $ref: '#/components/schemas/GrowthExecutive' } } }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422': { $ref: '#/components/responses/ValidationError' }
  /analytics/executive/query:
    post:
      operationId: askExecutiveAnalytics
      description: Executes the ask executive analytics workflow within this AuraEDU API boundary.
      tags: ['analytics']
      summary: Answer an approved Growth analytics question from cited projection data
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: '#/components/parameters/TenantCode' }]
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/ExecutiveQuestion' } } } }
      responses:
        '200': { description: Calculation-grounded answer, content: { application/json: { schema: { $ref: '#/components/schemas/ExecutiveAnswer' } } } }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422': { $ref: '#/components/responses/ValidationError' }
components:
  parameters:
    TenantCode:
      name: X-Tenant-Code
      in: header
      required: false
      schema: { type: string, minLength: 1, maxLength: 100 }
  schemas:
    Metric:
      type: object
      required: [id, tenant_id, metric_name, bucket_date, value, unit, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        tenant_id: { type: string }
        metric_name: { type: string }
        bucket_date: { type: string, format: date }
        value: { type: number }
        unit: { type: string, enum: [count, sum, average, percentage] }
        dimensions: { type: object, additionalProperties: { type: string } }
        sample_count: { type: integer }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    MetricList:
      type: object
      required: [data, next_cursor]
      properties:
        data: { type: array, items: { $ref: '#/components/schemas/Metric' } }
        next_cursor: { type: [string, 'null'] }
    FunnelStep:
      type: object
      required: [stage, count, conversion_from_previous, conversion_from_lead]
      properties:
        stage: { type: string, enum: [leads, applications_started, applications_submitted, admitted, offers_issued, offers_accepted] }
        count: { type: integer, minimum: 0 }
        conversion_from_previous: { type: [number, 'null'], minimum: 0 }
        conversion_from_lead: { type: [number, 'null'], minimum: 0 }
    GrowthBreakdown:
      type: object
      required: [key, leads, applications_started, applications_submitted, admitted, offers_issued, offers_accepted, lead_to_application_rate, application_to_offer_rate]
      properties:
        key: { type: string }
        leads: { type: integer, minimum: 0 }
        applications_started: { type: integer, minimum: 0 }
        applications_submitted: { type: integer, minimum: 0 }
        admitted: { type: integer, minimum: 0 }
        offers_issued: { type: integer, minimum: 0 }
        offers_accepted: { type: integer, minimum: 0 }
        lead_to_application_rate: { type: [number, 'null'], minimum: 0 }
        application_to_offer_rate: { type: [number, 'null'], minimum: 0 }
    EnrolmentForecast:
      type: object
      required: [horizon_days, projected_offer_acceptances, observed_days, method, confidence, calculation_notes]
      properties:
        horizon_days: { type: integer, const: 30 }
        projected_offer_acceptances: { type: number, minimum: 0 }
        observed_days: { type: integer, minimum: 1 }
        method: { type: string, const: observed_offer_acceptance_run_rate }
        confidence: { type: string, enum: [low, medium, high] }
        calculation_notes: { type: array, minItems: 1, items: { type: string } }
    GrowthExecutive:
      type: object
      required: [generated_at, from, to, funnel, by_source, by_programme, forecast, data_quality]
      properties:
        generated_at: { type: string, format: date-time }
        from: { type: string, format: date }
        to: { type: string, format: date }
        funnel: { type: array, items: { $ref: '#/components/schemas/FunnelStep' } }
        by_source: { type: array, items: { $ref: '#/components/schemas/GrowthBreakdown' } }
        by_programme: { type: array, items: { $ref: '#/components/schemas/GrowthBreakdown' } }
        forecast: { $ref: '#/components/schemas/EnrolmentForecast' }
        data_quality: { type: object, required: [unattributed_application_events], properties: { unattributed_application_events: { type: integer, minimum: 0 } } }
    ExecutiveQuestion:
      type: object
      required: [question]
      properties:
        question: { type: string, minLength: 5, maxLength: 500 }
        from: { type: string, format: date }
        to: { type: string, format: date }
    ExecutiveAnswer:
      type: object
      required: [answer, confidence, source_datasets, from, to, filters, calculation_notes, dashboard_url]
      properties:
        answer: { type: string }
        confidence: { type: string, enum: [low, medium, high] }
        source_datasets: { type: array, minItems: 1, items: { type: string } }
        from: { type: string, format: date }
        to: { type: string, format: date }
        filters: { type: object, additionalProperties: { type: string } }
        calculation_notes: { type: array, minItems: 1, items: { type: string } }
        dashboard_url: { type: string }
    Error:
      type: object
      required: [code, message]
      properties: { code: { type: string }, message: { type: string }, request_id: { type: string } }
  responses:
    Unauthorized: { description: Authentication required, content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }
    Forbidden: { description: "Tenant, permission, or feature gate denied", content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }
    ValidationError: { description: Invalid query, content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }
  securitySchemes:
    bearerAuth: { type: http, scheme: bearer, bearerFormat: JWT }
