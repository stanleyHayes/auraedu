openapi: 3.1.0
info:
  title: AuraEDU Student Service API
  version: 1.0.0
  description: >
    Students, guardians, and enrollment (spec \u00a77). Owned by lane L2 (EP-10). Feature flag: student_management.
  contact:
    name: AuraEDU Engineering
servers:
  - url: /api/v1
tags:
  - name: students
  - name: guardians
  - name: enrollments

paths:
    /students:
      get:
            operationId: listStudents
            description: Executes the list students workflow within this AuraEDU API boundary.
            tags: ['students']
            summary: List students
            parameters:
              - $ref: '#/components/parameters/TenantHeader'
              - $ref: '#/components/parameters/ClassIdFilter'
              - $ref: '#/components/parameters/Limit'
              - $ref: '#/components/parameters/Cursor'
            responses:
              '200':
                description: OK
                content:
                  application/json:
                    schema: { $ref: '#/components/schemas/StudentList' }
              '403': { $ref: '#/components/responses/Forbidden' }
              '404': { $ref: '#/components/responses/NotFound' }
              '422': { $ref: '#/components/responses/ValidationError' }
              '401': { $ref: '#/components/responses/Unauthorized' }
      post:
            operationId: createStudent
            description: Executes the create student workflow within this AuraEDU API boundary.
            tags: ['students']
            summary: Create a student
            parameters:
              - $ref: '#/components/parameters/TenantHeader'
            requestBody:
              required: true
              content:
                application/json:
                  schema: { $ref: '#/components/schemas/CreateStudent' }
            responses:
              '201':
                description: OK
                content:
                  application/json:
                    schema: { $ref: '#/components/schemas/Student' }
              '403': { $ref: '#/components/responses/Forbidden' }
              '404': { $ref: '#/components/responses/NotFound' }
              '422': { $ref: '#/components/responses/ValidationError' }
              '401': { $ref: '#/components/responses/Unauthorized' }
    /students/import:
      post:
            operationId: importStudents
            description: Executes the import students workflow within this AuraEDU API boundary.
            tags: ['students']
            summary: Bulk import students and guardians from CSV
            parameters:
              - $ref: '#/components/parameters/TenantHeader'
            requestBody:
              required: true
              content:
                multipart/form-data:
                  schema:
                    type: object
                    properties:
                      file:
                        type: string
                        format: binary
                        description: CSV with columns first_name,last_name,date_of_birth,gender,relationship,guardian_first_name,guardian_last_name,guardian_phone,guardian_email,user_id,guardian_user_id
            responses:
              '200':
                description: OK
                content:
                  application/json:
                    schema: { $ref: '#/components/schemas/ImportResult' }
              '403': { $ref: '#/components/responses/Forbidden' }
              '404': { $ref: '#/components/responses/NotFound' }
              '422': { $ref: '#/components/responses/ValidationError' }
              '401': { $ref: '#/components/responses/Unauthorized' }
    /students/me:
      get:
            operationId: getMyStudent
            tags: ['students']
            summary: Get the caller's own student record
            description: >
              Resolves the student record linked to the authenticated identity user
              (students.user_id = actor user id, AURA-10.12). 404 when the user has
              no linked student. Requires students.read.
            parameters:
              - $ref: '#/components/parameters/TenantHeader'
            responses:
              '200':
                description: OK
                content:
                  application/json:
                    schema: { $ref: '#/components/schemas/Student' }
              '403': { $ref: '#/components/responses/Forbidden' }
              '404': { $ref: '#/components/responses/NotFound' }
              '422': { $ref: '#/components/responses/ValidationError' }
              '401': { $ref: '#/components/responses/Unauthorized' }
    /students/{student_id}:
      get:
            operationId: getStudent
            description: Executes the get student workflow within this AuraEDU API boundary.
            tags: ['students']
            summary: Get a student
            parameters:
              - $ref: '#/components/parameters/TenantHeader'
              - $ref: '#/components/parameters/StudentId'
            responses:
              '200':
                description: OK
                content:
                  application/json:
                    schema: { $ref: '#/components/schemas/Student' }
              '403': { $ref: '#/components/responses/Forbidden' }
              '404': { $ref: '#/components/responses/NotFound' }
              '422': { $ref: '#/components/responses/ValidationError' }
              '401': { $ref: '#/components/responses/Unauthorized' }
      patch:
            operationId: updateStudent
            description: Executes the update student workflow within this AuraEDU API boundary.
            tags: ['students']
            summary: Update a student
            parameters:
              - $ref: '#/components/parameters/TenantHeader'
              - $ref: '#/components/parameters/StudentId'
            requestBody:
              required: true
              content:
                application/json:
                  schema: { $ref: '#/components/schemas/UpdateStudent' }
            responses:
              '200':
                description: OK
                content:
                  application/json:
                    schema: { $ref: '#/components/schemas/Student' }
              '403': { $ref: '#/components/responses/Forbidden' }
              '404': { $ref: '#/components/responses/NotFound' }
              '422': { $ref: '#/components/responses/ValidationError' }
              '401': { $ref: '#/components/responses/Unauthorized' }
      delete:
            operationId: deleteStudent
            description: Executes the delete student workflow within this AuraEDU API boundary.
            tags: ['students']
            summary: Delete a student
            parameters:
              - $ref: '#/components/parameters/TenantHeader'
              - $ref: '#/components/parameters/StudentId'
            responses:
              '204':
                description: No content
              '403': { $ref: '#/components/responses/Forbidden' }
              '404': { $ref: '#/components/responses/NotFound' }
              '422': { $ref: '#/components/responses/ValidationError' }
              '401': { $ref: '#/components/responses/Unauthorized' }
    /students/{student_id}/enrollments:
      get:
            operationId: listEnrollments
            description: Executes the list enrollments workflow within this AuraEDU API boundary.
            tags: ['enrollments']
            summary: List student enrollments
            parameters:
              - $ref: '#/components/parameters/TenantHeader'
              - $ref: '#/components/parameters/StudentId'
              - $ref: '#/components/parameters/Limit'
              - $ref: '#/components/parameters/Cursor'
            responses:
              '200':
                description: OK
                content:
                  application/json:
                    schema: { $ref: '#/components/schemas/EnrollmentList' }
              '403': { $ref: '#/components/responses/Forbidden' }
              '404': { $ref: '#/components/responses/NotFound' }
              '422': { $ref: '#/components/responses/ValidationError' }
              '401': { $ref: '#/components/responses/Unauthorized' }
      post:
            operationId: createEnrollment
            description: Executes the create enrollment workflow within this AuraEDU API boundary.
            tags: ['enrollments']
            summary: Enroll a student
            parameters:
              - $ref: '#/components/parameters/TenantHeader'
              - $ref: '#/components/parameters/StudentId'
            requestBody:
              required: true
              content:
                application/json:
                  schema: { $ref: '#/components/schemas/CreateEnrollment' }
            responses:
              '201':
                description: OK
                content:
                  application/json:
                    schema: { $ref: '#/components/schemas/Enrollment' }
              '403': { $ref: '#/components/responses/Forbidden' }
              '404': { $ref: '#/components/responses/NotFound' }
              '409': { description: Student already has an enrollment for this academic year }
              '422': { $ref: '#/components/responses/ValidationError' }
              '401': { $ref: '#/components/responses/Unauthorized' }
    /students/{student_id}/guardians:
      get:
            operationId: listStudentGuardians
            description: Executes the list student guardians workflow within this AuraEDU API boundary.
            tags: ['guardians']
            summary: List a student's guardians
            parameters:
              - $ref: '#/components/parameters/TenantHeader'
              - $ref: '#/components/parameters/StudentId'
            responses:
              '200':
                description: OK
                content:
                  application/json:
                    schema: { $ref: '#/components/schemas/GuardianList' }
              '403': { $ref: '#/components/responses/Forbidden' }
              '404': { $ref: '#/components/responses/NotFound' }
              '422': { $ref: '#/components/responses/ValidationError' }
              '401': { $ref: '#/components/responses/Unauthorized' }
      post:
            operationId: linkGuardian
            description: Executes the link guardian workflow within this AuraEDU API boundary.
            tags: ['guardians']
            summary: Link a guardian to a student
            parameters:
              - $ref: '#/components/parameters/TenantHeader'
              - $ref: '#/components/parameters/StudentId'
            requestBody:
              required: true
              content:
                application/json:
                  schema: { $ref: '#/components/schemas/LinkGuardian' }
            responses:
              '201':
                description: Created
                content:
                  application/json:
                    schema: { $ref: '#/components/schemas/StudentGuardianLink' }
              '403': { $ref: '#/components/responses/Forbidden' }
              '404': { $ref: '#/components/responses/NotFound' }
              '422': { $ref: '#/components/responses/ValidationError' }
              '401': { $ref: '#/components/responses/Unauthorized' }
    /guardians:
      post:
            operationId: createGuardian
            description: Executes the create guardian workflow within this AuraEDU API boundary.
            tags: ['guardians']
            summary: Create a guardian
            parameters:
              - $ref: '#/components/parameters/TenantHeader'
            requestBody:
              required: true
              content:
                application/json:
                  schema: { $ref: '#/components/schemas/CreateGuardian' }
            responses:
              '201':
                description: Created
                content:
                  application/json:
                    schema: { $ref: '#/components/schemas/Guardian' }
              '403': { $ref: '#/components/responses/Forbidden' }
              '404': { $ref: '#/components/responses/NotFound' }
              '422': { $ref: '#/components/responses/ValidationError' }
              '401': { $ref: '#/components/responses/Unauthorized' }
    /guardians/me/children:
      get:
            operationId: getMyGuardianChildren
            tags: ['guardians']
            summary: Get the caller's guardian record with their linked students
            description: >
              Resolves the guardian record linked to the authenticated identity user
              (guardians.user_id = actor user id, AURA-10.12) and returns it with the
              students linked via the student_guardians link table. 404 when the user
              has no linked guardian. Requires students.read.
            parameters:
              - $ref: '#/components/parameters/TenantHeader'
            responses:
              '200':
                description: OK
                content:
                  application/json:
                    schema: { $ref: '#/components/schemas/GuardianChildren' }
              '403': { $ref: '#/components/responses/Forbidden' }
              '404': { $ref: '#/components/responses/NotFound' }
              '422': { $ref: '#/components/responses/ValidationError' }
              '401': { $ref: '#/components/responses/Unauthorized' }
    /guardians/{guardian_id}:
      get:
            operationId: getGuardian
            description: Executes the get guardian workflow within this AuraEDU API boundary.
            tags: ['guardians']
            summary: Get a guardian
            parameters:
              - $ref: '#/components/parameters/TenantHeader'
              - $ref: '#/components/parameters/GuardianId'
            responses:
              '200':
                description: OK
                content:
                  application/json:
                    schema: { $ref: '#/components/schemas/Guardian' }
              '403': { $ref: '#/components/responses/Forbidden' }
              '404': { $ref: '#/components/responses/NotFound' }
              '422': { $ref: '#/components/responses/ValidationError' }
              '401': { $ref: '#/components/responses/Unauthorized' }
      patch:
            operationId: updateGuardian
            description: Executes the update guardian workflow within this AuraEDU API boundary.
            tags: ['guardians']
            summary: Update a guardian
            parameters:
              - $ref: '#/components/parameters/TenantHeader'
              - $ref: '#/components/parameters/GuardianId'
            requestBody:
              required: true
              content:
                application/json:
                  schema: { $ref: '#/components/schemas/UpdateGuardian' }
            responses:
              '200':
                description: OK
                content:
                  application/json:
                    schema: { $ref: '#/components/schemas/Guardian' }
              '403': { $ref: '#/components/responses/Forbidden' }
              '404': { $ref: '#/components/responses/NotFound' }
              '422': { $ref: '#/components/responses/ValidationError' }
              '401': { $ref: '#/components/responses/Unauthorized' }
      delete:
            operationId: deleteGuardian
            description: Executes the delete guardian workflow within this AuraEDU API boundary.
            tags: ['guardians']
            summary: Delete a guardian
            parameters:
              - $ref: '#/components/parameters/TenantHeader'
              - $ref: '#/components/parameters/GuardianId'
            responses:
              '204':
                description: No content
              '403': { $ref: '#/components/responses/Forbidden' }
              '404': { $ref: '#/components/responses/NotFound' }
              '422': { $ref: '#/components/responses/ValidationError' }
              '401': { $ref: '#/components/responses/Unauthorized' }
    /students/{student_id}/guardians/{guardian_id}:
      delete:
            operationId: unlinkGuardian
            description: Executes the unlink guardian workflow within this AuraEDU API boundary.
            tags: ['guardians']
            summary: Unlink a guardian from a student
            parameters:
              - $ref: '#/components/parameters/TenantHeader'
              - $ref: '#/components/parameters/StudentId'
              - $ref: '#/components/parameters/GuardianId'
            responses:
              '204':
                description: No content
              '403': { $ref: '#/components/responses/Forbidden' }
              '404': { $ref: '#/components/responses/NotFound' }
              '422': { $ref: '#/components/responses/ValidationError' }
              '401': { $ref: '#/components/responses/Unauthorized' }

components:
  parameters:
    StudentId:
      name: student_id
      in: path
      required: true
      schema: { type: string, format: uuid }
    GuardianId:
      name: guardian_id
      in: path
      required: true
      schema: { type: string, format: uuid }
    TenantHeader:
      name: X-Tenant-Code
      in: header
      required: false
      description: Optional tenant code for resolution when the gateway cannot derive it from the host.
      schema: { type: string, example: upshs }
    Limit:
      name: limit
      in: query
      schema: { type: integer, minimum: 1, maximum: 100, default: 25 }
    Cursor:
      name: cursor
      in: query
      schema: { type: string }
    ClassIdFilter:
      name: class_id
      in: query
      required: false
      description: Filter students by class (roster view). Tenant-scoped like the rest of the list.
      schema: { type: string, format: uuid }

  schemas:
    Error:
      type: object
      required: [code, message]
      properties:
        code: { type: string, enum: [forbidden, feature_disabled, tenant_mismatch, validation_error, not_found, unauthorized] }
        message: { type: string }
        request_id: { type: string }
    Student:
        type: object
        required: [id, tenant_id, first_name, last_name, student_code, status, created_at, updated_at]
        properties:
          id: { type: string, format: uuid }
          tenant_id: { type: string }
          first_name: { type: string }
          last_name: { type: string }
          student_code: { type: string }
          date_of_birth: { type: [string, 'null'], format: date }
          gender: { type: [string, 'null'], enum: [male, female, other] }
          status: { type: string, enum: [active, withdrawn, graduated] }
          class_id: { type: [string, 'null'], format: uuid }
          academic_year_id: { type: [string, 'null'], format: uuid }
          user_id: { type: [string, 'null'], format: uuid, description: Soft link to the identity-service user that owns this record (no cross-service FK). }
          created_at: { type: string, format: date-time }
          updated_at: { type: string, format: date-time }
    CreateStudent:
        type: object
        required: [first_name, last_name]
        properties:
          first_name: { type: string }
          last_name: { type: string }
          date_of_birth: { type: [string, 'null'], format: date }
          gender: { type: [string, 'null'], enum: [male, female, other] }
          class_id: { type: [string, 'null'], format: uuid }
          academic_year_id: { type: [string, 'null'], format: uuid }
          user_id: { type: [string, 'null'], format: uuid, description: Optional identity user to link the record to at creation. }
    UpdateStudent:
        type: object
        properties:
          first_name: { type: string }
          last_name: { type: string }
          status: { type: string, enum: [active, withdrawn, graduated] }
          user_id: { type: [string, 'null'], format: uuid, description: Identity account link; null clears an existing link. }
    Guardian:
        type: object
        required: [id, tenant_id, first_name, last_name, relationship]
        properties:
          id: { type: string, format: uuid }
          tenant_id: { type: string, format: uuid }
          first_name: { type: string }
          last_name: { type: string }
          relationship: { type: string }
          phone: { type: [string, 'null'] }
          email: { type: [string, 'null'], format: email }
          user_id: { type: [string, 'null'], format: uuid, description: Soft link to the identity-service user that owns this record (no cross-service FK). }
    CreateGuardian:
        type: object
        required: [first_name, last_name, relationship]
        properties:
          first_name: { type: string }
          last_name: { type: string }
          relationship: { type: string }
          phone: { type: [string, 'null'] }
          email: { type: [string, 'null'], format: email }
          user_id: { type: [string, 'null'], format: uuid, description: Optional identity user to link the record to at creation. }
    GuardianChildren:
        type: object
        required: [guardian, students]
        properties:
          guardian: { $ref: '#/components/schemas/Guardian' }
          students:
            type: array
            items: { $ref: '#/components/schemas/Student' }
    UpdateGuardian:
        type: object
        properties:
          first_name: { type: string }
          last_name: { type: string }
          relationship: { type: string }
          phone: { type: [string, 'null'] }
          email: { type: [string, 'null'], format: email }
    LinkGuardian:
        type: object
        required: [guardian_id]
        properties:
          guardian_id: { type: string, format: uuid }
          relationship: { type: string }
          is_primary: { type: boolean, default: false }
    StudentGuardianLink:
        type: object
        required: [id, tenant_id, student_id, guardian_id, is_primary]
        properties:
          id: { type: string, format: uuid }
          tenant_id: { type: string, format: uuid }
          student_id: { type: string, format: uuid }
          guardian_id: { type: string, format: uuid }
          relationship: { type: [string, 'null'] }
          is_primary: { type: boolean }
    ImportResult:
        type: object
        required: [students_created, guardians_created, links_created, errors]
        properties:
          students_created: { type: integer }
          guardians_created: { type: integer }
          links_created: { type: integer }
          errors:
            type: array
            items:
              type: object
              required: [row, message]
              properties:
                row: { type: integer }
                message: { type: string }
    Enrollment:
        type: object
        required: [id, tenant_id, student_id, class_id, academic_year_id, enrolled_at]
        properties:
          id: { type: string, format: uuid }
          tenant_id: { type: string, minLength: 1 }
          student_id: { type: string, format: uuid }
          class_id: { type: string, format: uuid }
          academic_year_id: { type: string, format: uuid }
          enrolled_at: { type: string, format: date-time }
    CreateEnrollment:
        type: object
        required: [class_id, academic_year_id]
        properties:
          class_id: { type: string, format: uuid }
          academic_year_id: { type: string, format: uuid }
    StudentList:
        type: object
        properties:
          data: { type: array, items: { $ref: '#/components/schemas/Student' } }
          next_cursor: { type: [string, 'null'] }
    GuardianList:
        type: object
        properties:
          data: { type: array, items: { $ref: '#/components/schemas/Guardian' } }
          next_cursor: { type: [string, 'null'] }
    EnrollmentList:
        type: object
        properties:
          data: { type: array, items: { $ref: '#/components/schemas/Enrollment' } }
          next_cursor: { type: [string, 'null'] }

  responses:
    Unauthorized:
      description: Missing or invalid bearer token
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
          example: { code: unauthorized, message: "Authentication required" }
    Forbidden:
      description: Not permitted (auth, tenant scope, RBAC, or feature disabled)
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
          examples:
            forbidden: { value: { code: forbidden, message: "Missing required permission" } }
            feature_disabled: { value: { code: feature_disabled, message: "Feature not enabled for tenant" } }
            tenant_mismatch: { value: { code: tenant_mismatch, message: "Resource belongs to another tenant" } }
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
          example: { code: not_found, message: "Resource not found" }
    ValidationError:
      description: Request failed validation
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
          example: { code: validation_error, message: "request body is invalid" }

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

security:
  - bearerAuth: []
