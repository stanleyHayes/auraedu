# AuraEDU feature-flag registry — SOURCE OF TRUTH for feature keys (agent_plan Appendix A).
# Codegen emits typed constants for Go (platform/flags) + TS (packages/feature-flags).
# Every major feature is independently enable/disable-able per tenant (spec §3, §9).
#
# plan_required: minimum subscription plan that unlocks the feature (spec §16).
#   core = always available. starter < growth < professional < ai_plus < enterprise.
# defaults: initial-tenant seed values (spec §20). "optional" = off by default, admin may enable.

version: 1

features:
  - key: public_website
    plan_required: starter
    description: Public school website
    defaults: { upshs: on, aboom: on }

  - key: admissions
    plan_required: growth
    description: Online admissions
    defaults: { upshs: on, aboom: off }

  - key: student_management
    plan_required: starter
    description: Students, guardians, enrollment
    defaults: { upshs: on, aboom: on }

  - key: staff_management
