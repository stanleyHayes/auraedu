<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 208 48" role="img" aria-labelledby="aura-logo-title aura-logo-desc">
  <title id="aura-logo-title">AuraEDU</title>
  <desc id="aura-logo-desc">AuraEDU learning orbit logo</desc>
  <defs><linearGradient id="aura-field" x1="6" y1="4" x2="42" y2="44" gradientUnits="userSpaceOnUse"><stop stop-color="#1557FF"/><stop offset="1" stop-color="#087F8C"/></linearGradient></defs>
  <rect x="1" y="1" width="46" height="46" rx="14" fill="#061631"/><rect x="1.5" y="1.5" width="45" height="45" rx="13.5" fill="none" stroke="#FFFFFF" stroke-opacity=".16"/>
  <g class="aura-orbit"><path d="M9.5 29.4c2.6-12 14.8-20.3 26.8-15.9 3.3 1.2 5.4 3.7 5.2 6.6-.3 4.1-5.2 6.2-10 6.2" fill="none" stroke="url(#aura-field)" stroke-width="5" stroke-linecap="round"/><path d="M9.8 35.3c7.6 4.8 20.6 5.1 28.6.6" fill="none" stroke="#63D5DA" stroke-width="2.25" stroke-linecap="round"/></g>
  <path d="M13.2 35.4 22 14.6c.7-1.7 3.1-1.7 3.8 0l8.9 20.8M17.1 27.6h13.7" fill="none" stroke="#F8FAFF" stroke-width="4.25" stroke-linecap="round" stroke-linejoin="round"/>
  <g class="aura-signal"><circle cx="39.2" cy="34.7" r="3.2" fill="#B7F500"/><circle cx="39.2" cy="34.7" r="1.15" fill="#061631"/></g>
  <text x="59" y="32.5" fill="#F8FAFF" font-family="Avenir Next, Avenir, Segoe UI, Helvetica, Arial, sans-serif" font-size="27" font-weight="800" letter-spacing="-1.2">Aura</text>
  <rect x="122" y="13" width="70" height="24" rx="12" fill="#FFFFFF" fill-opacity=".09" stroke="#FFFFFF" stroke-opacity=".12"/>
  <text x="135" y="29.5" fill="#B7F500" font-family="SFMono-Regular, Consolas, Liberation Mono, Menlo, monospace" font-size="13" font-weight="800" letter-spacing="2.4">EDU</text>
  <style>.aura-orbit{transform-origin:24px 24px;animation:aura-orbit-in .75s cubic-bezier(.2,.8,.2,1) both}.aura-signal{transform-origin:39.2px 34.7px;animation:aura-signal-in .45s .4s cubic-bezier(.2,1.6,.4,1) both}@keyframes aura-orbit-in{from{opacity:0;transform:rotate(-18deg) scale(.84)}to{opacity:1;transform:none}}@keyframes aura-signal-in{from{opacity:0;transform:scale(.1)}to{opacity:1;transform:scale(1)}}@media(prefers-reduced-motion:reduce){.aura-orbit,.aura-signal{animation:none}}</style>
</svg>
