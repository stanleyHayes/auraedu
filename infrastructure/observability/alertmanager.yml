global:
  resolve_timeout: 5m

# Local development keeps alerts visible in Alertmanager without sending them
# outside the workstation. Production must replace the empty receivers with
# secret-backed paging and communications integrations; the label routing and
# inhibition policy remain the contract.
route:
  receiver: local-observability
  group_by: [alertname, service, team]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    - receiver: local-critical
      matchers: [severity="critical"]
      continue: false
    - receiver: local-security
      matchers: [team="security"]
      continue: false
    - receiver: local-warning
      matchers: [severity="warning"]
      continue: false

inhibit_rules:
  - source_matchers: [alertname="AuraEDUServiceDown"]
    target_matchers: [severity=~"warning|critical"]
    equal: [service]

receivers:
  - name: local-observability
  - name: local-critical
  - name: local-security
  - name: local-warning
