global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    platform: auraedu
    environment: local

rule_files:
  - /etc/prometheus/rules/*.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: auraedu-services
    metrics_path: /metrics
    static_configs:
      - targets:
          - api-gateway:8080
          - identity-service:8081
          - tenant-service:8082
          - student-service:8090
          - staff-service:8091
          - academic-service:8092
          - file-service:8093
          - attendance-service:8094
          - assessment-service:8095
          - report-service:8096
          - fees-service:8097
          - payment-service:8098
          - notification-service:8099
          - billing-service:8100
          - website-service:8101
          - analytics-service:8102
          - cbt-service:8103
          - audit-service:8104
          - crm-service:8105
          - knowledge-service:8110
          - ai-orchestrator-service:8111
          - campaign-service:8113
          - admissions-service:8114
          - market-intelligence-service:8115
          - ai-recommendation-service:8200
          - ai-prediction-service:8201
          - career-guidance-service:8112

  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:8888"]

  - job_name: auraedu-worker-metrics
    static_configs:
      - targets: ["otel-collector:8889"]

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
