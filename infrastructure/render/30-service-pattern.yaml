# Reusable Render service patterns. Copy, rename, and customize for each service.

services:
  # ---- Public web service pattern (api-gateway, web, marketing) ------------
  - name: service-name-web
    type: web
    runtime: docker
    region: frankfurt
    plan: starter
    dockerfilePath: ./apps/service-name/Dockerfile
    dockerContext: .
    healthCheckPath: /health
    autoDeployTrigger: checksPass
    buildFilter:
      paths:
        - apps/service-name/**
        - platform/** # remove for TS frontends
      ignoredPaths:
        - "**/*_test.go"
        - "**/*.md"
    envVars:
      - fromGroup: auraedu-shared-config

  # ---- Private Go service pattern (domain services) ------------------------
  - name: service-name
    type: pserv
    runtime: docker
    region: frankfurt
    plan: starter
    dockerfilePath: ./apps/service-name/Dockerfile
    dockerContext: .
    healthCheckPath: /health
    autoDeployTrigger: checksPass
    buildFilter:
      paths:
        - apps/service-name/**
        - platform/**
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: service-name-db
          property: connectionString
      - key: NATS_HOST
        fromService:
          name: nats
          property: host
      - fromGroup: auraedu-shared-config

  # ---- Worker pattern (event consumer / background job) --------------------
  - name: service-name-worker
    type: worker
    runtime: docker
    region: frankfurt
    plan: starter
    dockerfilePath: ./apps/service-name/Dockerfile
    dockerContext: .
    autoDeployTrigger: checksPass
    buildFilter:
      paths:
        - apps/service-name/**
        - platform/**
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: service-name-db
          property: connectionString
      - key: NATS_HOST
        fromService:
          name: nats
          property: host
      - fromGroup: auraedu-shared-config

  # ---- Cron pattern (scheduled job) ----------------------------------------
  - name: service-name-cron
    type: cron
    schedule: "0 2 * * *"
    runtime: docker
    region: frankfurt
    plan: starter
    dockerfilePath: ./apps/service-name/Dockerfile
    dockerContext: .
    buildFilter:
      paths:
        - apps/service-name/**
        - platform/**
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: service-name-db
          property: connectionString
      - fromGroup: auraedu-shared-config
