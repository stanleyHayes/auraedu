# Root of the uv workspace for Python AI services (apps/ai-*, career-guidance-service).
# Each service is its own member with its own pyproject.toml.
[tool.uv.workspace]
members = [
  "apps/ai-recommendation-service",
  "apps/ai-prediction-service",
  "apps/career-guidance-service",
]

[tool.ruff]
target-version = "py314"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W", "UP", "B", "C4", "SIM", "ARG", "PTH", "PL", "TRY", "PERF", "FURB", "RUF", "S"]

[tool.ruff.lint.per-file-ignores]
"**/tests/**/*.py" = ["S101", "PLR2004"]
"**/test_*/**/*.py" = ["S101", "PLR2004"]
"tools/codegen/scripts/*.py" = ["E501", "S311", "PLR0913", "ARG001", "PERF401", "PERF402"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.mypy]
python_version = "3.14"
strict = true
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = [
  "test_ai_prediction.*",
  "test_career_guidance.*",
  "ai_recommendation_service.tests.*",
  "tools.codegen.scripts.seed_contracts",
]
ignore_errors = true

[dependency-groups]
dev = [
  "pytest>=9.1.1",
  "pytest-asyncio>=1.4.0",
  "httpx>=0.28.1",
  "aiosqlite>=0.22.1",
  "jsonschema[format]>=4.25.1",
  "ruff>=0.15.21",
  "pip-audit>=2.10.1",
  "mypy>=1.16.0",
  "pyright>=1.1.411",
]

[tool.pytest.ini_options]
addopts = "-q"
asyncio_mode = "auto"
pythonpath = ["."]
