    restart: unless-stopped


  # ---- Audit Service --------------------------------------------------------
  audit-service:
    build:
      context: ..
      dockerfile: ./apps/audit-service/Dockerfile
      args:
        GIT_SHA: local
    working_dir: /
    ports: ["8104:8104"]
    environment:
      <<: *observability-env
      PORT: 8104
      DATABASE_URL: postgres://auraedu:auraedu@postgres:5432/audit?sslmode=disable
      NATS_URL: nats://nats:4222
      LOG_LEVEL: ${LOG_LEVEL:-info}
    volumes:
      - ../apps/audit-service/migrations:/migrations:ro
    depends_on:
      postgres: { condition: service_healthy }
      nats: { condition: service_healthy }
    restart: unless-stopped
  audit-worker:
    build:
      context: ..
      dockerfile: ./apps/audit-service/Dockerfile
      args:
        GIT_SHA: local
    working_dir: /
    environment:
      <<: *observability-env
      DATABASE_URL: postgres://auraedu:auraedu@postgres:5432/audit?sslmode=disable
      NATS_URL: nats://nats:4222
      LOG_LEVEL: ${LOG_LEVEL:-info}
    volumes:
      - ../apps/audit-service/migrations:/migrations:ro
    command: ["worker"]
    depends_on:
      postgres: { condition: service_healthy }
      nats: { condition: service_healthy }
      audit-service: { condition: service_started }
    restart: unless-stopped
  # ---- Frontends ------------------------------------------------------------
  web:
    build:
      context: ..
      dockerfile: ./apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:${GATEWAY_HOST_PORT:-8080}
        NEXT_PUBLIC_APP_URL: http://localhost:${WEB_HOST_PORT:-3000}
    ports: ["${WEB_HOST_PORT:-3000}:3000"]
    environment:
      <<: *observability-env
      PORT: 3000
      # Browser-side calls go to the host-published gateway port.
      NEXT_PUBLIC_API_URL: http://localhost:${GATEWAY_HOST_PORT:-8080}
      # Server components, route handlers and server actions run inside the
      # container, where `localhost` is the web container itself — they must
      # reach the gateway over the compose network instead.
      API_GATEWAY_INTERNAL_URL: http://api-gateway:8080
    depends_on:
      api-gateway: { condition: service_started }
    restart: unless-stopped

  marketing:
    build:
      context: ..
      dockerfile: ./apps/marketing/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:${GATEWAY_HOST_PORT:-8080}
        NEXT_PUBLIC_APP_URL: http://localhost:${WEB_HOST_PORT:-3000}
    ports: ["${MARKETING_HOST_PORT:-3001}:3001"]
    environment:
      <<: *observability-env
      PORT: 3001
      # Server components (pricing/signup) call the API at request time.
      NEXT_PUBLIC_API_URL: http://localhost:${GATEWAY_HOST_PORT:-8080}
      AURAEDU_API_URL: http://api-gateway:8080
    depends_on:
      api-gateway: { condition: service_started }
    restart: unless-stopped

volumes:
  file-storage:
  report-pdfs:
