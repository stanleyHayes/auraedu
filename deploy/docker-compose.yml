      SERVICE_STAFF_URL: http://staff-service:8091
      SERVICE_ACADEMIC_URL: http://academic-service:8092
      SERVICE_FILE_URL: http://file-service:8093
      SERVICE_ATTENDANCE_URL: http://attendance-service:8094
      SERVICE_ASSESSMENT_URL: http://assessment-service:8095
      SERVICE_REPORT_URL: http://report-service:8096
      SERVICE_FEES_URL: http://fees-service:8097
      SERVICE_PAYMENT_URL: http://payment-service:8098
      SERVICE_NOTIFICATION_URL: http://notification-service:8099
      SERVICE_BILLING_URL: http://billing-service:8100
      SERVICE_WEBSITE_URL: http://website-service:8101
      SERVICE_ANALYTICS_URL: http://analytics-service:8102
      SERVICE_CBT_URL: http://cbt-service:8103
