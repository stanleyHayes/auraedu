      tenant-service: { condition: service_started }
      student-service: { condition: service_started }
      staff-service: { condition: service_started }
      academic-service: { condition: service_started }
      file-service: { condition: service_started }
      attendance-service: { condition: service_started }
      assessment-service: { condition: service_started }
      report-service: { condition: service_started }
      fees-service: { condition: service_started }
      payment-service: { condition: service_started }
      notification-service: { condition: service_started }
      billing-service: { condition: service_started }
      website-service: { condition: service_started }
      analytics-service: { condition: service_started }
      cbt-service: { condition: service_started }
      audit-service: { condition: service_started }
      ai-recommendation-service: { condition: service_started }
      ai-prediction-service: { condition: service_started }
      career-guidance-service: { condition: service_started }
