      FEATURES_REGISTRY: /contracts/features/features.yaml
      SERVICE_TENANT_URL: http://tenant-service:8082
      FILE_STORAGE_DIR: /tmp/auraedu-files
      CLOUDINARY_URL: ${CLOUDINARY_URL:-}
      CLOUDINARY_RESOURCE_TYPE: ${CLOUDINARY_RESOURCE_TYPE:-raw}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-local-internal-service-token}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    volumes:
      - ../apps/file-service/migrations:/migrations:ro
      - ../contracts/features/features.yaml:/contracts/features/features.yaml:ro
      - file-storage:/tmp/auraedu-files
    depends_on:
      postgres: { condition: service_healthy }
      nats: { condition: service_healthy }
    restart: unless-stopped

  file-worker:
    build:
      context: ..
      dockerfile: ./apps/file-service/Dockerfile
      args:
        GIT_SHA: local
    working_dir: /
    command: ["worker"]
    environment:
      <<: *observability-env
      DATABASE_URL: postgres://auraedu:auraedu@postgres:5432/file?sslmode=disable
      NATS_URL: nats://nats:4222
      FILE_STORAGE_DIR: /tmp/auraedu-files
      CLOUDINARY_URL: ${CLOUDINARY_URL:-}
      CLOUDINARY_RESOURCE_TYPE: ${CLOUDINARY_RESOURCE_TYPE:-raw}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    volumes:
      - ../apps/file-service/migrations:/migrations:ro
      - file-storage:/tmp/auraedu-files
    depends_on:
      postgres: { condition: service_healthy }
      nats: { condition: service_healthy }
      file-service: { condition: service_started }
    restart: unless-stopped

  # ---- AI services ----------------------------------------------------------
  ai-recommendation-service:
