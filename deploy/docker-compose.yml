# AuraEDU — full local stack (agent_plan §4, AURA-7.2).
# Boots all backend services + web + marketing on top of the infra compose.
# Usage: `make dev` or `docker compose -f deploy/docker-compose.yml up --build`.

name: auraedu

include:
  # Shared infra: Postgres (logical DB-per-service), Valkey, NATS JetStream, OTel collector.
  - path: ./docker-compose.infra.yml

services:
  # ---- Go platform services -------------------------------------------------
  identity-service:
    build:
      context: ..
      dockerfile: ./apps/identity-service/Dockerfile
      args:
        GIT_SHA: local
    ports: ["8081:8081"]
    environment:
      DATABASE_URL: postgres://auraedu:auraedu@postgres:5432/identity?sslmode=disable
      REDIS_URL: redis://redis:6379
      NATS_HOST: nats:4222
      JWT_SIGNING_KEY: ${JWT_SIGNING_KEY:-local-dev-signing-key-change-me}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      nats: { condition: service_healthy }
    restart: unless-stopped

  tenant-service:
    build:
      context: ..
      dockerfile: ./apps/tenant-service/Dockerfile
      args:
        GIT_SHA: local
    ports: ["8082:8082"]
    environment:
      DATABASE_URL: postgres://auraedu:auraedu@postgres:5432/tenant?sslmode=disable
      NATS_HOST: nats:4222
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      postgres: { condition: service_healthy }
      nats: { condition: service_healthy }
    restart: unless-stopped

  student-service:
    build:
      context: ..
      dockerfile: ./apps/student-service/Dockerfile
      args:
        GIT_SHA: local
    ports: ["8090:8080"]
    environment:
      DATABASE_URL: postgres://auraedu:auraedu@postgres:5432/student?sslmode=disable
      NATS_HOST: nats:4222
      FEATURES_REGISTRY: /contracts/features/features.yaml
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      postgres: { condition: service_healthy }
      nats: { condition: service_healthy }
    restart: unless-stopped

  api-gateway:
    build:
      context: ..
      dockerfile: ./apps/api-gateway/Dockerfile
      args:
        GIT_SHA: local
    ports: ["8080:8080"]
    environment:
      IDENTITY_HOSTPORT: identity-service:8081
      TENANT_HOSTPORT: tenant-service:8082
      SERVICE_AI_RECOMMENDATION_URL: http://ai-recommendation-service:8200
      SERVICE_AI_PREDICTION_URL: http://ai-prediction-service:8201
      SERVICE_CAREER_GUIDANCE_URL: http://career-guidance-service:8112
      SERVICE_FILE_URL: http://file-service:8098
      SERVICE_STUDENT_URL: http://student-service:8090
      REDIS_URL: redis://redis:6379
      NATS_HOST: nats:4222
      JWT_SIGNING_KEY: ${JWT_SIGNING_KEY:-local-dev-signing-key-change-me}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      identity-service: { condition: service_started }
      tenant-service: { condition: service_started }
      ai-recommendation-service: { condition: service_started }
      ai-prediction-service: { condition: service_started }
      career-guidance-service: { condition: service_started }
      file-service: { condition: service_started }
      student-service: { condition: service_started }
      redis: { condition: service_healthy }
      nats: { condition: service_healthy }
    restart: unless-stopped

  # ---- File Service ---------------------------------------------------------
  file-service:
    build:
      context: ..
      dockerfile: ./apps/file-service/Dockerfile
      args:
        GIT_SHA: local
    ports: ["8098:8098"]
    environment:
      DATABASE_URL: postgres://auraedu:auraedu@postgres:5432/file?sslmode=disable
      NATS_HOST: nats:4222
      FILE_STORAGE_DIR: /tmp/auraedu-files
      CLOUDINARY_URL: ${CLOUDINARY_URL:-}
      CLOUDINARY_RESOURCE_TYPE: ${CLOUDINARY_RESOURCE_TYPE:-raw}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      postgres: { condition: service_healthy }
      nats: { condition: service_healthy }
    restart: unless-stopped

  # ---- AI services ----------------------------------------------------------
  ai-recommendation-service:
    build:
      context: ..
      dockerfile: ./apps/ai-recommendation-service/Dockerfile
    ports: ["8200:8200"]
    environment:
      AI_REC_DATABASE_URL: postgres://auraedu:auraedu@postgres:5432/ai?sslmode=disable
      AI_REC_NATS_HOST: nats:4222
      AI_REC_PORT: 8200
    depends_on:
      postgres: { condition: service_healthy }
      nats: { condition: service_healthy }
    restart: unless-stopped

  ai-prediction-service:
    build:
      context: ..
      dockerfile: ./apps/ai-prediction-service/Dockerfile
    ports: ["8201:8201"]
    environment:
      AI_PRED_DATABASE_URL: postgres://auraedu:auraedu@postgres:5432/ai?sslmode=disable
      AI_PRED_NATS_HOST: nats:4222
      AI_PRED_PORT: 8201
    depends_on:
      postgres: { condition: service_healthy }
      nats: { condition: service_healthy }
    restart: unless-stopped

  career-guidance-service:
    build:
      context: ..
      dockerfile: ./apps/career-guidance-service/Dockerfile
    ports: ["8112:8112"]
    environment:
      AI_GUIDANCE_DATABASE_URL: postgres://auraedu:auraedu@postgres:5432/ai?sslmode=disable
      AI_GUIDANCE_NATS_HOST: nats:4222
      AI_GUIDANCE_PORT: 8112
    depends_on:
      postgres: { condition: service_healthy }
      nats: { condition: service_healthy }
    restart: unless-stopped


  # ---- Audit Service --------------------------------------------------------
  audit-service:
    build:
      context: ..
      dockerfile: ./apps/audit-service/Dockerfile
      args:
        GIT_SHA: local
    ports: ["8103:8080"]
    environment:
      DATABASE_URL: postgres://auraedu:auraedu@postgres:5432/audit?sslmode=disable
      NATS_URL: nats://nats:4222
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      postgres: { condition: service_healthy }
      nats: { condition: service_healthy }
    restart: unless-stopped
  audit-worker:
    build:
      context: ..
      dockerfile: ./apps/audit-service/Dockerfile
      args:
        GIT_SHA: local
    environment:
      DATABASE_URL: postgres://auraedu:auraedu@postgres:5432/audit?sslmode=disable
      NATS_URL: nats://nats:4222
      LOG_LEVEL: ${LOG_LEVEL:-info}
    entrypoint: ["/worker"]
    depends_on:
      postgres: { condition: service_healthy }
      nats: { condition: service_healthy }
    restart: unless-stopped
  # ---- Frontends ------------------------------------------------------------
  web:
    build:
      context: ..
      dockerfile: ./apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8080
    ports: ["3000:3000"]
    environment:
      PORT: 3000
      NEXT_PUBLIC_API_URL: http://localhost:8080
    depends_on:
      api-gateway: { condition: service_started }
    restart: unless-stopped

  marketing:
    build:
      context: ..
      dockerfile: ./apps/marketing/Dockerfile
    ports: ["3001:3001"]
    environment:
      PORT: 3001
    depends_on:
      api-gateway: { condition: service_started }
    restart: unless-stopped
