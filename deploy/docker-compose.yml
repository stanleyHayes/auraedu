      context: ..
      dockerfile: ./apps/ai-recommendation-service/Dockerfile
    ports: ["8200:8200"]
    environment:
      <<: *observability-env
      AI_REC_DATABASE_URL: postgres://auraedu:auraedu@postgres:5432/ai?sslmode=disable
      AI_REC_NATS_HOST: nats:4222
      AI_REC_PORT: 8200
      AI_REC_STUDENT_SERVICE_URL: http://student-service:8083
      AI_REC_TENANT_SERVICE_URL: http://tenant-service:8082
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-local-internal-service-token}
    depends_on:
      postgres: { condition: service_healthy }
      nats: { condition: service_healthy }
      student-service: { condition: service_started }
      tenant-service: { condition: service_started }
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8200/ready', timeout=2).read()",
        ]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 20s
    restart: unless-stopped

  ai-prediction-service:
