    environment:
      <<: *observability-env
      AI_GUIDANCE_DATABASE_URL: postgres://auraedu:auraedu@postgres:5432/ai?sslmode=disable
      AI_GUIDANCE_NATS_HOST: nats:4222
      AI_GUIDANCE_PORT: 8112
      AI_GUIDANCE_STUDENT_SERVICE_URL: http://student-service:8083
      AI_GUIDANCE_TENANT_SERVICE_URL: http://tenant-service:8082
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-local-internal-service-token}
    depends_on:
