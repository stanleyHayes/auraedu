# AuraEDU — full local stack (agent_plan §4, AURA-7.2/AURA-9.2).
# Boots all backend services + workers + web + marketing on top of the infra compose.
# Usage: `make dev` or `docker compose -f deploy/docker-compose.yml up --build`.
#
# Conventions:
#   - Go services run migrations on boot (goose, dir "migrations" relative to CWD).
#     The images don't ship migration files, so each service mounts
#     ../apps/<svc>/migrations at /migrations and runs with working_dir /.
#   - Feature flags load from contracts/features/features.yaml (mounted at
#     /contracts) for services whose image doesn't bake the contracts in.
#   - Container port == host port == agent_plan.md Appendix D port (via PORT env).
#   - Event workers are the same image with `command: ["worker"]` (cobra subcommand).

name: auraedu

x-observability-env: &observability-env
  OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
  OTEL_EXPORTER_OTLP_PROTOCOL: grpc
  OTEL_TRACES_SAMPLER_ARG: ${OTEL_TRACES_SAMPLER_ARG:-1.0}
  OTEL_RESOURCE_ATTRIBUTES: deployment.environment.name=local

include:
  # Shared infra: Postgres (logical DB-per-service), Valkey, NATS JetStream, OTel collector.
  - path: ./docker-compose.infra.yml

services:
  # ---- Go platform services -------------------------------------------------
  identity-service:
    build:
      context: ..
      dockerfile: ./apps/identity-service/Dockerfile
      args:
        GIT_SHA: local
    ports: ["8081:8081"]
    environment:
      <<: *observability-env
      DATABASE_URL: postgres://auraedu:auraedu@postgres:5432/identity?sslmode=disable
      REDIS_URL: redis://redis:6379
      NATS_URL: nats://nats:4222
      JWT_SIGNING_KEY: ${JWT_SIGNING_KEY:-local-dev-signing-key-change-me}
      MFA_ENCRYPTION_KEY: ${MFA_ENCRYPTION_KEY:-local-dev-mfa-encryption-key-change-me-now}
      SERVICE_NOTIFICATION_URL: http://notification-service:8099
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-local-internal-service-token}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      nats: { condition: service_healthy }
    restart: unless-stopped

  identity-worker:
    build:
      context: ..
      dockerfile: ./apps/identity-service/Dockerfile
      args:
        GIT_SHA: local
    command: ["worker"]
    environment:
      <<: *observability-env
      DATABASE_URL: postgres://auraedu:auraedu@postgres:5432/identity?sslmode=disable
      NATS_URL: nats://nats:4222
      JWT_SIGNING_KEY: ${JWT_SIGNING_KEY:-local-dev-signing-key-change-me}
      SERVICE_TENANT_URL: http://tenant-service:8082
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-local-internal-service-token}
      SERVICE_NOTIFICATION_URL: http://notification-service:8099
      AUTH_CLEANUP_INTERVAL: 1h
      AUTH_CLEANUP_BATCH_SIZE: "1000"
      AUTH_REFRESH_RETENTION_AFTER_EXPIRY: 24h
      AUTH_PASSWORD_RESET_RETENTION: 720h
      AUTH_INVITE_RETENTION: 2160h
      AUTH_PUBLISHED_OUTBOX_RETENTION: 720h
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      postgres: { condition: service_healthy }
      nats: { condition: service_healthy }
      tenant-service: { condition: service_started }
      notification-service: { condition: service_started }
    restart: unless-stopped

  tenant-service:
    build:
      context: ..
      dockerfile: ./apps/tenant-service/Dockerfile
      args:
        GIT_SHA: local
    working_dir: /
    ports: ["8082:8082"]
    environment:
      <<: *observability-env
      DATABASE_URL: postgres://auraedu:auraedu@postgres:5432/tenant?sslmode=disable
      NATS_URL: nats://nats:4222
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-local-internal-service-token}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    volumes:
      - ../apps/tenant-service/migrations:/migrations:ro
    depends_on:
      postgres: { condition: service_healthy }
      nats: { condition: service_healthy }
    restart: unless-stopped

  tenant-worker:
