name: security-gates

on:
  workflow_call:

permissions:
  contents: read

jobs:
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: '11.11.0' }
      - uses: actions/setup-node@v4
        with:
          node-version: '26.5.0'
          cache: 'pnpm'
      - name: Install JS dependencies (required for audit)
        run: |
          if [ -f pnpm-lock.yaml ]; then
            pnpm install --frozen-lockfile
          else
            echo "::notice::No pnpm-lock.yaml yet — skipping pnpm audit."
          fi
      - name: pnpm audit
        run: pnpm audit --audit-level moderate || true
      - uses: astral-sh/setup-uv@v5
      - name: pip-audit
        run: |
          if [ ! -f uv.lock ]; then
            echo "::notice::No uv.lock yet — skipping pip-audit."
            exit 0
          fi
          uv run pip-audit || true
