# AuraEDU CI — path-filtered gates with contract drift, security scans, Docker build
# validation, and migration lint placeholders (agent_plan §13, EP-07).
#
# Render deploys only after these pass (render.yaml autoDeployTrigger: checksPass).
# Each gate is implemented as a reusable workflow in .github/workflows/*.yml so
# review diffs stay small and focused.

name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  # Detect which parts changed so we only run relevant gates.
  changes:
    runs-on: ubuntu-latest
    outputs:
      go: ${{ steps.filter.outputs.go }}
      web: ${{ steps.filter.outputs.web }}
      python: ${{ steps.filter.outputs.python }}
      root: ${{ steps.filter.outputs.root }}
      docker: ${{ steps.filter.outputs.docker }}
      contracts: ${{ steps.filter.outputs.contracts }}
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            go:
              - 'apps/**/*.go'
              - 'apps/**/go.mod'
              - 'platform/**'
              - 'go.work'
              - '.tool-versions'
            web:
              - 'apps/web/**'
              - 'apps/marketing/**'
              - 'packages/**'
            python:
              - 'apps/ai-**'
              - 'apps/career-guidance-service/**'
            root:
              - 'Makefile'
              - '.tool-versions'
              - '.nvmrc'
              - 'go.work'
              - 'pnpm-workspace.yaml'
              - 'turbo.json'
              - 'pyproject.toml'
              - 'pnpm-lock.yaml'
              - 'uv.lock'
              - 'render.yaml'
              - '.github/workflows/ci.yml'
            docker:
              - 'apps/**/Dockerfile'
              - 'infrastructure/docker/**'
            contracts:
              - 'contracts/**'
              - 'packages/shared-types/**'
              - 'tools/codegen/**'

  go:
    needs: changes
    if: needs.changes.outputs.go == 'true' || needs.changes.outputs.root == 'true'
    uses: ./.github/workflows/go.yml

  web:
    needs: changes
    if: needs.changes.outputs.web == 'true' || needs.changes.outputs.root == 'true'
    uses: ./.github/workflows/web.yml

  python:
    needs: changes
    if: needs.changes.outputs.python == 'true' || needs.changes.outputs.root == 'true'
    uses: ./.github/workflows/python.yml

  contracts:
    needs: changes
    if: needs.changes.outputs.contracts == 'true' || needs.changes.outputs.root == 'true'
    uses: ./.github/workflows/contracts.yml

  security:
    needs: changes
    if: |
      needs.changes.outputs.web == 'true' ||
      needs.changes.outputs.python == 'true' ||
      needs.changes.outputs.go == 'true' ||
      needs.changes.outputs.root == 'true'
    uses: ./.github/workflows/security.yml

  docker:
    needs: changes
    if: needs.changes.outputs.docker == 'true' || needs.changes.outputs.root == 'true'
    uses: ./.github/workflows/docker.yml

  migrations:
    needs: changes
    if: needs.changes.outputs.go == 'true' || needs.changes.outputs.root == 'true'
    uses: ./.github/workflows/migrations.yml
