# AuraEDU CI — path-filtered gates with contract drift, security scans, Docker build
# validation and executable migration gates (agent_plan §13, EP-07).
#
# Render deploys only after these pass (render.yaml autoDeployTrigger: checksPass).
# Each gate is implemented as a reusable workflow in .github/workflows/*.yml so
# review diffs stay small and focused.

name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  # Detect which parts changed so we only run relevant gates.
  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      go: ${{ steps.filter.outputs.go }}
      web: ${{ steps.filter.outputs.web }}
      python: ${{ steps.filter.outputs.python }}
      root: ${{ steps.filter.outputs.root }}
      docker: ${{ steps.filter.outputs.docker }}
      contracts: ${{ steps.filter.outputs.contracts }}
      migrations: ${{ steps.filter.outputs.migrations }}
      performance: ${{ steps.filter.outputs.performance }}
      observability: ${{ steps.filter.outputs.observability }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with: { fetch-depth: 0 }
      - name: Protect workflow routing invariant
        run: grep -Fq -- "- '.github/workflows/**'" .github/workflows/ci.yml
      - uses: dorny/paths-filter@6852f92c20ea7fd3b0c25de3b5112db3a98da050 # v3
        id: filter
        with:
          filters: |
            go:
              - 'apps/**/*.go'
              - 'apps/**/go.mod'
              - 'platform/**'
              - 'go.work'
              - '.tool-versions'
            web:
              - 'apps/web/**'
              - 'apps/marketing/**'
              - 'packages/**'
            python:
              - 'apps/ai-**'
              - 'apps/career-guidance-service/**'
            root:
              - 'Makefile'
              - '.tool-versions'
              - '.nvmrc'
              - 'go.work'
              - 'pnpm-workspace.yaml'
              - 'turbo.json'
              - 'pyproject.toml'
              - 'pnpm-lock.yaml'
              - 'uv.lock'
              - 'render.yaml'
              - '.github/workflows/**'
              - 'tools/ci/security-static-scan.sh'
              - 'tools/ci/check-render-service-secrets.sh'
              - 'tools/ci/check-render-runtime-config.sh'
              - 'tools/ci/check-render-network-boundaries.sh'
              - 'tools/ci/check-render-deploy-safety.sh'
              - 'tools/ci/check-disaster-recovery.sh'
              - 'tools/ci/check-documentation-freshness.sh'
              - 'tools/release/**'
              - 'release/evidence/**'
              - 'release/scenarios/**'
              - 'tools/providerprobe/**'
              - 'tools/twilioprobe/**'
              - 'tools/vercelprobe/**'
              - '**/README.md'
              - 'tools/dr/**'
              - 'docs/engineering-handbook/04-operations/32-disaster-recovery.md'
              - 'docs/engineering-handbook/04-operations/runbooks/disaster-recovery.md'
              - 'tools/ci/run-authz-security-tests.sh'
              - 'tools/ci/run-injection-upload-security-tests.sh'
              - 'tools/dev/**'
              - '.github/workflows/security.yml'
            docker:
              - 'apps/**/Dockerfile'
              - 'infrastructure/docker/**'
            contracts:
              - 'contracts/**'
              - 'packages/shared-types/**'
              - 'tools/codegen/**'
            migrations:
              - 'apps/**/migrations/**'
              - 'apps/**/internal/db/migrations/**'
              - 'tools/ci/check-migrations.sh'
              - 'tools/ci/check-tenant-rls.sh'
              - 'tools/ci/run-go-isolation-tests.sh'
              - 'tools/ci/run-feature-flag-tests.sh'
              - '.github/workflows/migrations.yml'
              - '.github/workflows/isolation.yml'
              - '.github/workflows/feature-flags.yml'
            performance:
              - 'tools/loadtest/**'
              - 'performance/**'
              - '.github/workflows/performance.yml'
            observability:
              - 'platform/observ/**'
              - 'apps/**/cmd/server/**'
              - 'apps/**/cmd/worker/**'
              - 'apps/notification-service/internal/application/**'
              - 'apps/analytics-service/internal/adapters/events/**'
              - 'apps/audit-service/internal/adapters/events/**'
              - 'infrastructure/observability/**'
              - 'infrastructure/docker/otel-collector-config.yaml'
              - 'deploy/docker-compose*.yml'
              - 'tools/ci/run-observability-tests.sh'
              - '.github/workflows/observability.yml'

  go:
    needs: changes
    if: needs.changes.outputs.go == 'true' || needs.changes.outputs.root == 'true'
    uses: ./.github/workflows/go.yml

  documentation:
    needs: changes
    if: needs.changes.outputs.root == 'true' || needs.changes.outputs.web == 'true' || needs.changes.outputs.go == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Check ownership documentation freshness
        run: bash tools/ci/check-documentation-freshness.sh
      - name: Validate production release evidence
        run: |
          node --test tools/release/verify-readiness.test.mjs
          node tools/release/verify-readiness.mjs

  web:
    needs: changes
    if: needs.changes.outputs.web == 'true' || needs.changes.outputs.root == 'true'
    uses: ./.github/workflows/web.yml

  python:
    needs: changes
    if: needs.changes.outputs.python == 'true' || needs.changes.outputs.root == 'true'
    uses: ./.github/workflows/python.yml

  contracts:
    needs: changes
    if: needs.changes.outputs.contracts == 'true' || needs.changes.outputs.root == 'true'
    uses: ./.github/workflows/contracts.yml

  security:
    needs: changes
    if: |
      needs.changes.outputs.web == 'true' ||
      needs.changes.outputs.python == 'true' ||
      needs.changes.outputs.go == 'true' ||
      needs.changes.outputs.root == 'true'
    uses: ./.github/workflows/security.yml

  docker:
    needs: changes
    if: needs.changes.outputs.docker == 'true' || needs.changes.outputs.root == 'true'
    uses: ./.github/workflows/docker.yml

  migrations:
    needs: changes
    if: needs.changes.outputs.migrations == 'true' || needs.changes.outputs.go == 'true' || needs.changes.outputs.root == 'true'
    uses: ./.github/workflows/migrations.yml

  isolation:
    needs: changes
    if: |
      needs.changes.outputs.migrations == 'true' ||
      needs.changes.outputs.go == 'true' ||
      needs.changes.outputs.python == 'true' ||
      needs.changes.outputs.root == 'true'
    uses: ./.github/workflows/isolation.yml

  feature-flags:
    needs: changes
    if: |
      needs.changes.outputs.go == 'true' ||
      needs.changes.outputs.web == 'true' ||
      needs.changes.outputs.python == 'true' ||
      needs.changes.outputs.root == 'true'
    uses: ./.github/workflows/feature-flags.yml

  performance:
    needs: changes
    if: needs.changes.outputs.performance == 'true' || needs.changes.outputs.root == 'true'
    uses: ./.github/workflows/performance.yml

  observability:
    needs: changes
    if: needs.changes.outputs.observability == 'true' || needs.changes.outputs.root == 'true'
    uses: ./.github/workflows/observability.yml
