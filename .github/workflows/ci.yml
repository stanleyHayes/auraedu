# AuraEDU CI — path-filtered gates (agent_plan §13, EP-07). Render deploys only after
# these pass (render.yaml autoDeployTrigger: checksPass). Expand per-service as they land.
name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  # Detect which parts changed so we only run relevant gates.
  changes:
    runs-on: ubuntu-latest
    outputs:
      go: ${{ steps.filter.outputs.go }}
      web: ${{ steps.filter.outputs.web }}
      python: ${{ steps.filter.outputs.python }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            go:
              - 'apps/**/*.go'
              - 'platform/**'
              - 'go.work'
            web:
              - 'apps/web/**'
              - 'apps/marketing/**'
              - 'packages/**'
            python:
              - 'apps/ai-**'
              - 'apps/career-guidance-service/**'

  go:
    needs: changes
    if: needs.changes.outputs.go == 'true'
    runs-on: ubuntu-latest
    env:
      GOFLAGS: -mod=readonly
      GOTOOLCHAIN: local
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: 'stable' } # always newest patched Go so the blocking govulncheck gate stays green
      - run: go build ./platform/... ./apps/api-gateway/...
      - run: go vet ./platform/... ./apps/api-gateway/...
      - name: gofmt
        run: test -z "$(gofmt -l platform apps)"
      - name: govulncheck
        run: |
          # govulncheck runs per-module (GOWORK=off); fails the build on CALLED vulns.
          for m in platform apps/api-gateway; do
            echo "::group::govulncheck $m"
            ( cd "$m" && GOWORK=off go run golang.org/x/vuln/cmd/govulncheck@latest ./... )
            echo "::endgroup::"
          done

  web:
    needs: changes
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: TS gates (activate once the workspace is scaffolded)
        run: |
          if [ ! -f pnpm-lock.yaml ]; then
            echo "::notice::No pnpm-lock.yaml yet — TS workspace not scaffolded; skipping gates."
            exit 0
          fi
          corepack enable
          pnpm install --frozen-lockfile
          pnpm lint && pnpm typecheck && pnpm test

  python:
    needs: changes
    if: needs.changes.outputs.python == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Python gates (activate once a service is implemented)
        run: |
          if [ ! -f uv.lock ]; then
            echo "::notice::No uv.lock yet — Python services not scaffolded; skipping gates."
            exit 0
          fi
          pipx install uv || pip install uv
          uv sync
          uv run ruff check . && uv run pytest
