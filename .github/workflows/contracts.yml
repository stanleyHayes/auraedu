name: contracts-gates

on:
  workflow_call:

permissions:
  contents: read

jobs:
  contracts:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with: { go-version: '1.26.5' }
      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
        with: { version: '11.11.0' }
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '26.5.0'
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Lint contracts
        run: make contracts-lint
      - name: Test contract parity validator
        run: pnpm --filter @auraedu/codegen test
      - name: Regenerate contract stubs/types
        run: make contracts
      - name: Exercise generated runtime validators
        run: pnpm --filter @auraedu/shared-types test
      - name: Check for contract drift
        run: git diff --exit-code
