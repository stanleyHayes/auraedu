  # ---- Worker / Cron patterns ----------------------------------------------
  # Render `worker` services run continuously (event consumers / background jobs).
  # Render `cron` services run on a schedule. Both can reuse a service's Dockerfile
  # with a different start command, or use a dedicated worker Dockerfile.
  #
  # Example worker (uncomment once the service has a worker entrypoint):
  # - name: report-worker
  #   type: worker
  #   runtime: docker
