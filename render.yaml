# AuraEDU — Render Blueprint (agent_plan §3, EP-09).
# Spec: https://render.com/docs/blueprint-spec
#
# Topology:
#   web    → api-gateway (public), web (Next portals+school sites), marketing (auraedu.com)
#   pserv  → every domain/AI service (internal only, reached via the gateway) + NATS JetStream
#   worker → report/notification/analytics/AI background consumers (add per service)
#   cron   → scheduled jobs (spec cron)
#   databases (Postgres 17) → one per service    keyvalue → shared Redis/Valkey cache
#
# Region: frankfurt (nearest to Ghana). CI gates run in GitHub Actions; autoDeployTrigger:
# checksPass means Render deploys only after they pass. `make new-service` prints the block
# to append here (services:) plus a database (databases:).

envVarGroups:
  - name: auraedu-shared-config
    envVars:
      - key: LOG_LEVEL
        value: info
      - key: OTEL_EXPORTER_OTLP_ENDPOINT
        value: "" # set to Grafana Cloud / collector endpoint in the dashboard
      - key: ENVIRONMENT
        value: production

  - name: auraedu-secrets
    envVars:
      - key: JWT_SIGNING_KEY
        generateValue: true # 256-bit; Identity signs, Gateway verifies
      - key: CLOUDINARY_CLOUD_NAME
        sync: false # set in the dashboard
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false

databases:
  # One Render Postgres per service DB (agent_plan Appendix D). Each service connects only
  # to its own database; logical DB names match deploy/postgres-init.sql.
  - name: identity-db
    plan: basic-1gb
    region: frankfurt
    databaseName: identity
    postgresMajorVersion: "17"
  - name: tenant-db
    plan: basic-1gb
    region: frankfurt
    databaseName: tenant
    postgresMajorVersion: "17"
  - name: student-db
    plan: basic-1gb
    region: frankfurt
    databaseName: student
    postgresMajorVersion: "17"
  - name: staff-db
    plan: basic-1gb
    region: frankfurt
    databaseName: staff
    postgresMajorVersion: "17"
  - name: academic-db
    plan: basic-1gb
    region: frankfurt
    databaseName: academic
    postgresMajorVersion: "17"
  - name: attendance-db
    plan: basic-1gb
    region: frankfurt
    databaseName: attendance
    postgresMajorVersion: "17"
  - name: assessment-db
    plan: basic-1gb
    region: frankfurt
    databaseName: assessment
    postgresMajorVersion: "17"
  - name: report-db
    plan: basic-1gb
    region: frankfurt
    databaseName: report
    postgresMajorVersion: "17"
  - name: fees-db
    plan: basic-1gb
    region: frankfurt
    databaseName: fees
    postgresMajorVersion: "17"
  - name: payment-db
    plan: basic-1gb
    region: frankfurt
    databaseName: payment
    postgresMajorVersion: "17"
  - name: notification-db
    plan: basic-1gb
    region: frankfurt
    databaseName: notification
    postgresMajorVersion: "17"
  - name: website-db
    plan: basic-1gb
    region: frankfurt
    databaseName: website
    postgresMajorVersion: "17"
  - name: file-db
    plan: basic-1gb
    region: frankfurt
    databaseName: file
    postgresMajorVersion: "17"
  - name: analytics-db
    plan: basic-1gb
    region: frankfurt
    databaseName: analytics
    postgresMajorVersion: "17"
  - name: billing-db
    plan: basic-1gb
    region: frankfurt
    databaseName: billing
    postgresMajorVersion: "17"
  - name: cbt-db
    plan: basic-1gb
    region: frankfurt
    databaseName: cbt
    postgresMajorVersion: "17"
  - name: audit-db
    plan: basic-1gb
    region: frankfurt
    databaseName: audit
    postgresMajorVersion: "17"
  - name: ai-db
    plan: basic-1gb
    region: frankfurt
    databaseName: ai
    postgresMajorVersion: "17"

services:
  # ---- Shared cache (Redis/Valkey) ----------------------------------------
  - name: auraedu-cache
    type: keyvalue
    plan: starter
    region: frankfurt
    maxmemoryPolicy: allkeys-lru
    ipAllowList: [] # private only — reachable from services in the same Render project

  # ---- Event bus: NATS JetStream (private + persistent disk) ---------------
  - name: nats
    type: pserv
    runtime: docker
    region: frankfurt
    plan: starter
    dockerfilePath: ./infrastructure/docker/nats.Dockerfile
    dockerContext: .
    healthCheckPath: /healthz
    disk:
      name: nats-jetstream
      mountPath: /data
      sizeGB: 10

  # ---- API Gateway (the only public backend) -------------------------------
  - name: api-gateway
    type: web
    runtime: docker
    region: frankfurt
    plan: starter
    dockerfilePath: ./apps/api-gateway/Dockerfile
    dockerContext: .
    healthCheckPath: /health
    autoDeployTrigger: checksPass
    buildFilter:
      paths:
        - apps/api-gateway/**
        - platform/**
      ignoredPaths:
        - "**/*_test.go"
        - "**/*.md"
    envVars:
      - key: NATS_HOST
        fromService:
          name: nats
          property: host
      - key: REDIS_URL
        fromService:
          name: auraedu-cache
          property: connectionString
      - key: IDENTITY_HOSTPORT
        fromService:
          name: identity-service
          property: hostport
      - key: TENANT_HOSTPORT
        fromService:
          name: tenant-service
          property: hostport
      - key: JWT_SIGNING_KEY
        fromGroup: auraedu-secrets
      - fromGroup: auraedu-shared-config

  # ---- Identity Service (private) ------------------------------------------
  - name: identity-service
    type: pserv
    runtime: docker
    region: frankfurt
    plan: starter
    dockerfilePath: ./apps/identity-service/Dockerfile
    dockerContext: .
    healthCheckPath: /health
    autoDeployTrigger: checksPass
    buildFilter:
      paths:
        - apps/identity-service/**
        - platform/**
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: identity-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: auraedu-cache
          property: connectionString
      - key: NATS_HOST
        fromService:
          name: nats
          property: host
      - key: JWT_SIGNING_KEY
        fromGroup: auraedu-secrets
      - fromGroup: auraedu-shared-config

  # ---- Tenant Service (private) — schools, branding, FEATURE FLAGS ---------
  - name: tenant-service
    type: pserv
    runtime: docker
    region: frankfurt
    plan: starter
    dockerfilePath: ./apps/tenant-service/Dockerfile
    dockerContext: .
    healthCheckPath: /health
    autoDeployTrigger: checksPass
    buildFilter:
      paths:
        - apps/tenant-service/**
        - platform/**
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: tenant-db
          property: connectionString
      - key: NATS_HOST
        fromService:
          name: nats
          property: host
      - fromGroup: auraedu-shared-config

  # ---- Student Service (private) — scaffolded via `make new-service` --------
  - name: student-service
    type: pserv
    runtime: docker
    region: frankfurt
    plan: starter
    dockerfilePath: ./apps/student-service/Dockerfile
    dockerContext: .
    healthCheckPath: /health
    autoDeployTrigger: checksPass
    buildFilter:
      paths:
        - apps/student-service/**
        - platform/**
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: student-db
          property: connectionString
      - key: NATS_HOST
        fromService:
          name: nats
          property: host
      - fromGroup: auraedu-shared-config

  # ---- Web app: portals + per-school public sites (public) -----------------
  - name: web
    type: web
    runtime: docker
    region: frankfurt
    plan: starter
    dockerfilePath: ./apps/web/Dockerfile
    dockerContext: .
    healthCheckPath: /api/health
    autoDeployTrigger: checksPass
    buildFilter:
      paths:
        - apps/web/**
        - packages/**
        - pnpm-lock.yaml
        - package.json
        - turbo.json
        - pnpm-workspace.yaml
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          name: api-gateway
          property: url
      - fromGroup: auraedu-shared-config

  # ---- Company marketing site: auraedu.com (public) ------------------------
  - name: marketing
    type: web
    runtime: docker
    region: frankfurt
    plan: starter
    dockerfilePath: ./apps/marketing/Dockerfile
    dockerContext: .
    healthCheckPath: /api/health
    autoDeployTrigger: checksPass
    buildFilter:
      paths:
        - apps/marketing/**
        - packages/**
        - pnpm-lock.yaml
        - package.json
        - turbo.json
        - pnpm-workspace.yaml
    envVars:
      - fromGroup: auraedu-shared-config

  # ---- Worker / Cron patterns ----------------------------------------------
  # Render `worker` services run continuously (event consumers / background jobs).
  # Render `cron` services run on a schedule. Both can reuse a service's Dockerfile
  # with a different start command, or use a dedicated worker Dockerfile.
  #
  # Example worker (uncomment once the service has a worker entrypoint):
  # - name: report-worker
  #   type: worker
  #   runtime: docker
  #   region: frankfurt
  #   plan: starter
  #   dockerfilePath: ./apps/report-service/Dockerfile
  #   dockerContext: .
  #   autoDeployTrigger: checksPass
  #   buildFilter:
  #     paths:
  #       - apps/report-service/**
  #       - platform/**
  #   envVars:
  #     - key: DATABASE_URL
  #       fromDatabase:
  #         name: report-db
  #         property: connectionString
  #     - key: NATS_HOST
  #       fromService:
  #         name: nats
  #         property: host
  #     - fromGroup: auraedu-shared-config
  #
  # Example cron (uncomment once a scheduled job is implemented):
  # - name: nightly-analytics-cron
  #   type: cron
  #   schedule: "0 2 * * *"
  #   runtime: docker
  #   region: frankfurt
  #   plan: starter
  #   dockerfilePath: ./apps/analytics-service/Dockerfile
  #   dockerContext: .
  #   buildFilter:
  #     paths:
  #       - apps/analytics-service/**
  #       - platform/**
  #   envVars:
  #     - key: DATABASE_URL
  #       fromDatabase:
  #         name: analytics-db
  #         property: connectionString
  #     - fromGroup: auraedu-shared-config

