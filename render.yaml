    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: identity-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: auraedu-cache
          property: connectionString
      - key: NATS_URL
        fromService:
          name: nats
          property: hostport
      - key: JWT_SIGNING_KEY
        fromGroup: auraedu-secrets
      - fromGroup: auraedu-shared-config

