services:
  # ---- Shared cache (Redis/Valkey) ----------------------------------------
  - name: auraedu-cache
    type: keyvalue
    plan: starter
    region: frankfurt
    maxmemoryPolicy: allkeys-lru
    ipAllowList: [] # private only — reachable from services in the same Render project

  # ---- Event bus: NATS JetStream (private + persistent disk) ---------------
  - name: nats
    type: pserv
    runtime: docker
    region: frankfurt
    plan: starter
    dockerfilePath: ./infrastructure/docker/nats.Dockerfile
    dockerContext: .
    healthCheckPath: /healthz
    disk:
      name: nats-jetstream
      mountPath: /data
      sizeGB: 10

  # ---- API Gateway (the only public backend) -------------------------------
  - name: api-gateway
    type: web
    runtime: docker
    region: frankfurt
    plan: starter
    dockerfilePath: ./apps/api-gateway/Dockerfile
    dockerContext: .
    healthCheckPath: /health
    autoDeployTrigger: checksPass
    buildFilter:
      paths:
        - apps/api-gateway/**
        - platform/**
      ignoredPaths:
        - "**/*_test.go"
        - "**/*.md"
    envVars:
      - key: NATS_HOST
        fromService:
          name: nats
          property: host
      - key: REDIS_URL
        fromService:
          name: auraedu-cache
          property: connectionString
      - key: IDENTITY_HOSTPORT
        fromService:
          name: identity-service
          property: hostport
      - key: TENANT_HOSTPORT
        fromService:
          name: tenant-service
          property: hostport
      - key: SERVICE_IDENTITY_URL
        fromService:
          name: identity-service
          property: hostport
      - key: SERVICE_TENANT_URL
        fromService:
          name: tenant-service
          property: hostport
      - key: SERVICE_AI_RECOMMENDATION_URL
        fromService:
          name: ai-recommendation-service
          property: hostport
      - key: SERVICE_AI_PREDICTION_URL
        fromService:
          name: ai-prediction-service
          property: hostport
      - key: SERVICE_CAREER_GUIDANCE_URL
        fromService:
          name: career-guidance-service
          property: hostport
      - key: SERVICE_FILE_URL
        fromService:
          name: file-service
          property: hostport
      - key: SERVICE_STUDENT_URL
        fromService:
          name: student-service
          property: hostport
      - key: SERVICE_ACADEMIC_URL
        fromService:
          name: academic-service
          property: hostport
      - key: SERVICE_STAFF_URL
        fromService:
          name: staff-service
          property: hostport
      - key: SERVICE_ATTENDANCE_URL
        fromService:
          name: attendance-service
          property: hostport
      - key: SERVICE_ASSESSMENT_URL
        fromService:
          name: assessment-service
          property: hostport
      - key: SERVICE_REPORT_URL
        fromService:
          name: report-service
          property: hostport
      - key: SERVICE_FEES_URL
        fromService:
          name: fees-service
          property: hostport
      - key: SERVICE_PAYMENT_URL
        fromService:
          name: payment-service
          property: hostport
      - key: SERVICE_NOTIFICATION_URL
        fromService:
          name: notification-service
          property: hostport
      - key: SERVICE_BILLING_URL
        fromService:
          name: billing-service
          property: hostport
      - key: SERVICE_WEBSITE_URL
        fromService:
          name: website-service
          property: hostport
      - key: SERVICE_ANALYTICS_URL
        fromService:
          name: analytics-service
          property: hostport
      - key: SERVICE_CBT_URL
        fromService:
          name: cbt-service
          property: hostport
      - key: SERVICE_AUDIT_URL
        fromService:
          name: audit-service
          property: hostport
      - key: JWT_SIGNING_KEY
        fromGroup: auraedu-secrets
      - fromGroup: auraedu-shared-config

  # ---- Identity Service (private) ------------------------------------------
  - name: identity-service
    type: pserv
    runtime: docker
    region: frankfurt
    plan: starter
    dockerfilePath: ./apps/identity-service/Dockerfile
    dockerContext: .
    healthCheckPath: /health
    autoDeployTrigger: checksPass
    buildFilter:
      paths:
        - apps/identity-service/**
