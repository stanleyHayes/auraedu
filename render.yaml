# AuraEDU — Render Blueprint (agent_plan §3, EP-09).
# Spec: https://render.com/docs/blueprint-spec
#
# Topology:
#   web    → api-gateway only; both Next.js frontends deploy to Vercel
#   pserv  → every domain/AI service (internal only, reached via the gateway) + NATS JetStream
#   worker → report/notification/analytics/AI background consumers (add per service)
#   cron   → scheduled jobs (spec cron)
#   databases (Postgres 17) → one per service    keyvalue → shared Redis/Valkey cache
#
# Region: frankfurt (nearest to Ghana). CI gates run in GitHub Actions; autoDeployTrigger:
# checksPass means Render deploys only after they pass. `make new-service` prints the block
# to append here (services:) plus a database (databases:).

envVarGroups:
  - name: auraedu-shared-config
    envVars:
      - key: LOG_LEVEL
        value: info
      - key: OTEL_EXPORTER_OTLP_ENDPOINT
        value: "" # set to Grafana Cloud / collector endpoint in the dashboard
      - key: OTEL_EXPORTER_OTLP_PROTOCOL
        value: grpc
      - key: OTEL_TRACES_SAMPLER_ARG
        value: "0.1"
      - key: OTEL_RESOURCE_ATTRIBUTES
        value: deployment.environment.name=production
      - key: METRICS_BEARER_TOKEN
        generateValue: true
      - key: ENVIRONMENT
        value: production

  - name: auraedu-secrets
    envVars:
      - key: JWT_SIGNING_KEY
        generateValue: true # 256-bit; Identity signs, Gateway verifies
      - key: INTERNAL_SERVICE_TOKEN
        generateValue: true
      - key: CLOUDINARY_URL
        sync: false # cloudinary://api_key:api_secret@cloud_name

  - name: auraedu-identity-secrets
    envVars:
      - key: MFA_ENCRYPTION_KEY
        generateValue: true # Identity-only encryption key for TOTP secrets at rest

  - name: auraedu-notification-secrets
    envVars:
      - key: SMTP_PASSWORD
        sync: false # legacy SMTP fallback only
      - key: RESEND_API_KEY
        sync: false # restricted sending key; entered once when the Blueprint is created
      - key: NOTIFICATION_UNSUBSCRIBE_SIGNING_KEY
        generateValue: true # shared by notification HTTP + worker; never exposed to browsers
      - key: EXPO_ACCESS_TOKEN
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_SMS_FROM
        sync: false # E.164 sender; may be replaced by TWILIO_MESSAGING_SERVICE_SID
      - key: TWILIO_MESSAGING_SERVICE_SID
        sync: false
      - key: TWILIO_WHATSAPP_FROM
        sync: false # approved WhatsApp sender in E.164 form

  - name: auraedu-notification-webhook-secrets
    envVars:
      - key: RESEND_WEBHOOK_SECRET
        sync: false # whsec_... signing secret; HTTP service only, never the worker

  - name: auraedu-content-secrets
    envVars:
      - key: OPENAI_API_KEY
        sync: false # restricted server-side key for governed content drafts only

  # Recovery credentials are intentionally isolated from application services.
  # The bucket must have Object Lock enabled before these values are supplied.
  - name: auraedu-dr-secrets
    envVars:
      - key: DR_BACKUP_S3_ENDPOINT
        sync: false # e.g. https://s3.eu-central-1.amazonaws.com
      - key: DR_BACKUP_S3_REGION
        value: eu-central-1
      - key: DR_BACKUP_S3_BUCKET
        sync: false
      - key: DR_BACKUP_S3_PREFIX
        value: auraedu
      - key: DR_BACKUP_S3_ACCESS_KEY_ID
        sync: false # write-only recovery principal; never shared with apps
      - key: DR_BACKUP_S3_SECRET_ACCESS_KEY
        sync: false
      - key: DR_BACKUP_RETENTION_DAYS
        value: "35"
      - key: DR_BACKUP_HEARTBEAT_URL
        sync: false
      - key: DR_BACKUP_HEARTBEAT_TOKEN
        sync: false
      - key: DR_BACKUP_ALERT_URL
        sync: false
      - key: DR_BACKUP_ALERT_TOKEN
        sync: false
      - key: DR_POSTGRES_BACKUP_HEARTBEAT_URL
        sync: false
      - key: DR_POSTGRES_BACKUP_HEARTBEAT_TOKEN
        sync: false
      - key: DR_POSTGRES_BACKUP_ALERT_URL
        sync: false
      - key: DR_POSTGRES_BACKUP_ALERT_TOKEN
        sync: false

